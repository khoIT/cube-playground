<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/><stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#f05a22"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#171717" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="840" height="360" fill="url(#bg)"/>
  <text x="48" y="52" fill="#f05a22" font-size="12" font-weight="700" letter-spacing="2">PLATFORM · WEEKEND SHIP</text>
  <text x="47" y="80" fill="#171717" font-size="26" font-weight="700" letter-spacing="-0.4">Data explorer → optimization advisor</text>

  <!-- pipeline: Explore → Care → Decide -->
  <g>
    <!-- explore -->
    <g filter="url(#card)">
      <rect x="48" y="112" width="220" height="208" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
      <circle cx="74" cy="146" r="9" fill="#eff6ff"/>
      <path d="M70 146h8M74 142v8" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round"/>
      <text x="92" y="150" fill="#171717" font-size="13" font-weight="700">Model + billing</text>
      <text x="68" y="186" fill="#525252" font-size="11.5">billing_detail</text>
      <text x="68" y="210" fill="#525252" font-size="11.5">billing_lifetime</text>
      <text x="68" y="234" fill="#525252" font-size="11.5">cs_ticket_detail</text>
      <text x="68" y="258" fill="#525252" font-size="11.5">user_identity</text>
      <rect x="68" y="278" width="120" height="24" rx="8" fill="#eff6ff"/>
      <text x="80" y="294" fill="#1d4ed8" font-size="10.5" font-weight="600">new Ops tab</text>
    </g>

    <!-- care -->
    <g filter="url(#card)">
      <rect x="310" y="112" width="220" height="208" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
      <circle cx="336" cy="146" r="9" fill="#f0fdf4"/>
      <path d="M332 146h8M336 142v8" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round"/>
      <text x="354" y="150" fill="#171717" font-size="13" font-weight="700">Care History 360</text>
      <g>
        <rect x="330" y="170" width="180" height="40" rx="9" fill="#f8fafc" stroke="#e5e5e5"/>
        <circle cx="346" cy="190" r="5" fill="#16a34a"/>
        <text x="360" y="187" fill="#404040" font-size="10.5" font-weight="600">In-game ticket</text>
        <text x="360" y="201" fill="#94a3b8" font-size="9.5">label · sentiment</text>
        <rect x="330" y="218" width="180" height="40" rx="9" fill="#f8fafc" stroke="#e5e5e5"/>
        <circle cx="346" cy="238" r="5" fill="#2563eb"/>
        <text x="360" y="235" fill="#404040" font-size="10.5" font-weight="600">Web support</text>
        <text x="360" y="249" fill="#94a3b8" font-size="9.5">transcript · files</text>
      </g>
      <text x="330" y="294" fill="#737373" font-size="10.5">real CS tickets — not Facebook</text>
    </g>

    <!-- decide -->
    <g filter="url(#card)">
      <rect x="572" y="112" width="220" height="208" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
      <rect x="572" y="112" width="220" height="44" rx="16" fill="#fff7ed"/>
      <rect x="572" y="140" width="220" height="16" fill="#fff7ed"/>
      <circle cx="598" cy="134" r="9" fill="url(#brand)"/>
      <text x="616" y="138" fill="#9a3412" font-size="13" font-weight="700">Optimization advisor</text>
      <text x="592" y="186" fill="#525252" font-size="11.5">1 · cohort + hash-split</text>
      <text x="592" y="210" fill="#525252" font-size="11.5">2 · CS work queue</text>
      <text x="592" y="234" fill="#525252" font-size="11.5">3 · lift on live billing</text>
      <rect x="592" y="256" width="180" height="46" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="606" y="276" fill="#9a3412" font-size="11" font-weight="700">Experiment Command Center</text>
      <text x="606" y="292" fill="#c2410c" font-size="10">designed this weekend →</text>
    </g>
  </g>

  <!-- connectors -->
  <g stroke="url(#brand)" stroke-width="2.2" fill="none">
    <path d="M272 216h34" marker-end="url(#a)"/>
    <path d="M534 216h34" marker-end="url(#a)"/>
  </g>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#f05a22"/>
    </marker>
  </defs>
</svg>
