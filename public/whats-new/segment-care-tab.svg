<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/><stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#171717" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="840" height="360" fill="url(#bg)"/>
  <text x="48" y="52" fill="#f05a22" font-size="12" font-weight="700" letter-spacing="2">SEGMENTS</text>
  <text x="47" y="80" fill="#171717" font-size="26" font-weight="700" letter-spacing="-0.4">Care tab + CS tickets</text>

  <!-- segment panel -->
  <g filter="url(#card)">
    <rect x="48" y="104" width="744" height="216" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="72" y="138" fill="#171717" font-size="14" font-weight="700">Whale at risk · 48,200 members</text>

    <!-- tab strip -->
    <g font-size="12" font-weight="600">
      <text x="72" y="170" fill="#a3a3a3">Overview</text>
      <text x="148" y="170" fill="#a3a3a3">Members</text>
      <text x="232" y="170" fill="#f05a22">Care</text>
      <rect x="230" y="178" width="34" height="3" rx="1.5" fill="#f05a22"/>
    </g>
    <line x1="72" y1="186" x2="768" y2="186" stroke="#f1f5f9"/>

    <!-- ticket rows -->
    <g font-size="11.5">
      <!-- row 1 -->
      <circle cx="84" cy="214" r="5" fill="#dc2626"/>
      <text x="100" y="218" fill="#404040">#26530832 · Payment not delivered</text>
      <rect x="430" y="205" width="92" height="18" rx="9" fill="#fef2f2"/><text x="440" y="218" fill="#b91c1c" font-weight="600">Negative</text>
      <rect x="534" y="205" width="86" height="18" rx="9" fill="#eff6ff"/><text x="544" y="218" fill="#1d4ed8" font-weight="600">Payment</text>
      <text x="700" y="218" fill="#737373">★ 1.0</text>
      <!-- row 2 -->
      <line x1="72" y1="236" x2="768" y2="236" stroke="#f8fafc"/>
      <circle cx="84" cy="258" r="5" fill="#9ca3af"/>
      <text x="100" y="262" fill="#404040">#26530774 · Account login help</text>
      <rect x="430" y="249" width="86" height="18" rx="9" fill="#f5f5f5"/><text x="440" y="262" fill="#525252" font-weight="600">Neutral</text>
      <rect x="534" y="249" width="74" height="18" rx="9" fill="#eff6ff"/><text x="544" y="262" fill="#1d4ed8" font-weight="600">Access</text>
      <text x="700" y="262" fill="#737373">★ 3.0</text>
      <!-- row 3 -->
      <line x1="72" y1="280" x2="768" y2="280" stroke="#f8fafc"/>
      <circle cx="84" cy="302" r="5" fill="#047857"/>
      <text x="100" y="306" fill="#404040">#26530611 · Reward claim resolved</text>
      <rect x="430" y="293" width="86" height="18" rx="9" fill="#ecfdf5"/><text x="440" y="306" fill="#047857" font-weight="600">Positive</text>
      <rect x="534" y="293" width="78" height="18" rx="9" fill="#eff6ff"/><text x="544" y="306" fill="#1d4ed8" font-weight="600">Rewards</text>
      <text x="700" y="306" fill="#737373">★ 5.0</text>
    </g>
  </g>
</svg>
