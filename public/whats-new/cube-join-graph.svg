<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/><stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#f05a22"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#171717" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="840" height="360" fill="url(#bg)"/>
  <text x="48" y="52" fill="#f05a22" font-size="12" font-weight="700" letter-spacing="2">CATALOG</text>
  <text x="47" y="80" fill="#171717" font-size="26" font-weight="700" letter-spacing="-0.4">Cube Join Graph</text>

  <!-- edges -->
  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="240" y1="170" x2="430" y2="120"/>
    <line x1="240" y1="170" x2="430" y2="245"/>
    <line x1="555" y1="120" x2="680" y2="190"/>
    <line x1="555" y1="245" x2="680" y2="190"/>
  </g>
  <!-- edge key labels -->
  <g font-size="10.5" font-weight="600" fill="#737373">
    <rect x="312" y="128" width="62" height="18" rx="9" fill="#ffffff" stroke="#e5e5e5"/><text x="320" y="141">user_id</text>
    <rect x="312" y="196" width="62" height="18" rx="9" fill="#ffffff" stroke="#e5e5e5"/><text x="322" y="209">game_id</text>
    <rect x="592" y="146" width="58" height="18" rx="9" fill="#ffffff" stroke="#e5e5e5"/><text x="600" y="159">ticket</text>
  </g>

  <!-- nodes -->
  <g filter="url(#card)">
    <rect x="150" y="142" width="92" height="56" rx="12" fill="url(#brand)"/>
    <text x="196" y="166" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">mf_users</text>
    <text x="196" y="183" fill="#ffe7d6" font-size="10" text-anchor="middle">spine</text>
  </g>
  <g filter="url(#card)">
    <rect x="430" y="96" width="124" height="52" rx="12" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="492" y="118" fill="#171717" font-size="12.5" font-weight="700" text-anchor="middle">recharge_daily</text>
    <text x="492" y="135" fill="#737373" font-size="10" text-anchor="middle">measures · ltv</text>
  </g>
  <g filter="url(#card)">
    <rect x="430" y="220" width="124" height="52" rx="12" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="492" y="242" fill="#171717" font-size="12.5" font-weight="700" text-anchor="middle">active_daily</text>
    <text x="492" y="259" fill="#737373" font-size="10" text-anchor="middle">dau · wau</text>
  </g>
  <g filter="url(#card)">
    <rect x="680" y="164" width="112" height="52" rx="12" fill="#ffffff" stroke="#dbeafe"/>
    <circle cx="700" cy="184" r="5" fill="#1d4ed8"/>
    <text x="744" y="186" fill="#171717" font-size="12.5" font-weight="700" text-anchor="middle">cs_ticket</text>
    <text x="736" y="203" fill="#737373" font-size="10" text-anchor="middle">care</text>
  </g>

  <text x="48" y="330" fill="#737373" font-size="12">Click a node to jump to that cube's members and metrics.</text>
</svg>
