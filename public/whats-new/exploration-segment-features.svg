<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/><stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#f05a22"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#171717" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="840" height="360" fill="url(#bg)"/>
  <text x="48" y="52" fill="#f05a22" font-size="12" font-weight="700" letter-spacing="2">SEGMENTS · CHAT · EXPLORE</text>
  <text x="47" y="80" fill="#171717" font-size="26" font-weight="700" letter-spacing="-0.4">Explore deeper</text>

  <!-- Card 1: segment overlap Venn -->
  <g filter="url(#card)">
    <rect x="48" y="104" width="234" height="216" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="68" y="134" fill="#171717" font-size="13" font-weight="700">Segment overlap</text>
    <text x="68" y="151" fill="#737373" font-size="10.5">A-only · both · B-only</text>
    <circle cx="138" cy="232" r="58" fill="#f05a22" fill-opacity="0.20" stroke="#f05a22" stroke-width="1.5"/>
    <circle cx="196" cy="232" r="46" fill="#3f8dff" fill-opacity="0.20" stroke="#3f8dff" stroke-width="1.5"/>
    <text x="112" y="230" text-anchor="middle" fill="#171717" font-size="15" font-weight="700">41k</text>
    <text x="112" y="245" text-anchor="middle" fill="#737373" font-size="9">A only</text>
    <text x="166" y="231" text-anchor="middle" fill="#404040" font-size="11" font-weight="700">7k</text>
    <text x="214" y="230" text-anchor="middle" fill="#171717" font-size="13" font-weight="700">24k</text>
    <text x="214" y="245" text-anchor="middle" fill="#737373" font-size="9">B only</text>
  </g>

  <!-- Card 2: heatmap drill-down -->
  <g filter="url(#card)">
    <rect x="298" y="104" width="234" height="100" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="318" y="132" fill="#171717" font-size="13" font-weight="700">Heatmap drill-down</text>
    <g>
      <rect x="318" y="146" width="20" height="18" rx="3" fill="#fef3c7"/>
      <rect x="342" y="146" width="20" height="18" rx="3" fill="#fcd34d"/>
      <rect x="366" y="146" width="20" height="18" rx="3" fill="#fb923c"/>
      <rect x="390" y="146" width="20" height="18" rx="3" fill="#dc2626"/>
      <rect x="414" y="146" width="20" height="18" rx="3" fill="#7f1d1d" stroke="#f05a22" stroke-width="2"/>
      <rect x="438" y="146" width="20" height="18" rx="3" fill="#fb923c"/>
      <rect x="462" y="146" width="20" height="18" rx="3" fill="#fcd34d"/>
      <rect x="486" y="146" width="20" height="18" rx="3" fill="#fef3c7"/>
      <rect x="318" y="168" width="20" height="18" rx="3" fill="#fcd34d"/>
      <rect x="342" y="168" width="20" height="18" rx="3" fill="#fb923c"/>
      <rect x="366" y="168" width="20" height="18" rx="3" fill="#dc2626"/>
      <rect x="390" y="168" width="20" height="18" rx="3" fill="#7f1d1d"/>
      <rect x="414" y="168" width="20" height="18" rx="3" fill="#dc2626"/>
      <rect x="438" y="168" width="20" height="18" rx="3" fill="#fcd34d"/>
      <rect x="462" y="168" width="20" height="18" rx="3" fill="#fef3c7"/>
      <rect x="486" y="168" width="20" height="18" rx="3" fill="#fcd34d"/>
    </g>
  </g>

  <!-- Card 3: overlaid comparison chart -->
  <g filter="url(#card)">
    <rect x="298" y="220" width="234" height="100" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="318" y="248" fill="#171717" font-size="13" font-weight="700">Compare on one axis</text>
    <line x1="318" y1="300" x2="510" y2="300" stroke="#f1f5f9"/>
    <line x1="318" y1="278" x2="510" y2="278" stroke="#f1f5f9"/>
    <polyline points="318,298 350,290 382,294 414,272 446,262 478,268 510,260" fill="none" stroke="#f05a22" stroke-width="2.5"/>
    <polyline points="318,282 350,286 382,272 414,284 446,290 478,280 510,286" fill="none" stroke="#3f8dff" stroke-width="2.5"/>
  </g>

  <!-- Card 4: query refinement chips -->
  <g filter="url(#card)">
    <rect x="548" y="104" width="244" height="216" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="568" y="134" fill="#171717" font-size="13" font-weight="700">Refine in chat</text>
    <text x="568" y="151" fill="#737373" font-size="10.5">one click, same cube</text>
    <rect x="568" y="166" width="150" height="26" rx="13" fill="#ffffff" stroke="#f05a22"/>
    <text x="582" y="183" fill="#f54a00" font-size="11" font-weight="600">+ break down by country</text>
    <rect x="568" y="200" width="86" height="26" rx="13" fill="#ffffff" stroke="#f05a22"/>
    <text x="582" y="217" fill="#f54a00" font-size="11" font-weight="600">just payers</text>
    <rect x="662" y="200" width="98" height="26" rx="13" fill="#ffffff" stroke="#d2c2ab"/>
    <text x="676" y="217" fill="#404040" font-size="11" font-weight="600">weekly instead</text>
    <rect x="568" y="234" width="192" height="30" rx="8" fill="#f8fafc" stroke="#e5e5e5"/>
    <text x="582" y="253" fill="#737373" font-size="10.5">…or refine in words</text>
    <rect x="568" y="278" width="100" height="30" rx="9" fill="url(#brand)"/>
    <text x="618" y="298" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">Refine →</text>
  </g>
</svg>
