<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/><stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#f05a22"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#171717" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="840" height="360" fill="url(#bg)"/>
  <text x="48" y="52" fill="#f05a22" font-size="12" font-weight="700" letter-spacing="2">CATALOG · DRIFT</text>
  <text x="47" y="80" fill="#171717" font-size="26" font-weight="700" letter-spacing="-0.4">Metric Drift Center</text>

  <!-- root-cause group card -->
  <g filter="url(#card)">
    <rect x="48" y="104" width="430" height="216" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
    <!-- group header: the missing member -->
    <rect x="48" y="104" width="430" height="44" rx="16" fill="#fef2f2"/>
    <rect x="48" y="132" width="430" height="16" fill="#fef2f2"/>
    <circle cx="74" cy="126" r="7" fill="#dc2626"/>
    <path d="M71 126h6" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <text x="92" y="123" fill="#991b1b" font-size="12.5" font-weight="700">Missing member</text>
    <text x="92" y="139" fill="#b91c1c" font-size="11" font-family="ui-monospace, monospace">mf_users.wau_trailing</text>
    <text x="404" y="131" fill="#991b1b" font-size="12" font-weight="700">3 metrics</text>

    <!-- broken metric rows -->
    <g font-size="11.5" fill="#404040">
      <line x1="68" y1="178" x2="458" y2="178" stroke="#f1f5f9"/>
      <text x="68" y="182">weekly_active_payers</text>
      <line x1="68" y1="212" x2="458" y2="212" stroke="#f1f5f9"/>
      <text x="68" y="216">wau_growth_rate</text>
      <text x="68" y="250">retention_wau_28</text>
    </g>
    <g stroke="#dc2626" stroke-width="1.6" fill="none">
      <path d="M300 174l4 8M304 174l-4 8"/><path d="M300 208l4 8M304 208l-4 8"/><path d="M300 244l4 8M304 244l-4 8"/>
    </g>
    <text x="320" y="182" fill="#dc2626" font-size="10.5" font-weight="600">broken</text>
    <text x="320" y="216" fill="#dc2626" font-size="10.5" font-weight="600">broken</text>
    <text x="320" y="250" fill="#dc2626" font-size="10.5" font-weight="600">broken</text>
  </g>

  <!-- repoint action panel -->
  <g filter="url(#card)">
    <rect x="506" y="104" width="286" height="216" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="528" y="136" fill="#171717" font-size="13" font-weight="700">Repoint reference</text>
    <text x="528" y="156" fill="#737373" font-size="11">Pick a live /meta member</text>
    <rect x="528" y="170" width="242" height="30" rx="8" fill="#f8fafc" stroke="#e5e5e5"/>
    <text x="542" y="189" fill="#404040" font-size="11" font-family="ui-monospace, monospace">mf_users.wau ▾</text>
    <rect x="528" y="212" width="138" height="34" rx="9" fill="url(#brand)"/>
    <text x="597" y="234" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">Repoint →</text>
    <rect x="676" y="212" width="94" height="34" rx="9" fill="#ffffff" stroke="#e5e5e5"/>
    <text x="723" y="234" fill="#525252" font-size="12" font-weight="600" text-anchor="middle">Mark N/A</text>
    <text x="528" y="284" fill="#047857" font-size="11" font-weight="600">✓ Fixes all 3 metrics at once</text>
  </g>
</svg>
