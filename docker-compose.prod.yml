# Production composition for cube-playground — the artifact the deploy guide's
# Step 4 (`docker compose up -d`) runs after the `vault` stage writes `.env`.
#
#   web  ──serves SPA + proxies /api,/cube-api──▶  server  ──/api/chat──▶  chat-service
#                                                     ├─▶ cube_api (in-stack, `local` workspace) ──▶ cubestore
#                                                     │       └─ cube_api ──auth-db──▶ server /internal/access
#                                                     └─▶ external: cube.gds.vng.vn (`prod` ws), Trino, LiteLLM, Keycloak
#
# Secrets: `.env` is written next to this file by the CI `vault` stage (never in
# git). Both Node services read it via `env_file`. The SPA's build-time VITE_*
# values are baked into the `web` image at build, not here.
#
# Public port: pick one in 11000–20000, set PUBLIC_PORT, log it in
# Apps-Configuration.xlsx, then have GIO point the domain at it.

# Build-time proxy passed into every image build. CI runs on a network-isolated
# runner whose build steps (apt, npm) reach the internet only via the org proxy.
# The shared deploy template exports the working proxy as http_proxy/https_proxy
# and an optional build-specific override as BUILD_HTTP_PROXY/BUILD_NO_PROXY.
# Prefer the override, else fall back to the host proxy; empty for local builds
# (direct connection). BuildKit injects the predefined *_PROXY args into every
# RUN and strips them from image history, so credentials never persist.
x-build-proxy-args: &build-proxy-args
  HTTP_PROXY: ${BUILD_HTTP_PROXY:-${http_proxy:-}}
  HTTPS_PROXY: ${BUILD_HTTP_PROXY:-${https_proxy:-}}
  NO_PROXY: ${BUILD_NO_PROXY:-${no_proxy:-}}
  http_proxy: ${BUILD_HTTP_PROXY:-${http_proxy:-}}
  https_proxy: ${BUILD_HTTP_PROXY:-${https_proxy:-}}
  no_proxy: ${BUILD_NO_PROXY:-${no_proxy:-}}

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
      args:
        <<: *build-proxy-args
    image: cube-playground-server:${TAG:-latest}
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3004"
      DB_PATH: /data/segments.db
      # Business-metrics registry on the persisted volume so metrics created or
      # scaffolded at runtime survive redeploys. Boot seeds it (per-file
      # copy-if-missing) from the image-baked presets under dist/presets.
      BUSINESS_METRICS_DIR: /data/business-metrics
      # Workspace registry: prod points at the open, prefix-namespaced prod
      # cube-dev (https://cube.gds.vng.vn). The committed workspaces.config.json
      # is the local-dev variant (default=local, localhost URLs) — overriding the
      # path here is what makes the gateway resolve workspace ids to a URL that's
      # actually reachable from the container. Cube URLs are NEVER read from .env.
      WORKSPACES_CONFIG_PATH: /app/workspaces.prod.config.json
      # The server proxies /api/chat/* to the chat-service over the compose network.
      CHAT_SERVICE_URL: http://chat-service:3005
      # Legacy global cube base for the non-workspace-aware server paths
      # (dashboards /meta, preview-service, card-runner segment refresh, anomaly
      # detector). These mint per-game JWTs (CUBEJS_API_SECRET), matching the
      # in-stack game_id cube. It's a URL not a secret → lives here, not in Vault.
      CUBE_API_URL: http://cube_api:4000
      # Pre-agg observability + on-demand builds against the in-stack worker.
      # The collector tails the worker's logs over the docker socket to build
      # sweep history; the admin Rebuild trigger recreates the worker scoped to
      # one game (Engine API — no docker CLI in this image). Both target the
      # prod worker container named below (the code default is the -dev name).
      PREAGG_COLLECTOR_ENABLED: "true"
      PREAGG_WORKER_CONTAINER: cube-playground-cube-refresh-worker
      # Daily segment-membership lakehouse snapshot. The job is wired at boot but
      # only runs when enabled; cross-catalog INSERTs hit a SHARED Trino
      # lakehouse, so it must run on EXACTLY ONE instance — prod runs a single
      # `server` replica, so enabling it here is safe. Writes land in the
      # env-scoped schema so prod data never mixes with dev (khoitn/local).
      # CUBEJS_DB_* (Trino coordinator + creds) come from the Vault-synced .env.
      SEGMENT_SNAPSHOT_ENABLED: "true"
      LAKEHOUSE_SCHEMA: "khoitn/prod"
      # /load admission control (server/src/routes/cube-load-admission.ts). These
      # bound the blast radius of the ~110s wait budget; they are NOT a throughput
      # throttle — the real throughput knob is cube_api's CUBEJS_CONCURRENCY.
      #   GLOBAL: max distinct in-flight /load upstreams across all users. Keep ==
      #     CUBEJS_CONCURRENCY (24) so the proxy backpressures one notch before
      #     Cube's own queue — raise BOTH together when scaling the box.
      #   PER_OWNER: runaway guard so one click-happy user can't monopolize the
      #     global pool. Dedup'd identical queries and disconnected clients don't
      #     count, so this only bites on genuine cross-surface pile-up.
      CUBE_LOAD_MAX_INFLIGHT_GLOBAL: ${CUBE_LOAD_MAX_INFLIGHT_GLOBAL:-24}
      CUBE_LOAD_MAX_INFLIGHT_PER_OWNER: ${CUBE_LOAD_MAX_INFLIGHT_PER_OWNER:-8}
      # Short-lived result cache for completed /load queries, keyed by
      # workspace|game|method|query (game-scoped, NOT per-user). Lets staggered
      # users hitting the same query on /build, /segments, /ops reuse one
      # warehouse round-trip — the main lever for "many users, same query". Data
      # is daily-grained so 10 min staleness is safe; realtime cubes bypass and
      # only non-empty 200s are cached. The key has NO ownerId: disable (or add
      # ownerId) before enabling per-user row scoping.
      CUBE_LOAD_RESULT_CACHE_ENABLED: ${CUBE_LOAD_RESULT_CACHE_ENABLED:-true}
      CUBE_LOAD_RESULT_CACHE_TTL_MS: ${CUBE_LOAD_RESULT_CACHE_TTL_MS:-600000}
      CUBE_LOAD_RESULT_CACHE_MAX_ENTRIES: ${CUBE_LOAD_RESULT_CACHE_MAX_ENTRIES:-500}
    volumes:
      - server-data:/data
      # Docker Engine socket for the pre-agg collector (log reads) and build
      # trigger (worker recreate). Grants this container control of the host
      # daemon — acceptable for this admin-gated internal tool; remove the
      # mount (or set PREAGG_TRIGGER_ENABLED=false) to revoke.
      - /var/run/docker.sock:/var/run/docker.sock
      # Cube model for the readiness matrix's per-game rollup registry
      # (preagg-model-registry resolves /app/server/../cube-dev/...). Without
      # it every game falls back to the static 5-cube list and the matrix
      # probes rollups the game doesn't define. Same source the cube
      # containers mount; read-only.
      - ./cube-dev/cube:/app/cube-dev/cube:ro
    depends_on:
      # Ordering only, not health-coupling: chat is feature-flagged
      # (CHAT_FEATURE_ENABLED), so a down chat-service must not block the API.
      chat-service:
        condition: service_started
      # Ordering only: cube_api serves the `local` workspace (non-default), so a
      # slow/down cube must not block the API — the `prod` workspace is external.
      cube_api:
        condition: service_started
    restart: unless-stopped
    expose:
      - "3004"

  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: chat-service
      args:
        <<: *build-proxy-args
    image: cube-playground-chat:${TAG:-latest}
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3005"
      CHAT_DB_PATH: /data/chat.db
      # Topology: chat reaches the API by its compose service name, not localhost.
      SERVER_BASE_URL: http://server:3004
      # NOTE: the egress proxy needed to reach the public LLM gateway is baked into
      # the chat-service image (Dockerfile `chat-service` stage), NOT set here — a
      # compose `${http_proxy:-}` would resolve to empty and clobber the baked ENV
      # whenever the deploy shell hasn't exported it at parse time.
    volumes:
      - chat-data:/data
    restart: unless-stopped
    expose:
      - "3005"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        <<: *build-proxy-args
        # Same-origin defaults; override here or in CI if the cube path differs.
        VITE_CUBE_API_URL: ${VITE_CUBE_API_URL:-/cube-api/v1}
        VITE_LANGFUSE_HOST: ${VITE_LANGFUSE_HOST:-}
        # Prod keeps sourcemaps so deployed stack traces map to source; the
        # local override flips this off (the map-stitching pass dominates
        # laptop build time).
        BUILD_SOURCEMAP: ${BUILD_SOURCEMAP:-true}
    image: cube-playground-web:${TAG:-latest}
    ports:
      - "${PUBLIC_PORT:-11000}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # In-stack Cube semantic layer (vendored from data-product/cube-dev → ./cube-dev).
  # Backs the `local` workspace (gameModel=game_id). Multi-tenant: one cube serves
  # all games; the minted JWT's { userId, game } claim selects the tenant schema
  # per request (cube/cube.js), so CUBEJS_DEV_MODE MUST stay false. Runs from the
  # official image — no build. DB/secret values come from .env (Vault); non-secret
  # config is inline. Server reaches it at http://cube_api:4000 (workspaces.prod.config.json).
  cube_api:
    # :latest to match the live cube-api stack (cube-api/docker-compose.prod.yml)
    # that already deploys on the kraken runner — that host has cubejs/cube:latest
    # + cubejs/cubestore:latest cached, so compose finds them locally and skips the
    # Docker Hub pull. The network-isolated runner daemon can't reliably finish a
    # cold Hub pull (registry timeout), so a tag NOT already on the host (e.g. a
    # pinned v1.6.46) wedges the deploy. Keep both images on :latest in lockstep.
    image: cubejs/cube:latest
    container_name: cube-playground-cube-api
    environment:
      CUBEJS_DEV_MODE: "false"
      CUBEJS_LOG_LEVEL: ${CUBEJS_LOG_LEVEL:-info}
      CUBEJS_SCHEMA_PATH: model
      TZ: ${TZ:-UTC}
      DEBUG_LOG: ${DEBUG_LOG:-false}
      # Trino connection — secret values (HOST/PORT/USER/PASS) come from Vault/.env.
      CUBEJS_DB_TYPE: ${CUBEJS_DB_TYPE:-trino}
      CUBEJS_DB_HOST: ${CUBEJS_DB_HOST:-}
      CUBEJS_DB_PORT: ${CUBEJS_DB_PORT:-8080}
      CUBEJS_DB_USER: ${CUBEJS_DB_USER:-}
      CUBEJS_DB_PASS: ${CUBEJS_DB_PASS:-}
      # Cube's Trino driver reads CUBEJS_DB_PRESTO_CATALOG (presto lineage); the
      # live cube-api uses it. CUBEJS_DB_CATALOG is kept as a belt-and-suspenders
      # mirror (cube-dev's .env sets both) but is not what the driver consults.
      CUBEJS_DB_PRESTO_CATALOG: ${CUBEJS_DB_PRESTO_CATALOG:-game_integration}
      CUBEJS_DB_CATALOG: ${CUBEJS_DB_CATALOG:-game_integration}
      # TRUE by default: this Trino endpoint (gio-gds-trino:8080) is TLS-only, so
      # plain HTTP gets reset mid-handshake ("/v1/info socket hang up"). Matches
      # the live cube-api. Override to false via Vault only for a plaintext Trino.
      CUBEJS_DB_SSL: ${CUBEJS_DB_SSL:-true}
      # Concurrency + Trino connection pool. This is THE throughput knob: it
      # caps how many queries Cube runs in parallel against Trino. With the
      # per-query wait budget at ~110s each slow query holds its slot ~4x longer,
      # so the ceiling is load-bearing. Trino is a robust shared cluster, so we
      # size for high concurrency and let the box's RAM be the real limit —
      # raise these on bigger instances. Pool ≥ concurrency + headroom for the
      # interleaved /meta and /sql calls. The server proxy sheds /load at
      # CUBE_LOAD_MAX_INFLIGHT_GLOBAL, which MUST track CUBEJS_CONCURRENCY so the
      # proxy backpressures one notch before Cube's own queue does — raise the
      # two together (and the server's matching env var) when scaling up.
      CUBEJS_CONCURRENCY: ${CUBEJS_CONCURRENCY:-24}
      CUBEJS_DB_MAX_POOL: ${CUBEJS_DB_MAX_POOL:-32}
      # JWT signing secret — MUST equal the server's CUBEJS_API_SECRET so minted
      # per-game tokens verify. Already a required prod secret (see deployment-guide).
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-}
      # Pre-aggregation store (the cubestore service below).
      CUBEJS_CUBESTORE_HOST: cubestore
      CUBEJS_CUBESTORE_PORT: "3030"
      # Hard OFF on the serving instance: an in-process refresh worker can wedge
      # the single event loop (partition spin-loop) and starve /readyz + /meta.
      # Pre-aggregations are built by the dedicated cube_refresh_worker service
      # below — pinned literal (not ${...}) so enabling the worker via env can
      # never accidentally flip the API instance too.
      CUBEJS_REFRESH_WORKER: "false"
      # SQL API (Postgres wire protocol) — published on 15432 for BI/LLM clients.
      CUBEJS_PG_SQL_PORT: "15432"
      CUBEJS_SQL_USER: ${CUBEJS_SQL_USER:-cube}
      CUBEJS_SQL_PASSWORD: ${CUBEJS_SQL_PASSWORD:-cube}
      # auth-db.js resolves per-user game grants from the co-located server's
      # internal access API (same RBAC store the server enforces). Fails closed.
      AUTH_API_URL: http://server:3004
      AUTH_INTERNAL_SECRET: ${CUBE_AUTH_INTERNAL_SECRET:-}
    # Strip Cube's `SET SESSION query_max_run_time` prepend (Trino role lacks the
    # privilege); see the script. Setting entrypoint clears the image CMD, so the
    # `cubejs server` command must be re-declared.
    entrypoint: ["/usr/local/bin/cube-entrypoint-patched.sh"]
    command: ["cubejs", "server"]
    ports:
      - "${CUBE_PUBLIC_PORT:-17001}:4000"   # REST / GraphQL / Playground (browser)
      - "${CUBE_SQL_PORT:-15432}:15432"     # SQL API (Postgres wire protocol)
    volumes:
      # cube-dev/cube/ is vendored as plain tracked files in this repo (config +
      # models), so it ships with the deploy push and the mount source is always
      # populated on the runner. It must NOT be a git submodule — a parent push
      # carries only a gitlink, leaving this mount empty and Cube failing /meta
      # with "Model files not found". Refresh models by re-vendoring cube-dev/cube/.
      - ./cube-dev/cube:/cube/conf:ro
      # Entrypoint patch lives in this repo's docker/ (the rest of cube-dev/ is
      # gitignored local-reference only). Keeping it here guarantees the mount
      # source exists on the runner; a missing source makes Docker create an empty
      # dir and the container then execs a directory ("is a directory" init failure).
      - ./docker/cube-entrypoint-patched.sh:/usr/local/bin/cube-entrypoint-patched.sh:ro
    depends_on:
      - cubestore
    # Cube's stock image ships NO healthcheck. A blocked event loop (e.g. schema
    # compile storm or refresh-worker spin-loop) keeps the process "running" while
    # /readyz + /meta starve and CPU pegs at 100% — invisible to `docker ps` and
    # never triggering `restart: unless-stopped` (that only fires on exit). This
    # probe hits /readyz so a wedged cube flips to `unhealthy` and surfaces in
    # `docker ps` / orchestrator health. start-period is generous: cold schema
    # compilation on first boot legitimately takes several seconds.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 6s
      start_period: 90s
      retries: 3
    restart: unless-stopped

  # Dedicated pre-aggregation refresh worker. The serving cube_api must never run
  # the in-process refresh worker (a wedged refresh loop starves /readyz + /meta —
  # docs/lessons-learned.md), so partition builds get their own container: same
  # model mount, same Trino + CubeStore wiring, no published ports. The model's
  # scheduledRefreshContexts (cube-dev/cube/cube.js) enumerates every game tenant
  # with a synthetic refresh role that bypasses the JWT/auth path, so this worker
  # builds all games' rollups without ever calling the server.
  cube_refresh_worker:
    # :latest only — the network-isolated kraken runner can't cold-pull pinned tags
    # (see cube_api note above). Keep in lockstep with cube_api.
    image: cubejs/cube:latest
    container_name: cube-playground-cube-refresh-worker
    environment:
      CUBEJS_DEV_MODE: "false"
      CUBEJS_LOG_LEVEL: ${CUBEJS_LOG_LEVEL:-info}
      CUBEJS_SCHEMA_PATH: model
      TZ: ${TZ:-UTC}
      DEBUG_LOG: ${DEBUG_LOG:-false}
      # Trino connection — identical to cube_api (same Vault/.env values) so the
      # worker builds rollups from exactly the source the API would query.
      CUBEJS_DB_TYPE: ${CUBEJS_DB_TYPE:-trino}
      CUBEJS_DB_HOST: ${CUBEJS_DB_HOST:-}
      CUBEJS_DB_PORT: ${CUBEJS_DB_PORT:-8080}
      CUBEJS_DB_USER: ${CUBEJS_DB_USER:-}
      CUBEJS_DB_PASS: ${CUBEJS_DB_PASS:-}
      CUBEJS_DB_PRESTO_CATALOG: ${CUBEJS_DB_PRESTO_CATALOG:-game_integration}
      CUBEJS_DB_CATALOG: ${CUBEJS_DB_CATALOG:-game_integration}
      CUBEJS_DB_SSL: ${CUBEJS_DB_SSL:-true}
      # Must match cube_api so both sides agree on the model compile context.
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-}
      # Writes per-game preagg_<game>.* rollups into the same CubeStore the API reads.
      CUBEJS_CUBESTORE_HOST: cubestore
      CUBEJS_CUBESTORE_PORT: "3030"
      # Bound the first backfill fan-out against Trino (games × rollups × ~29
      # monthly partitions on a cold volume). Incremental hourly refresh is cheap.
      CUBEJS_REFRESH_WORKER_CONCURRENCY: ${CUBEJS_REFRESH_WORKER_CONCURRENCY:-2}
      # THIS is the refresh worker, sweeping every 5 min instead of the 30s
      # default: one full partition-plan sweep is CPU-bound for minutes, so
      # back-to-back sweeps starve the event loop and /readyz, flagging the
      # container unhealthy while it still works. Deliberately NOT using
      # CUBEJS_REFRESH_WORKER here — that boolean short-circuits Cube's
      # refreshWorkerMode env chain and the numeric timer below would be
      # ignored (interval silently stays 30s). The numeric timer alone both
      # enables worker mode and sets the sweep interval (seconds).
      CUBEJS_SCHEDULED_REFRESH_TIMER: ${CUBEJS_SCHEDULED_REFRESH_TIMER:-300}
      # Pre-aggregation partitions are built per query timezone; a query whose
      # timezone wasn't built hard-fails ("No pre-aggregation partitions built
      # yet"). The UI sends the viewer's browser timezone (Asia/Saigon), so
      # build both it and UTC. Date-grain data makes the extra timezone cheap.
      CUBEJS_SCHEDULED_REFRESH_TIMEZONES: ${CUBEJS_SCHEDULED_REFRESH_TIMEZONES:-UTC,Asia/Saigon}
      # Auth bridge kept for config parity only: refresh contexts are synthetic
      # and never hit checkAuth, so the worker tolerates the server being down.
      AUTH_API_URL: http://server:3004
      AUTH_INTERNAL_SECRET: ${CUBE_AUTH_INTERNAL_SECRET:-}
    entrypoint: ["/usr/local/bin/cube-entrypoint-patched.sh"]
    command: ["cubejs", "server"]
    # No published ports: the worker serves no traffic. Its internal :4000 exists
    # only for the /readyz healthcheck below.
    volumes:
      - ./cube-dev/cube:/cube/conf:ro
      - ./docker/cube-entrypoint-patched.sh:/usr/local/bin/cube-entrypoint-patched.sh:ro
    depends_on:
      - cubestore
    # Same wedge-detection probe as cube_api: a stuck refresh loop keeps the
    # process "running" while the event loop starves — surface it as unhealthy.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 6s
      start_period: 90s
      retries: 3
    restart: unless-stopped

  cubestore:
    # :latest matches the live cube-api stack already cached on the kraken runner
    # (avoids a cold Hub pull on this network-isolated daemon). NOT multi-arch —
    # the default tag is the amd64 build for the linux runner. Set
    # CUBESTORE_TAG=v1.6.46-arm64v8 only for local arm64 (Apple Silicon).
    image: cubejs/cubestore:${CUBESTORE_TAG:-latest}
    container_name: cube-playground-cubestore
    environment:
      CUBESTORE_DATA_DIR: /cube/data
    volumes:
      - cubestore_data:/cube/data
    restart: unless-stopped
    # Probe the WS/HTTP port the Cube drivers actually use. CubeStore can lose
    # this listener while the process stays up (observed after a host-clock jump:
    # the 3030 server thread panics but 3031/3306 keep answering), which
    # otherwise reads as a healthy "Up" container while every pre-agg build and
    # rollup read fails with ECONNREFUSED. bash /dev/tcp = no extra binaries.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/3030"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  # Persist SQLite across container recreates — without these the DBs reset on
  # every deploy (RBAC, drift-center, connectors, audit, chat history all lost).
  server-data:
  chat-data:
  # Cube Store pre-aggregations — persist so rollups survive redeploys.
  cubestore_data:
