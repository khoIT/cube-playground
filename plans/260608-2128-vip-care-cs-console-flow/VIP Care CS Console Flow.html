<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VIP Care CS Console — Flow</title>
<!--
  FLOW PROTOTYPE — Junior pass. Anchored to cube-playground design tokens (src/theme/tokens.css):
  Inter font, brand #f05a22, neutral scale, semantic soft/ink status pairs, page-header pattern.

  Purpose: show how a CS manager moves across THREE connected surfaces — not 21 dashboards:
    (A) Dashboards / CS   = 21-playbook monitor grid (read-only portfolio)
    (B) Case Ledger       = stateful queue, two lenses: By Playbook  /  By VIP (action queue)
    (C) Member-360 Care   = per-user treatment history across every playbook

  Pilot game = cfm_vn. Data-readiness badges reflect REAL cfm availability (live / partial / blocked).
  Numbers are illustrative mock data for layout only.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#f05a22; --brand-hover:#f54a00; --brand-soft:#fff7ed;
  --bg-app:#fafafa; --bg-card:#fff; --bg-muted:#f5f5f5;
  --border-card:#e5e5e5; --border-strong:#d4d4d4;
  --text-primary:#171717; --text-secondary:#404040; --text-muted:#737373; --text-on-brand:#fff;
  --success:#059669; --warning:#f59e0b; --danger:#ef4444; --info:#3f8dff;
  --success-soft:#d1fae5; --success-ink:#047857;
  --warning-soft:#fef3c7; --warning-ink:#92400e;
  --destructive-soft:#fee2e2; --destructive-ink:#991b1b;
  --info-soft:#dbeafe; --info-ink:#1d4ed8;
  --muted-soft:#f5f5f5; --muted-ink:#525252;
  --radius-sm:6px; --radius-md:8px; --radius-lg:10px; --radius-xl:12px; --radius-full:9999px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}

/* ---- left rail ---- */
.rail{width:212px;flex:0 0 212px;background:var(--bg-card);border-right:1px solid var(--border-card);padding:14px 10px;position:sticky;top:0;height:100vh;overflow:auto}
.brandrow{display:flex;align-items:center;gap:8px;padding:6px 8px 14px}
.logo{width:22px;height:22px;border-radius:6px;background:var(--brand);display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px}
.brandrow b{font-size:13px;letter-spacing:-.01em}
.navsec{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:12px 10px 5px;font-weight:600}
.navitem{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--radius-md);color:var(--text-secondary);font-weight:500;cursor:default;font-size:12.5px}
.navitem .ic{width:15px;height:15px;color:var(--text-muted)}
.navitem.active{background:var(--brand-soft);color:var(--brand-hover);font-weight:600}
.navitem.active .ic{color:var(--brand)}
.navitem.child{padding-left:30px;font-size:12px}
.navitem.cs{cursor:pointer}

/* ---- main ---- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:11px 28px;border-bottom:1px solid var(--border-card);background:var(--bg-card);position:sticky;top:0;z-index:20}
/* flow map breadcrumb */
.flowmap{display:flex;align-items:center;gap:2px;font-size:12px}
.fm-step{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:var(--radius-full);color:var(--text-muted);font-weight:500;cursor:pointer;border:1px solid transparent;white-space:nowrap}
.fm-step:hover{background:var(--bg-muted)}
.fm-step.on{background:#171717;color:#fff}
.fm-step .n{width:17px;height:17px;border-radius:var(--radius-full);background:var(--bg-muted);color:var(--text-muted);display:grid;place-items:center;font-size:10px;font-weight:700}
.fm-step.on .n{background:var(--brand);color:#fff}
.fm-step.done .n{background:var(--success-soft);color:var(--success-ink)}
.fm-arrow{color:var(--border-strong);font-size:14px;padding:0 2px}
.spacer{flex:1}
.gamechip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--text-secondary);background:var(--bg-muted);padding:5px 11px;border-radius:var(--radius-full)}
.gamechip .dot{width:7px;height:7px;border-radius:50%;background:var(--success)}
.avatar{width:28px;height:28px;border-radius:50%;background:#262626;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600}

.content{padding:24px 32px;max-width:1320px;margin:0 auto;width:100%}
.eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-muted);font-weight:600;margin-bottom:5px}
.pagehead{display:flex;align-items:center;gap:11px;margin-bottom:4px}
.pagehead .hic{width:24px;height:24px;color:var(--brand)}
.pagehead h1{font-size:20px;font-weight:700;letter-spacing:-.02em;margin:0}
.subhead{color:var(--text-muted);font-size:12.5px;margin:2px 0 20px}

/* ---- portfolio strip ---- */
.strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.stat{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-xl);padding:14px 16px;box-shadow:var(--shadow-sm)}
.stat .k{font-size:11px;color:var(--text-muted);font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:7px}
.stat .v{font-size:23px;font-weight:700;letter-spacing:-.02em;line-height:1}
.stat .v small{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0}
.stat .sub{font-size:11px;color:var(--text-muted);margin-top:5px}
.v.warn{color:var(--warning-ink)} .v.bad{color:var(--destructive-ink)} .v.good{color:var(--success-ink)}

/* ---- playbook grid ---- */
.card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);overflow:hidden}
.grouphdr{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--bg-muted);border-bottom:1px solid var(--border-card);cursor:pointer;user-select:none}
.grouphdr .chev{color:var(--text-muted);transition:transform .15s}
.grouphdr .gname{font-weight:700;font-size:13px}
.grouphdr .gcount{font-size:11px;color:var(--text-muted)}
.grouphdr .gright{margin-left:auto;font-size:11px;color:var(--text-muted);display:flex;gap:12px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);font-weight:600;text-align:left;padding:8px 16px;border-bottom:1px solid var(--border-card);background:var(--bg-card)}
thead th.num{text-align:right}
tbody td{padding:10px 16px;border-bottom:1px solid var(--border-card);font-size:12.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.row{cursor:pointer}
tbody tr.row:hover{background:var(--brand-soft)}
tbody tr.blocked{opacity:.55;cursor:not-allowed}
tbody tr.blocked:hover{background:transparent}
.pbname{font-weight:600;color:var(--text-primary)}
.pbid{color:var(--text-muted);font-weight:500;font-variant-numeric:tabular-nums;margin-right:8px}
.num{text-align:right;font-variant-numeric:tabular-nums}
.metcell{font-size:11.5px;color:var(--text-secondary)}
.metcell b{color:var(--text-primary)}
.spark{display:inline-flex;align-items:flex-end;gap:1.5px;height:18px}
.spark i{width:3px;border-radius:1px;background:var(--border-strong)}
.spark.up i{background:var(--success)} .spark.down i{background:var(--danger)}
.dot-st{display:inline-block;width:9px;height:9px;border-radius:50%}
.st-green{background:var(--success)} .st-amber{background:var(--warning)} .st-red{background:var(--danger)} .st-grey{background:var(--border-strong)}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:var(--radius-full);white-space:nowrap}
.b-live{background:var(--success-soft);color:var(--success-ink)}
.b-partial{background:var(--warning-soft);color:var(--warning-ink)}
.b-blocked{background:var(--muted-soft);color:var(--muted-ink)}
.b-cao{background:var(--destructive-soft);color:var(--destructive-ink)}
.b-tb{background:var(--info-soft);color:var(--info-ink)}
.b-thap{background:var(--muted-soft);color:var(--muted-ink)}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--radius-full);background:var(--bg-muted);color:var(--text-secondary)}

/* tabs / toggles */
.segctl{display:inline-flex;background:var(--bg-muted);border-radius:var(--radius-md);padding:3px;gap:2px}
.segctl button{border:0;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:var(--text-muted);padding:6px 13px;border-radius:var(--radius-sm);cursor:pointer}
.segctl button.on{background:var(--bg-card);color:var(--text-primary);box-shadow:var(--shadow-sm)}

.hint{display:flex;gap:9px;align-items:flex-start;background:var(--info-soft);border:1px solid #bfdbfe;color:#1e3a8a;padding:10px 14px;border-radius:var(--radius-md);font-size:12px;margin-bottom:16px}
.hint b{font-weight:700}

/* queue rows */
.qcase{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:var(--radius-full);background:var(--bg-muted);color:var(--text-secondary);margin-right:5px}
.qcase .d{width:7px;height:7px;border-radius:50%}
.statepill{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:.03em}
.s-new{background:var(--brand-soft);color:var(--brand-hover)}
.s-review{background:var(--info-soft);color:var(--info-ink)}
.s-treated{background:var(--success-soft);color:var(--success-ink)}
.fatigue{display:inline-flex;align-items:center;gap:5px;color:var(--warning-ink);font-weight:600;font-size:11px}
.btn{border:1px solid var(--border-strong);background:var(--bg-card);font-family:inherit;font-size:12px;font-weight:600;color:var(--text-secondary);padding:6px 12px;border-radius:var(--radius-md);cursor:pointer}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-hover)}
.btn.sm{padding:4px 10px;font-size:11px}

/* member 360 */
.m-head{display:flex;gap:18px;align-items:center;background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-xl);padding:18px 20px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.m-av{width:54px;height:54px;border-radius:var(--radius-lg);background:#171717;color:#fff;display:grid;place-items:center;font-size:18px;font-weight:700}
.m-id{font-size:17px;font-weight:700;letter-spacing:-.01em}
.m-meta{color:var(--text-muted);font-size:12px;margin-top:3px;display:flex;gap:14px;flex-wrap:wrap}
.m-meta b{color:var(--text-secondary)}
.m-kpis{margin-left:auto;display:flex;gap:22px}
.m-kpi .kk{font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.m-kpi .vv{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.tabbar{display:flex;gap:2px;border-bottom:1px solid var(--border-card);margin-bottom:18px}
.tab{padding:9px 15px;font-size:12.5px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--brand-hover);border-bottom-color:var(--brand)}

/* care timeline */
.tl{position:relative;padding-left:26px}
.tl:before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--border-card)}
.tlitem{position:relative;padding:0 0 20px}
.tlitem:last-child{padding-bottom:0}
.tldot{position:absolute;left:-26px;top:1px;width:16px;height:16px;border-radius:50%;border:3px solid var(--bg-app);box-shadow:0 0 0 1px var(--border-strong)}
.tldot.green{background:var(--success)} .tldot.amber{background:var(--warning)} .tldot.brand{background:var(--brand)} .tldot.grey{background:var(--border-strong)}
.tlcard{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--radius-lg);padding:12px 15px;box-shadow:var(--shadow-sm)}
.tlrow1{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.tlrow1 .pb{font-weight:700;font-size:12.5px}
.tlrow1 .when{margin-left:auto;color:var(--text-muted);font-size:11px}
.tltxt{font-size:12px;color:var(--text-secondary)}
.tltxt .ch{display:inline-flex;align-items:center;gap:4px;font-weight:600;color:var(--text-primary)}
.kpi-tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:var(--radius-full);margin-left:8px}
.kpi-met{background:var(--success-soft);color:var(--success-ink)} .kpi-wait{background:var(--warning-soft);color:var(--warning-ink)}

.foot{color:var(--text-muted);font-size:11px;text-align:center;padding:20px}
.rowedit{border:0;background:transparent;color:var(--text-muted);cursor:pointer;padding:3px;margin-left:8px;border-radius:var(--radius-sm);vertical-align:middle;opacity:0;transition:opacity .12s}
tbody tr.row:hover .rowedit{opacity:1}
.rowedit:hover{background:var(--bg-muted);color:var(--brand)}
/* builder */
.bform{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.inp{width:100%;border:1px solid var(--border-strong);border-radius:var(--radius-md);padding:9px 11px;font-family:inherit;font-size:13px;color:var(--text-primary);background:var(--bg-card)}
.sectit{font-size:13px;font-weight:700;margin:22px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--border-card);display:flex;align-items:center;gap:8px}
.predrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.predrow .mem{background:rgb(231,238,255);color:rgb(74,96,156);font-weight:600;font-size:12px;padding:6px 10px;border-radius:var(--radius-sm)}
.predrow .op{background:var(--bg-muted);font-weight:600;font-size:12px;padding:6px 10px;border-radius:var(--radius-sm)}
.chipsel{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border-strong);border-radius:var(--radius-full);padding:5px 11px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer}
.chipsel.on{background:var(--brand-soft);border-color:var(--brand);color:var(--brand-hover)}
.calib{background:var(--success-soft);border:1px solid #a7f3d0;color:var(--success-ink);border-radius:var(--radius-md);padding:10px 13px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;margin-top:6px}
.legend{display:flex;gap:16px;align-items:center;font-size:11px;color:var(--text-muted);margin:14px 2px 0;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:6px}
</style>
</head>

const {useState} = React;

/* tiny inline icon set (stroke) */

/* spark generator */
function Spark({dir}){const bars=dir==='up'?[5,7,6,9,11,14]:[14,11,9,7,5,4];return(<span className={"spark "+dir}>{bars.map((h,i)=><i key={i} style={{height:h}}/>)}</span>);}

/* ---------- DATA (cfm_vn, illustrative) ---------- */
const STATUS_BADGE={live:["b-live","Live data"],partial:["b-partial","Partial"],blocked:["b-blocked","Needs model"]};
const PRIO={Cao:["b-cao","Cao"],TB:["b-tb","Trung bình"],Thap:["b-thap","Thấp"]};

const GROUPS=[
 {key:"g1",name:"NHÓM 1 · Nạp tiền (Payment)",rows:[
   {id:"01",name:"First deposit",pop:46,fired:46,met:"Repeat 14d 52%→50%",att:104,trend:"up",st:"green",data:"partial",prio:"TB"},

   {id:"05",name:"Payment failure",pop:null,fired:null,met:"—",att:null,trend:null,st:"grey",data:"blocked",prio:"Cao"},
 ]},
 {key:"g2",name:"NHÓM 2 · Hành vi in-game",rows:[

         <div className="sectit"><I d={ic.users} s={15}/>Condition · predicate builder</div>
         <div className="predrow"><span className="mem">mf_users.payer_tier</span><span className="op">in</span><input className="inp" style={{maxWidth:170}} defaultValue="whale, dolphin"/></div>
         <div style={{fontSize:11,color:'var(--text-muted)',margin:'4px 0 8px 4px'}}>AND</div>
         <div className="predrow"><span className="mem">user_recharge_daily · 7d/30d</span><span className="op">ratio &lt;</span><input className="inp" style={{maxWidth:90}} defaultValue="0.30"/></div>
         <div className="calib"><I d={ic.check} s={14}/> ≈ 128 VIPs qualify now · calibrated against live cfm_vn distribution</div>

         <div className="sectit"><I d={ic.pulse} s={15}/>Watched metric & KPI</div>
         <div style={{display:'flex',gap:14}}>
           <div className="fld" style={{flex:1}}><label>Metric</label><input className="inp" defaultValue="Recovery rate 30d"/></div>
           <div className="fld" style={{flex:1}}><label>KPI target</label><input className="inp" defaultValue="≥ 35%"/></div>
         </div>

         <div className="sectit"><I d={ic.send} s={15}/>Action & channel</div>
         <div className="fld"><label>Recommended action</label><input className="inp" defaultValue="AM proactive check-in + personalised comeback offer"/></div>
         <div className="fld"><label>Channels</label>
           <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['In-game','Zalo ZNS','Call','Push'].map(c=><span key={c} className={"chipsel "+(chs.includes(c)?'on':'')} onClick={()=>tog(c)}>{chs.includes(c)&&<I d={ic.check} s={12}/>}{c}</span>)}</div></div>
         <div className="fld" style={{maxWidth:200}}><label>SLA (minutes)</label><input className="inp" defaultValue="1440"/></div>

         <div style={{display:'flex',gap:10,marginTop:20}}>
           <button className="btn primary"><I d={ic.check} s={14}/> Save playbook</button>
           <button className="btn" onClick={back}>Cancel</button>
         </div>
       </div>

       <div>
         <div className="card" style={{padding:16}}>
           <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>Data readiness</div>
           <div style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>Members resolve against each game's live <b>/meta</b>. Pick a member a game lacks → that playbook is <b>unavailable</b> there (can't enable).</div>
           <div style={{marginTop:12,display:'grid',gap:8}}>
             <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,fontWeight:600}}>cfm_vn</span><span className="badge b-live">Available</span></div>
             <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,fontWeight:600}}>jus_vn</span><span className="badge b-live">Available</span></div>
           </div>
           <div style={{fontSize:11,color:'var(--text-muted)',marginTop:12,paddingTop:12,borderTop:'1px solid var(--border-card)'}}>Threshold stored as a <b>rule</b> (ratio 0.30), recomputed each refresh — not a frozen number.</div>
         </div>
       </div>
     </div>
   </div>
  );
}

/* ---------- ROOT ---------- */
function App(){
  const [view,setView]=useState('monitor');     // monitor | queue | member
  const [qmode,setQmode]=useState('playbook');
  const [pb,setPb]=useState(null);
  const [uid,setUid]=useState('player_8821');

  const openPlaybook=(r)=>{setPb(r);setQmode('playbook');setView('queue');};
  const openQueue=(m)=>{setQmode(m||'vip');setView('queue');};
  const openMember=(u)=>{setUid(u);setView('member');};
  const openBuilder=(r)=>{setPb(r);setView('builder');};
  const go=(v)=>setView(v);

  return(
    <div className="app">
      <Rail onCS={()=>setView('monitor')}/>
      <div className="main">
        <Top view={view} go={go}/>
        {view==='monitor'&&<Monitor openPlaybook={openPlaybook} openQueue={openQueue} openBuilder={openBuilder}/>}
        {view==='queue'&&<Queue mode={qmode} setMode={setQmode} playbook={pb} openMember={openMember} back={()=>setView('monitor')}/>}
        {view==='member'&&<Member uid={uid} back={()=>setView('queue')}/>}
        {view==='builder'&&<Builder playbook={pb} back={()=>setView('monitor')}/>}
        <div className="foot">Flow prototype · cfm_vn · mock data · anchored to cube-playground design tokens. Click the flow-map breadcrumb or rows to navigate.</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
