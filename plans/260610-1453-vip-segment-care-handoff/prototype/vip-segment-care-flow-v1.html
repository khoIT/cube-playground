<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VIP Segment Care — end-to-end flow prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
/* ── Token subset copied verbatim from src/theme/tokens.css so this prototype
      is production-faithful. Do not invent values here. ───────────────────── */
:root{
  --neutral-50:#fafafa; --neutral-100:#f5f5f5; --neutral-150:#ededed; --neutral-200:#e5e5e5;
  --neutral-300:#d4d4d4; --neutral-400:#a3a3a3; --neutral-500:#737373; --neutral-600:#525252;
  --neutral-700:#404040; --neutral-800:#262626; --neutral-900:#171717;
  --orange-50:#fff7ed; --orange-600:#f05a22; --orange-700:#f54a00; --orange-900:#7c2d12;
  --brand:var(--orange-600); --brand-hover:var(--orange-700); --brand-soft:var(--orange-50);
  --bg-app:var(--neutral-50); --bg-card:#ffffff; --bg-muted:var(--neutral-100);
  --border-card:var(--neutral-200); --border-strong:var(--neutral-300);
  --text-primary:var(--neutral-900); --text-secondary:var(--neutral-700); --text-muted:var(--neutral-500);
  --text-on-brand:#fff;
  --success:#059669; --warning:#f59e0b; --danger:#ef4444; --info:#3f8dff;
  --success-soft:#d1fae5; --success-ink:#047857;
  --warning-soft:#fef3c7; --warning-ink:#92400e;
  --destructive-soft:#fee2e2; --destructive-ink:#991b1b;
  --info-soft:#dbeafe; --info-ink:#1d4ed8;
  --muted-soft:#f5f5f5; --muted-ink:#525252;
  --radius-xs:4px; --radius-sm:6px; --radius-md:8px; --radius-lg:10px; --radius-xl:12px; --radius-2xl:16px; --radius-full:9999px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --positive:#15803d; --negative:#b91c1c;
  --header-h:44px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-sans);
  font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
.tnum{font-variant-numeric:tabular-nums;}
/* hover affordances (inline styles can't do :hover) */
.row-hover{transition:background .12s ease;}
.row-hover:hover{background:var(--bg-muted);}
.lift:hover{box-shadow:var(--shadow-sm);}
.btn-primary{background:var(--brand);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:600;transition:background .12s;}
.btn-primary:hover{background:var(--brand-hover);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{background:var(--bg-card);border:1px solid var(--border-card);color:var(--text-secondary);font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;transition:border-color .12s,color .12s;}
.btn-secondary:hover{border-color:var(--border-strong);color:var(--text-primary);}
.ghost{background:transparent;border:none;color:var(--text-muted);font-size:12px;padding:4px 8px;border-radius:6px;}
.ghost:hover{color:var(--text-primary);background:var(--bg-muted);}
.choice-card{transition:border-color .12s, box-shadow .12s, background .12s;}
.choice-card:hover{border-color:var(--border-strong);}
.scroll::-webkit-scrollbar{width:9px;height:9px;}
.scroll::-webkit-scrollbar-thumb{background:var(--neutral-300);border-radius:9999px;}
@keyframes slideIn{from{transform:translateX(24px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pop{0%{transform:scale(.96);opacity:0;}100%{transform:scale(1);opacity:1;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useMemo} = React;

/* ───────────────────────── token helpers ───────────────────────── */
const T = {
  text:'var(--text-primary)', sec:'var(--text-secondary)', muted:'var(--text-muted)',
  card:'var(--bg-card)', app:'var(--bg-app)', mutedBg:'var(--bg-muted)',
  border:'var(--border-card)', borderStrong:'var(--border-strong)', brand:'var(--brand)',
};
// semantic soft/ink chip palettes
const CHIP = {
  info:{bg:'var(--info-soft)',fg:'var(--info-ink)'},
  success:{bg:'var(--success-soft)',fg:'var(--success-ink)'},
  warning:{bg:'var(--warning-soft)',fg:'var(--warning-ink)'},
  destructive:{bg:'var(--destructive-soft)',fg:'var(--destructive-ink)'},
  muted:{bg:'var(--muted-soft)',fg:'var(--muted-ink)'},
  brand:{bg:'var(--brand-soft)',fg:'var(--orange-900)'},
};

/* priority cao/tb/thap → chip + label */
const PRIORITY = {
  cao:{chip:'destructive', label:'Cao'},   // high
  tb:{chip:'warning', label:'TB'},         // medium
  thap:{chip:'muted', label:'Thấp'},       // low
};
const STATUS = {
  new:{chip:'info', label:'New'},
  in_review:{chip:'warning', label:'In review'},
  treated:{chip:'brand', label:'Treated'},
  resolved:{chip:'success', label:'Resolved'},
  dismissed:{chip:'muted', label:'Dismissed'},
};

/* ───────────────────────── playbook catalog (real cfm_vn-available ones) ───────────────────────── */
const PB = {
  pb04:{id:'04', nhom:1, group:'Payment', name:'Spend drop', priority:'cao',
    cond:'7d daily spend < 30% of 30d avg', kpi:'spend back ≥ 60% baseline in 14d',
    action:'Reach out; understand friction, targeted retention offer', channels:['Call','Zalo ZNS'], sla:'24h'},
  pb14:{id:'14', nhom:3, group:'Churn', name:'Lapse risk', priority:'cao',
    cond:'engaged VIP, no login 7–14d', kpi:'return to active within 7d',
    action:'Win-back: personal check-in + comeback reward', channels:['Call','Zalo ZNS'], sla:'24h'},
  pb12:{id:'12', nhom:2, group:'In-game', name:'Gacha bad-luck', priority:'tb',
    cond:'pity counter high, no SSR in N draws', kpi:'satisfaction; no rage-quit',
    action:'Goodwill: bonus draw / pity boost + apology note', channels:['In-game','Zalo ZNS'], sla:'12h'},
  pb02:{id:'02', nhom:1, group:'Payment', name:'VIP tier reached', priority:'cao',
    cond:'crossed a cumulative-LTV tier band', kpi:'ARPU90d sustained post-treatment',
    action:'Congratulate; deliver tier benefits + dedicated AM intro', channels:['Call','Zalo ZNS'], sla:'12h'},
};

/* ───────────────────────── synthetic cfm_vn cohort (80 members; 8 shown) ───────────────────────── */
const fmtVnd = (n)=> n>=1e9? '₫'+(n/1e9).toFixed(2)+'B' : n>=1e6? '₫'+(n/1e6).toFixed(1)+'M' : '₫'+n.toLocaleString();
const tierLabel = (ltv)=> ltv>=100e6?'Tier 4':ltv>=50e6?'Tier 3':ltv>=20e6?'Tier 2':'Tier 1';

const SEED = [
  {uid:'88401273', name:'Nguyễn Văn Hùng', ltv:128_400_000, churn:3, drop:-81, pbs:['pb04','pb12'], status:'new'},
  {uid:'88407755', name:'Trần Minh Quân', ltv:64_200_000, churn:6, drop:-74, pbs:['pb04','pb14'], status:'new'},
  {uid:'88412980', name:'Lê Hoàng Long', ltv:52_900_000, churn:2, drop:-68, pbs:['pb04'], status:'in_review', owner:'You'},
  {uid:'88419002', name:'Phạm Quốc Bảo', ltv:41_100_000, churn:9, drop:-77, pbs:['pb04','pb14'], status:'new'},
  {uid:'88423641', name:'Vũ Đức Anh', ltv:33_500_000, churn:1, drop:-62, pbs:['pb04','pb12'], status:'new'},
  {uid:'88429318', name:'Đỗ Gia Huy', ltv:27_800_000, churn:11, drop:-85, pbs:['pb04','pb14'], status:'treated', owner:'You',
    kpi:'watching', treatment:{channel:'Call', text:'Comeback reward + retention offer', when:'2h ago'}},
  {uid:'88433507', name:'Bùi Thanh Tùng', ltv:22_600_000, churn:4, drop:-59, pbs:['pb04'], status:'new'},
  {uid:'88440912', name:'Hồ Nhật Nam', ltv:21_300_000, churn:7, drop:-71, pbs:['pb04','pb12'], status:'new'},
];
// overall priority = highest among tripped playbooks
const topPriority = (pbs)=>{
  const order={cao:3,tb:2,thap:1};
  return pbs.map(k=>PB[k].priority).sort((a,b)=>order[b]-order[a])[0];
};

/* ───────────────────────── small UI atoms ───────────────────────── */
function Chip({kind, children, style}){
  const c = CHIP[kind]||CHIP.muted;
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:c.bg,color:c.fg,
    fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:'var(--radius-full)',lineHeight:1.4,
    whiteSpace:'nowrap',...style}}>{children}</span>;
}
function PbPill({pbKey, onClick}){
  const p = PB[pbKey];
  const c = CHIP[PRIORITY[p.priority].chip];
  return <span onClick={onClick} title={p.cond}
    style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,
      padding:'2px 8px 2px 6px',borderRadius:'var(--radius-md)',whiteSpace:'nowrap',
      background:c.bg,color:c.fg, cursor:onClick?'pointer':'default'}}>
    <span style={{fontFamily:'monospace',fontSize:10,opacity:.8}}>{p.id}</span>{p.name}
  </span>;
}
function Eyebrow({children}){
  return <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',
    color:T.muted,marginBottom:6}}>{children}</div>;
}

/* ═══════════════════════════ APP SHELL ═══════════════════════════ */
const STEPS = [
  {n:1,label:'Seam'},{n:2,label:'Triage'},{n:3,label:'Understand'},{n:4,label:'Act'},{n:5,label:'Close loop'},
];
function App(){
  const [route,setRoute] = useState('segment');     // 'segment' | 'queue'
  const [model,setModel] = useState('A');            // 'A' | 'B'
  const [seamOpen,setSeamOpen] = useState(false);
  const [selUid,setSelUid] = useState(null);         // member-360 drawer
  const [treatUid,setTreatUid] = useState(null);     // treat modal
  const [advanced,setAdvanced] = useState(false);    // simulate +14d
  const [cases,setCases] = useState(()=>SEED.map(s=>({...s})));
  const [step,setStep] = useState(1);

  // Model B single attached action (chosen in the seam)
  const [bAction,setBAction] = useState('pb04');

  const enterCare = (chosenModel)=>{
    setModel(chosenModel);
    setSeamOpen(false);
    setRoute('queue');
    setStep(2);
  };
  const openMember = (uid)=>{ setSelUid(uid); setStep(s=>Math.max(s,3)); };
  const claim = (uid)=> setCases(cs=>cs.map(c=>c.uid===uid?{...c,status:c.status==='new'?'in_review':c.status,owner:'You'}:c));
  const treat = (uid,payload)=>{
    setCases(cs=>cs.map(c=>c.uid===uid?{...c,status:'treated',owner:'You',kpi:'watching',
      treatment:{...payload,when:'just now'}}:c));
    setTreatUid(null); setStep(5);
  };
  const advance = ()=>{
    setAdvanced(true);
    setCases(cs=>cs.map(c=> c.status==='treated' ? {...c, kpi: c.uid==='88440912'?'missed':'recovered',
      status: c.uid==='88440912'?'treated':'resolved'} : c));
    setStep(5);
  };

  const sel = cases.find(c=>c.uid===selUid);
  const treatRec = cases.find(c=>c.uid===treatUid);

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <TopBar step={step}/>
      <div style={{flex:1,display:'flex',justifyContent:'center'}}>
        <div style={{width:'100%',maxWidth: route==='segment'?900:1300, padding:'24px 32px', margin:'0 auto'}}>
          {route==='segment'
            ? <SegmentDetail onSend={()=>{setSeamOpen(true);}} count={cases.length}/>
            : <CareQueue cases={cases} model={model} bAction={bAction} advanced={advanced}
                onOpen={openMember} onModel={setModel} onBack={()=>{setRoute('segment');setStep(1);}}
                onAdvance={advance}/>}
        </div>
      </div>

      {seamOpen && <SeamModal bAction={bAction} setBAction={setBAction}
        onClose={()=>setSeamOpen(false)} onConfirm={enterCare} count={cases.length}/>}
      {sel && <Member360 rec={sel} model={model} bAction={bAction} advanced={advanced}
        onClose={()=>setSelUid(null)} onClaim={()=>claim(sel.uid)} onTreat={()=>setTreatUid(sel.uid)}/>}
      {treatRec && <TreatModal rec={treatRec} onClose={()=>setTreatUid(null)}
        onConfirm={(p)=>treat(treatRec.uid,p)}/>}
    </div>
  );
}

/* ───────── top bar with breadcrumb + 5-beat stepper (demo aid) ───────── */
function TopBar({step}){
  return (
    <div style={{height:'var(--header-h)',borderBottom:'1px solid var(--border-card)',background:'var(--bg-card)',
      display:'flex',alignItems:'center',padding:'0 20px',gap:16,position:'sticky',top:0,zIndex:20}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:18,height:18,borderRadius:5,background:'var(--brand)'}}/>
        <span style={{fontWeight:700,fontSize:13}}>cube‑playground</span>
        <span style={{color:T.muted}}>/</span>
        <span style={{color:T.sec,fontSize:12}}>cfm_vn</span>
      </div>
      <div style={{flex:1}}/>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        {STEPS.map((s,i)=>(
          <React.Fragment key={s.n}>
            {i>0 && <span style={{color:'var(--neutral-300)',fontSize:11}}>›</span>}
            <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11.5,fontWeight:step===s.n?700:500,
              color: step===s.n?'var(--brand)':(step>s.n?T.sec:T.muted), padding:'4px 8px',borderRadius:'var(--radius-full)',
              background: step===s.n?'var(--brand-soft)':'transparent'}}>
              <span style={{width:16,height:16,borderRadius:'50%',display:'inline-flex',alignItems:'center',
                justifyContent:'center',fontSize:10,fontWeight:700,
                background: step>=s.n?'var(--brand)':'var(--neutral-200)', color: step>=s.n?'#fff':T.muted}}>{s.n}</span>
              {s.label}
            </span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════ BEAT 1 · SEAM — segment detail ═══════════════ */
function SegmentDetail({onSend, count}){
  return (
    <div style={{animation:'fadeIn .2s ease'}}>
      <Eyebrow>Segment · cfm_vn</Eyebrow>
      <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
          <IconUsers/>
          <h1 style={{margin:0,fontSize:20,fontWeight:700,color:T.text}}>VIP · spend‑drop watch</h1>
        </div>
        {/* command bar (matches segment-detail .commandBar pattern) */}
        <div style={{display:'flex',alignItems:'center',gap:0,background:'var(--bg-card)',
          border:'1px solid var(--border-strong)',borderRadius:'var(--radius-md)',overflow:'hidden'}}>
          <button className="ghost" style={{height:28,borderRadius:0}}>Share</button>
          <span style={{width:1,height:18,background:'var(--border-card)'}}/>
          <button className="ghost" style={{height:28,borderRadius:0}}>Refresh</button>
          <span style={{width:1,height:18,background:'var(--border-card)'}}/>
          <button className="ghost" style={{height:28,borderRadius:0}}>Open in Playground</button>
        </div>
        <button className="btn-primary" onClick={onSend} style={{display:'inline-flex',alignItems:'center',gap:7}}>
          <IconSend/> Send to CS Care
        </button>
      </div>
      <p style={{margin:'8px 0 20px',fontSize:13,color:T.muted,maxWidth:'62ch'}}>
        Built from a natural‑language query in Chat → saved here as a live segment. The metrics store
        defines <b style={{color:T.sec}}>who</b>; the CS Dashboard supplies <b style={{color:T.sec}}>what to do</b>.
      </p>

      {/* KPI tiles */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:16}}>
        <Tile label="Members" value={String(count*10)} sub="live · refreshes daily"/>
        <Tile label="Median LTV" value="₫38.4M" sub="all ≥ ₫20M (Tier 2+)"/>
        <Tile label="Avg 7d spend Δ" value="−71%" sub="vs personal 30d baseline" tone="negative"/>
        <Tile label="At churn risk" value="34%" sub="no login 7–14d" tone="warning"/>
      </div>

      {/* definition */}
      <Card style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <span style={{fontSize:14,fontWeight:600}}>Definition</span>
          <Chip kind="success">● live</Chip>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
          <DefPill type="cube">cfm_vn</DefPill>
          <DefPill type="measure">mf_users.ltv_total_vnd</DefPill>
          <span style={{color:T.muted,fontSize:12}}>≥ 20,000,000</span>
          <span style={{color:'var(--neutral-300)'}}>·</span>
          <DefPill type="measure">user_recharge_rolling.qualified_drop_ratio</DefPill>
          <span style={{color:T.muted,fontSize:12}}>&lt; 0.30</span>
        </div>
      </Card>

      {/* members preview */}
      <Card>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,padding:'2px 2px 10px'}}>
          <span style={{fontSize:14,fontWeight:600}}>Members</span>
          <span style={{fontSize:12,color:T.muted}}>preview · 8 of {count*10}</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead>
            <tr style={{color:T.muted,textAlign:'left',fontSize:11,textTransform:'uppercase',letterSpacing:'0.04em'}}>
              <th style={th}>Player</th><th style={th}>LTV</th><th style={th}>Tier</th>
              <th style={th}>Last active</th><th style={{...th,textAlign:'right'}}>7d spend Δ</th>
            </tr>
          </thead>
          <tbody>
            {SEED.map(m=>(
              <tr key={m.uid} className="row-hover" style={{borderTop:'1px solid var(--border-card)'}}>
                <td style={td}><b style={{fontWeight:600}}>{m.name}</b>
                  <span style={{color:T.muted,marginLeft:8,fontFamily:'monospace',fontSize:11}}>{m.uid}</span></td>
                <td style={td} className="tnum">{fmtVnd(m.ltv)}</td>
                <td style={td}><Chip kind="muted">{tierLabel(m.ltv)}</Chip></td>
                <td style={td} className="tnum">{m.churn}d ago</td>
                <td style={{...td,textAlign:'right',color:'var(--negative)',fontWeight:600}} className="tnum">{m.drop}%</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{borderTop:'1px solid var(--border-card)',padding:'10px 2px 2px',color:T.muted,fontSize:12}}>
          This segment isn't actionable yet — it's a population. <b style={{color:T.brand}}>Send to CS Care</b> turns it into a worklist.
        </div>
      </Card>
    </div>
  );
}

/* ═══════════════ SEAM MODAL — Model A vs B choice ═══════════════ */
function SeamModal({onClose, onConfirm, count, bAction, setBAction}){
  const [pick,setPick] = useState('A');
  return (
    <Overlay onClose={onClose}>
      <div style={{width:680,maxWidth:'92vw',background:'var(--bg-card)',borderRadius:'var(--radius-2xl)',
        boxShadow:'var(--shadow-lg)',padding:24,animation:'pop .16s ease'}}>
        <Eyebrow>Send to CS Care</Eyebrow>
        <h2 style={{margin:'2px 0 4px',fontSize:18,fontWeight:700}}>How should this segment be cared for?</h2>
        <p style={{margin:'0 0 18px',fontSize:13,color:T.muted}}>
          <b style={{color:T.sec}}>VIP · spend‑drop watch</b> · {count*10} members. Choose how the CS Dashboard treats them.
        </p>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <ChoiceCard active={pick==='A'} onClick={()=>setPick('A')} badge="Recommended"
            title="Run all playbooks on this cohort"
            desc="Each member is screened against all 21 care playbooks. Every VIP shows which playbooks they trip, the prescribed action, and the KPI to watch.">
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
              <PbPill pbKey="pb04"/><PbPill pbKey="pb14"/><PbPill pbKey="pb12"/>
              <Chip kind="muted">+18 more</Chip>
            </div>
          </ChoiceCard>

          <ChoiceCard active={pick==='B'} onClick={()=>setPick('B')}
            title="Attach one action to the whole segment"
            desc="Treat the segment as a single ad‑hoc playbook with one action applied to all members. Simpler, but no per‑member intelligence.">
            <div style={{marginTop:10}}>
              <label style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:T.muted}}>Action</label>
              <select value={bAction} onChange={e=>setBAction(e.target.value)}
                onClick={e=>e.stopPropagation()}
                style={{display:'block',width:'100%',marginTop:6,padding:'7px 10px',fontSize:12.5,fontFamily:'inherit',
                  border:'1px solid var(--border-strong)',borderRadius:'var(--radius-md)',background:'var(--bg-card)',color:T.text}}>
                <option value="pb04">Spend‑drop retention outreach</option>
                <option value="pb14">Lapse win‑back</option>
                <option value="pb02">VIP tier congratulations</option>
              </select>
            </div>
          </ChoiceCard>
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:20}}>
          <span style={{fontSize:12,color:T.muted}}>
            {pick==='A'
              ? 'Sweep intersects the segment members with each playbook condition.'
              : 'One sweep opens a case per member with the chosen action.'}
          </span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={()=>onConfirm(pick)}>
              {pick==='A'?'Run playbooks · open queue':'Open ad‑hoc queue'}
            </button>
          </div>
        </div>
      </div>
    </Overlay>
  );
}
function ChoiceCard({active,onClick,title,desc,badge,children}){
  return (
    <div className="choice-card" onClick={onClick} style={{cursor:'pointer',padding:16,borderRadius:'var(--radius-lg)',
      border:`1.5px solid ${active?'var(--brand)':'var(--border-card)'}`,
      background: active?'var(--brand-soft)':'var(--bg-card)', position:'relative'}}>
      {badge && <span style={{position:'absolute',top:12,right:12}}><Chip kind="brand">{badge}</Chip></span>}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <span style={{width:16,height:16,borderRadius:'50%',border:`5px solid ${active?'var(--brand)':'var(--neutral-300)'}`,
          background:'#fff',boxSizing:'border-box'}}/>
        <span style={{fontSize:13.5,fontWeight:700}}>{title}</span>
      </div>
      <p style={{margin:0,fontSize:12,color:T.sec,lineHeight:1.5}}>{desc}</p>
      {children}
    </div>
  );
}

/* ═══════════════ BEAT 2 · TRIAGE — care queue ═══════════════ */
function CareQueue({cases, model, bAction, advanced, onOpen, onModel, onBack, onAdvance}){
  const ranked = useMemo(()=>{
    const order={cao:3,tb:2,thap:1};
    return [...cases].sort((a,b)=> order[topPriority(b.pbs)]-order[topPriority(a.pbs)] || b.ltv-a.ltv);
  },[cases]);
  const treatedCount = cases.filter(c=>c.status==='treated').length;
  const resolvedCount = cases.filter(c=>c.status==='resolved').length;
  const newCount = cases.filter(c=>c.status==='new').length;

  return (
    <div style={{animation:'fadeIn .2s ease'}}>
      <button className="ghost" onClick={onBack} style={{marginBottom:8,marginLeft:-8}}>‹ Back to segment</button>
      <Eyebrow>CS Care · Action queue</Eyebrow>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <IconClipboard/>
        <h1 style={{margin:0,fontSize:20,fontWeight:700}}>Caring for a VIP segment</h1>
      </div>

      {/* segment banner + model toggle */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginTop:14,marginBottom:8,padding:'10px 14px',
        background:'var(--brand-soft)',border:'1px solid var(--orange-200, #fed7aa)',borderRadius:'var(--radius-lg)'}}>
        <IconUsers small/>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--orange-900)'}}>
            Segment: VIP · spend‑drop watch · {cases.length*10} members
          </div>
          <div style={{fontSize:11.5,color:'var(--orange-900)',opacity:.75}}>
            {model==='A'
              ? 'Model A · screened against all 21 playbooks'
              : `Model B · ad‑hoc playbook «${PB[bAction].name}» applied to all`}
          </div>
        </div>
        <ModelToggle model={model} onModel={onModel}/>
      </div>

      {/* portfolio strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,margin:'12px 0 16px'}}>
        <Tile label="In queue" value={String(cases.length*10)} sub="dedup'd VIPs"/>
        <Tile label="New" value={String(newCount*10)} sub="awaiting triage" tone="info"/>
        <Tile label="Treated · watching" value={String(treatedCount)} sub="KPI in flight" tone="warning"/>
        <Tile label="Resolved 24h" value={String(resolvedCount)} sub="KPI met" tone="positive"/>
      </div>

      {/* queue table */}
      <Card pad0>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 16px',borderBottom:'1px solid var(--border-card)'}}>
          <span style={{fontSize:14,fontWeight:600}}>By VIP</span>
          <span style={{fontSize:12,color:T.muted}}>priority‑ranked · one row per player</span>
          <div style={{flex:1}}/>
          <button className="btn-secondary" onClick={onAdvance} disabled={treatedCount===0}
            title={treatedCount===0?'Treat someone first':'Fast-forward the KPI window'}>
            ⏩ Simulate +14d
          </button>
        </div>
        <div className="scroll" style={{maxHeight:460,overflow:'auto'}}>
          {ranked.map(m=>(
            <QueueRow key={m.uid} m={m} model={model} bAction={bAction} onOpen={()=>onOpen(m.uid)}/>
          ))}
        </div>
      </Card>

      {/* 24h activity strip */}
      <ActivityStrip cases={cases} advanced={advanced}/>
    </div>
  );
}

function ModelToggle({model,onModel}){
  return (
    <div style={{display:'inline-flex',background:'var(--bg-card)',border:'1px solid var(--border-strong)',
      borderRadius:'var(--radius-md)',overflow:'hidden',fontSize:11.5,fontWeight:600}}>
      {['A','B'].map(k=>(
        <button key={k} onClick={()=>onModel(k)} style={{border:'none',padding:'5px 12px',cursor:'pointer',
          background: model===k?'var(--brand)':'transparent', color: model===k?'#fff':T.sec}}>Model {k}</button>
      ))}
    </div>
  );
}

function QueueRow({m, model, bAction, onOpen}){
  const pri = topPriority(m.pbs);
  const st = STATUS[m.status];
  return (
    <div className="row-hover" onClick={onOpen}
      style={{display:'flex',alignItems:'center',gap:14,padding:'12px 16px',cursor:'pointer',
        borderBottom:'1px solid var(--border-card)'}}>
      {/* identity */}
      <div style={{width:230,minWidth:230}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <b style={{fontSize:13,fontWeight:600}}>{m.name}</b>
          <Chip kind="muted">{tierLabel(m.ltv)}</Chip>
        </div>
        <div style={{fontSize:11.5,color:T.muted,marginTop:2}} className="tnum">
          {fmtVnd(m.ltv)} LTV · last active {m.churn}d
        </div>
      </div>
      {/* tripped playbooks — differs by model */}
      <div style={{flex:1,display:'flex',flexWrap:'wrap',gap:6}}>
        {model==='A'
          ? m.pbs.map(k=><PbPill key={k} pbKey={k}/>)
          : <PbPill pbKey={bAction}/>}
      </div>
      {/* snapshot */}
      <div style={{width:120,textAlign:'right'}} className="tnum">
        <div style={{fontSize:13,fontWeight:600,color:'var(--negative)'}}>{m.drop}%</div>
        <div style={{fontSize:11,color:T.muted}}>7d spend Δ</div>
      </div>
      {/* priority + status + kpi */}
      <div style={{width:120,display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
        <Chip kind={PRIORITY[pri].chip}>{PRIORITY[pri].label}</Chip>
        <Chip kind={st.chip}>{st.label}</Chip>
        {m.kpi==='watching' && <Chip kind="warning">⏱ watching</Chip>}
        {m.kpi==='recovered' && <Chip kind="success">✓ recovered</Chip>}
        {m.kpi==='missed' && <Chip kind="destructive">KPI missed</Chip>}
      </div>
      <span style={{color:'var(--neutral-300)'}}>›</span>
    </div>
  );
}

function ActivityStrip({cases, advanced}){
  const items = [];
  cases.filter(c=>c.status==='resolved').forEach(c=>items.push({uid:c.uid,name:c.name,kind:'resolved',
    text:'KPI met — spend recovered ≥ 60% baseline', when:advanced?'14d window closed':'just now'}));
  cases.filter(c=>c.kpi==='missed').forEach(c=>items.push({uid:c.uid,name:c.name,kind:'missed',
    text:'KPI missed — escalate / re‑treat', when:'14d window closed'}));
  cases.filter(c=>c.status==='treated' && c.kpi==='watching').forEach(c=>items.push({uid:c.uid,name:c.name,kind:'treated',
    text:`Treated via ${c.treatment?.channel||'call'} — ${c.treatment?.text||'retention offer'}`, when:c.treatment?.when||'recently'}));
  return (
    <Card style={{marginTop:16}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <span style={{fontSize:14,fontWeight:600}}>Activity · last 24h</span>
        <span style={{fontSize:12,color:T.muted}}>the loop, closing</span>
      </div>
      {items.length===0
        ? <div style={{fontSize:12.5,color:T.muted,padding:'8px 0'}}>No treatments yet — open a VIP and act to see the loop start.</div>
        : <div style={{display:'flex',flexDirection:'column',gap:0}}>
            {items.map((it,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',
                borderTop: i?'1px solid var(--border-card)':'none'}}>
                <Chip kind={it.kind==='resolved'?'success':it.kind==='missed'?'destructive':'brand'}>
                  {it.kind==='resolved'?'Resolved':it.kind==='missed'?'Missed':'Treated'}
                </Chip>
                <b style={{fontSize:12.5,fontWeight:600,width:150}}>{it.name}</b>
                <span style={{flex:1,fontSize:12.5,color:T.sec}}>{it.text}</span>
                <span style={{fontSize:11.5,color:T.muted}}>{it.when}</span>
              </div>
            ))}
          </div>}
    </Card>
  );
}

/* ═══════════════ BEAT 3 · UNDERSTAND — member 360 drawer ═══════════════ */
function Member360({rec, model, bAction, advanced, onClose, onClaim, onTreat}){
  const pbs = model==='A'? rec.pbs : [bAction];
  const timeline = buildTimeline(rec);
  return (
    <Overlay onClose={onClose} align="right">
      <div className="scroll" style={{width:520,maxWidth:'94vw',height:'100vh',overflow:'auto',background:'var(--bg-card)',
        boxShadow:'var(--shadow-lg)',animation:'slideIn .18s ease',padding:'20px 24px'}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
          <div style={{flex:1}}>
            <Eyebrow>Member 360 · cfm_vn</Eyebrow>
            <h2 style={{margin:'2px 0 2px',fontSize:18,fontWeight:700}}>{rec.name}</h2>
            <div style={{fontSize:12,color:T.muted,fontFamily:'monospace'}}>{rec.uid}</div>
          </div>
          <button className="ghost" onClick={onClose} style={{fontSize:18,lineHeight:1}}>×</button>
        </div>

        {/* tiles */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,margin:'16px 0'}}>
          <Tile label="LTV" value={fmtVnd(rec.ltv)} sub={tierLabel(rec.ltv)} compact/>
          <Tile label="7d spend Δ" value={rec.drop+'%'} sub="vs 30d baseline" tone="negative" compact/>
          <Tile label="Last active" value={rec.churn+'d'} sub="ago" tone={rec.churn>=7?'warning':undefined} compact/>
        </div>

        {/* tripped playbooks */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:T.muted,marginBottom:8}}>
            {model==='A'?`Tripped playbooks (${pbs.length})`:'Attached action'}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {pbs.map(k=>{
              const p=PB[k];
              return (
                <div key={k} style={{border:'1px solid var(--border-card)',borderRadius:'var(--radius-lg)',padding:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <PbPill pbKey={k}/><Chip kind="muted">{p.group}</Chip>
                    <div style={{flex:1}}/><span style={{fontSize:11,color:T.muted}}>SLA {p.sla}</span>
                  </div>
                  <div style={{fontSize:12.5,color:T.text,marginBottom:6}}>{p.action}</div>
                  <div style={{display:'flex',gap:14,fontSize:11.5,color:T.muted,flexWrap:'wrap'}}>
                    <span><b style={{color:T.sec}}>Trigger:</b> {p.cond}</span>
                    <span><b style={{color:T.sec}}>KPI:</b> {p.kpi}</span>
                    <span><b style={{color:T.sec}}>Channels:</b> {p.channels.join(', ')}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* care history timeline */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:T.muted,marginBottom:10}}>
            Care history
          </div>
          <div style={{position:'relative',paddingLeft:18}}>
            <div style={{position:'absolute',left:5,top:4,bottom:4,width:2,background:'var(--border-card)'}}/>
            {timeline.map((e,i)=>(
              <div key={i} style={{position:'relative',marginBottom:14}}>
                <span style={{position:'absolute',left:-18,top:2,width:12,height:12,borderRadius:'50%',
                  background: e.tone==='success'?'var(--success)':e.tone==='brand'?'var(--brand)':'var(--neutral-300)',
                  border:'2px solid var(--bg-card)',boxShadow:'0 0 0 1px var(--border-card)'}}/>
                <div style={{fontSize:12.5,fontWeight:600,color:T.text}}>{e.title}</div>
                {e.detail && <div style={{fontSize:12,color:T.sec}}>{e.detail}</div>}
                <div style={{fontSize:11,color:T.muted}}>{e.when}</div>
              </div>
            ))}
          </div>
        </div>

        {/* actions */}
        <div style={{position:'sticky',bottom:0,background:'var(--bg-card)',paddingTop:12,
          borderTop:'1px solid var(--border-card)',display:'flex',gap:8,alignItems:'center'}}>
          {rec.owner==='You'
            ? <Chip kind="info">Assigned to you</Chip>
            : <button className="btn-secondary" onClick={onClaim}>Claim</button>}
          <div style={{flex:1}}/>
          {rec.status!=='treated' && rec.status!=='resolved'
            ? <><button className="btn-secondary" onClick={onClose}>Dismiss…</button>
                <button className="btn-primary" onClick={onTreat}>Treat</button></>
            : rec.kpi==='watching'
              ? <Chip kind="warning">⏱ KPI watching · {PB[rec.pbs[0]].kpi}</Chip>
              : rec.kpi==='recovered'||rec.status==='resolved'
                ? <Chip kind="success">✓ Recovered — case resolved</Chip>
                : <Chip kind="destructive">KPI missed</Chip>}
        </div>
      </div>
    </Overlay>
  );
}
function buildTimeline(rec){
  const t = [{title:'Matched · Spend drop', detail:`7d spend ${rec.drop}% vs 30d baseline`, when:'today · sweep', tone:'default'}];
  if(rec.owner==='You' || rec.status!=='new') t.push({title:'Claimed by You', when:'today', tone:'default'});
  if(rec.status==='treated'||rec.status==='resolved'){
    t.push({title:`Treated · ${rec.treatment?.channel||'Call'}`, detail:rec.treatment?.text||'retention offer',
      when:rec.treatment?.when||'today', tone:'brand'});
    if(rec.kpi==='watching') t.push({title:'KPI watching', detail:PB[rec.pbs[0]].kpi, when:'14d window open', tone:'default'});
    if(rec.kpi==='recovered'||rec.status==='resolved') t.push({title:'KPI met — resolved', detail:'spend recovered ≥ 60% baseline', when:'14d window closed', tone:'success'});
    if(rec.kpi==='missed') t.push({title:'KPI missed', detail:'still below baseline — escalate', when:'14d window closed', tone:'default'});
  }
  return t;
}

/* ═══════════════ BEAT 4 · ACT — treat modal ═══════════════ */
function TreatModal({rec, onClose, onConfirm}){
  const pb = PB[rec.pbs[0]];
  const [channel,setChannel] = useState(pb.channels[0]);
  const [text,setText] = useState(pb.action);
  return (
    <Overlay onClose={onClose}>
      <div style={{width:540,maxWidth:'92vw',background:'var(--bg-card)',borderRadius:'var(--radius-2xl)',
        boxShadow:'var(--shadow-lg)',padding:24,animation:'pop .16s ease'}}>
        <Eyebrow>Treat · {rec.name}</Eyebrow>
        <h2 style={{margin:'2px 0 4px',fontSize:18,fontWeight:700}}>Log a treatment</h2>
        <p style={{margin:'0 0 18px',fontSize:12.5,color:T.muted}}>
          Playbook <b style={{color:T.sec}}>{pb.id} · {pb.name}</b> · KPI to watch: <b style={{color:T.sec}}>{pb.kpi}</b>
        </p>

        <label style={lbl}>Channel</label>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['Call','Zalo ZNS','In-game','Push'].map(c=>(
            <button key={c} onClick={()=>setChannel(c)} style={{padding:'7px 14px',fontSize:12.5,fontWeight:600,
              borderRadius:'var(--radius-md)',cursor:'pointer',
              border:`1px solid ${channel===c?'var(--brand)':'var(--border-strong)'}`,
              background: channel===c?'var(--brand-soft)':'var(--bg-card)',
              color: channel===c?'var(--orange-900)':T.sec}}>{c}</button>
          ))}
        </div>

        <label style={lbl}>Treatment / note</label>
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={3}
          style={{width:'100%',marginBottom:18,padding:'9px 11px',fontSize:12.5,fontFamily:'inherit',resize:'vertical',
            border:'1px solid var(--border-strong)',borderRadius:'var(--radius-md)',background:'var(--bg-card)',color:T.text}}/>

        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={()=>onConfirm({channel,text})}>Mark treated</button>
        </div>
      </div>
    </Overlay>
  );
}

/* ───────────────────────── shared chrome ───────────────────────── */
function Overlay({children,onClose,align='center'}){
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(23,23,23,.32)',zIndex:50,
      display:'flex',alignItems: align==='right'?'stretch':'center', justifyContent: align==='right'?'flex-end':'center',
      animation:'fadeIn .12s ease'}}>
      <div onClick={e=>e.stopPropagation()} style={{display:'contents'}}>{children}</div>
    </div>
  );
}
function Card({children,style,pad0}){
  return <div className="lift" style={{background:'var(--bg-card)',border:'1px solid var(--border-card)',
    borderRadius:'var(--radius-lg)',padding: pad0?0:16,transition:'box-shadow .12s',...style}}>{children}</div>;
}
function Tile({label,value,sub,tone,compact}){
  const color = tone==='negative'?'var(--negative)':tone==='positive'?'var(--positive)':
    tone==='warning'?'var(--warning-ink)':tone==='info'?'var(--info-ink)':T.text;
  return (
    <div style={{background:'var(--bg-card)',border:'1px solid var(--border-card)',borderRadius:'var(--radius-lg)',
      padding: compact?'10px 12px':'14px 14px 12px'}}>
      <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:T.muted,marginBottom:6}}>{label}</div>
      <div className="tnum" style={{fontSize: compact?18:22,fontWeight:700,letterSpacing:'-0.015em',color}}>{value}</div>
      {sub && <div style={{fontSize:11.5,color:T.muted,marginTop:2}}>{sub}</div>}
    </div>
  );
}
function DefPill({type,children}){
  const map={cube:{bg:'var(--muted-soft)',fg:'var(--muted-ink)'},
    measure:{bg:'rgba(225,210,183,.55)',fg:'rgb(126,94,7)'}};
  const c=map[type]||map.cube;
  return <span style={{fontFamily:'monospace',fontSize:11.5,background:c.bg,color:c.fg,padding:'3px 8px',
    borderRadius:'var(--radius-md)',fontWeight:600}}>{children}</span>;
}
const th = {padding:'6px 8px',fontWeight:600};
const td = {padding:'9px 8px',color:T.text,verticalAlign:'middle'};
const lbl = {display:'block',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:'var(--text-muted)',marginBottom:6};

/* inline icons (no SVG slop — simple geometric glyphs matching lucide weight) */
function IconUsers({small}){const s=small?18:22;return(
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="var(--brand)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </svg>);}
function IconClipboard(){return(
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M9 2h6a1 1 0 0 1 1 1v2H8V3a1 1 0 0 1 1-1z"/><rect x="4" y="4" width="16" height="18" rx="2"/><path d="M9 12h6M9 16h4"/>
  </svg>);}
function IconSend(){return(
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/>
  </svg>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
