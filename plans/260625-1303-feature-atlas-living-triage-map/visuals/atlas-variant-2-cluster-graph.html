<title>Feature Atlas — Variant 2 · Cluster Graph</title>
<style>
  :root {
    --brand:#f05a22; --brand-hover:#f54a00; --brand-soft:#fdf0e9;
    --bg-app:#f8efe5; --bg-card:#f8efe5; --bg-muted:#efe3d4;
    --border-card:#e1d4c2; --border-strong:#d2c2ab;
    --text-primary:#171717; --text-secondary:#404040; --text-muted:#737373;
    --text-on-brand:#ffffff;
    --success-soft:#d1fae5; --success-ink:#047857; --success-border:#86efac;
    --warning-soft:#fef3c7; --warning-ink:#92400e; --warning-border:#fcd34d;
    --destructive-soft:#fee2e2; --destructive-ink:#991b1b; --destructive-border:#fca5a5;
    --info-soft:#dbeafe; --info-ink:#1d4ed8; --info-border:#93c5fd;
    --muted-soft:#efe3d4; --muted-ink:#525252;
    --radius-xs:4px; --radius-sm:6px; --radius-md:8px; --radius-lg:10px; --radius-full:9999px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 12px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --edge:#d2c2ab; --edge-dep:#93c5fd;
  }
  :root[data-theme="dark"] {
    --brand:#f06b3a; --brand-hover:#f7894e; --brand-soft:rgba(240,90,34,.12);
    --bg-app:#0a0a0a; --bg-card:#171717; --bg-muted:#262626;
    --border-card:#262626; --border-strong:#404040;
    --text-primary:#fafafa; --text-secondary:#d4d4d4; --text-muted:#737373;
    --success-soft:rgba(16,185,129,.15); --success-ink:#6ee7b7; --success-border:rgba(16,185,129,.4);
    --warning-soft:rgba(217,119,6,.18); --warning-ink:#fcd34d; --warning-border:rgba(217,119,6,.45);
    --destructive-soft:rgba(220,38,38,.18); --destructive-ink:#fca5a5; --destructive-border:rgba(220,38,38,.4);
    --info-soft:rgba(63,141,255,.18); --info-ink:#93c5fd; --info-border:rgba(63,141,255,.45);
    --muted-soft:#262626; --muted-ink:#d4d4d4;
    --shadow-sm:0 1px 3px rgba(0,0,0,.55);
    --shadow-md:0 4px 12px rgba(0,0,0,.5);
    --shadow-lg:0 16px 40px rgba(0,0,0,.6);
    --edge:#404040; --edge-dep:rgba(63,141,255,.55);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-sans); overflow:hidden; }
  body { font-size:13px; }

  .topbar { position:fixed; top:0; left:0; right:0; z-index:30; padding:16px 24px 12px; background:var(--bg-app);
    border-bottom:1px solid var(--border-card); }
  .eyebrow { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:4px; }
  .titlerow { display:flex; align-items:center; gap:10px; }
  .titlerow h1 { margin:0; font-size:20px; font-weight:700; }
  .ico { color:var(--brand); flex:none; }
  .ghostbtn { background:var(--bg-card); border:1px solid var(--border-card); color:var(--text-secondary);
    border-radius:var(--radius-md); padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer; }
  .ghostbtn:hover { box-shadow:var(--shadow-sm); }

  .controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:12px; }
  .search { display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border-card);
    border-radius:var(--radius-md); padding:6px 10px; min-width:240px; }
  .search input { border:none; background:transparent; outline:none; font:inherit; color:var(--text-primary); width:100%; }
  .search svg { color:var(--text-muted); flex:none; }
  .chiprow { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .chip { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:var(--radius-full);
    border:1px solid var(--border-card); background:var(--bg-card); color:var(--text-secondary);
    font-size:12px; font-weight:500; cursor:pointer; user-select:none; }
  .chip .dot { width:8px; height:8px; border-radius:var(--radius-full); }
  .chip.on { background:var(--brand-soft); border-color:var(--brand); color:var(--brand); }
  .grp-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin:0 2px 0 8px; }

  /* canvas */
  #stage { position:fixed; inset:0; top:0; cursor:grab; }
  #stage.grabbing { cursor:grabbing; }
  #world { position:absolute; top:0; left:0; transform-origin:0 0; }
  #edges { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }

  .node { position:absolute; transform:translate(-50%,-50%); user-select:none; }
  /* surface root */
  .surface-node { display:flex; flex-direction:column; align-items:center; gap:2px; padding:10px 16px;
    background:var(--bg-card); border:1.5px solid var(--border-strong); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-md); cursor:pointer; min-width:120px; text-align:center; }
  .surface-node:hover { border-color:var(--brand); }
  .surface-node .sn-name { font-size:14px; font-weight:700; }
  .surface-node .sn-count { font-size:10.5px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
  .surface-node.collapsed { background:var(--bg-muted); }
  .sn-toggle { font-size:10px; color:var(--text-muted); margin-top:2px; }

  /* feature node */
  .feat-node { display:flex; align-items:center; gap:7px; padding:6px 10px 6px 8px; background:var(--bg-card);
    border:1px solid var(--border-card); border-radius:var(--radius-md); box-shadow:var(--shadow-sm);
    cursor:pointer; max-width:200px; }
  .feat-node:hover { box-shadow:var(--shadow-md); }
  .feat-node.sel { border-color:var(--brand); box-shadow:0 0 0 2px var(--brand-soft),var(--shadow-md); }
  .feat-node.dimmed { opacity:.28; }
  .feat-node .accent { width:4px; align-self:stretch; min-height:20px; border-radius:var(--radius-full); flex:none; }
  .feat-node .fn-name { font-size:12px; font-weight:500; line-height:1.25; overflow:hidden; text-overflow:ellipsis;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .fn-meta { display:flex; flex-direction:column; gap:2px; align-items:flex-end; flex:none; }
  .sbadge { width:9px; height:9px; border-radius:2px; flex:none; }
  .fn-marks { display:flex; gap:3px; }
  .mk { font-size:9px; font-weight:700; padding:0 4px; border-radius:var(--radius-xs); font-variant-numeric:tabular-nums; }
  .mk-dw { background:var(--destructive-soft); color:var(--destructive-ink); }
  .mk-dir { background:var(--bg-muted); color:var(--text-secondary); }

  /* direction leaf */
  .dir-node { padding:3px 7px; background:transparent; border:1px dashed var(--border-strong); border-radius:var(--radius-full);
    font-size:10px; color:var(--text-secondary); max-width:150px; display:flex; align-items:center; gap:5px;
    box-shadow:none; cursor:default; }
  .dir-node .dl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dir-node .ef { font-size:8.5px; font-weight:700; padding:0 3px; border-radius:2px; flex:none; }
  .ef-S { background:var(--success-soft); color:var(--success-ink); }
  .ef-M { background:var(--info-soft); color:var(--info-ink); }
  .ef-L { background:var(--warning-soft); color:var(--warning-ink); }
  .ef-XL { background:var(--destructive-soft); color:var(--destructive-ink); }

  /* zoom controls */
  .zoomctl { position:fixed; bottom:20px; left:20px; z-index:30; display:flex; flex-direction:column; gap:4px;
    background:var(--bg-card); border:1px solid var(--border-card); border-radius:var(--radius-md); padding:4px; box-shadow:var(--shadow-sm); }
  .zoomctl button { width:30px; height:30px; border:none; background:transparent; color:var(--text-secondary);
    font-size:16px; cursor:pointer; border-radius:var(--radius-sm); }
  .zoomctl button:hover { background:var(--bg-muted); }
  .legend { position:fixed; bottom:20px; right:20px; z-index:30; background:var(--bg-card); border:1px solid var(--border-card);
    border-radius:var(--radius-md); padding:10px 12px; box-shadow:var(--shadow-sm); font-size:11px; max-width:220px; }
  .legend .lh { font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:6px; }
  .legend .li { display:flex; align-items:center; gap:6px; margin-bottom:3px; color:var(--text-secondary); }
  .legend .ls { width:10px; height:10px; border-radius:var(--radius-full); }
  .hint { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; color:var(--text-muted);
    font-size:12px; pointer-events:none; opacity:.6; }

  /* Drawer (shared with v1) */
  .scrim { position:fixed; inset:0; background:rgba(0,0,0,.28); opacity:0; pointer-events:none; transition:.18s; z-index:40; }
  .scrim.open { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:420px; max-width:92vw; background:var(--bg-card);
    border-left:1px solid var(--border-card); box-shadow:var(--shadow-lg); z-index:50; transform:translateX(100%);
    transition:transform .22s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.open { transform:translateX(0); }
  .drawer-head { padding:18px 20px 14px; border-bottom:1px solid var(--border-card); }
  .drawer-top { display:flex; align-items:flex-start; gap:10px; }
  .accent { width:4px; border-radius:var(--radius-full); flex:none; }
  .drawer-top .accent { min-height:34px; }
  .drawer-title { font-size:16px; font-weight:700; margin:0; }
  .drawer-surface { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-top:2px; }
  .drawer-close { margin-left:auto; background:transparent; border:none; color:var(--text-muted); cursor:pointer; padding:4px; border-radius:var(--radius-sm); }
  .drawer-close:hover { background:var(--bg-muted); color:var(--text-primary); }
  .drawer-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; align-items:center; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:var(--radius-full); font-size:10.5px; font-weight:600; }
  .badge .bdot { width:6px; height:6px; border-radius:var(--radius-full); }
  .touched { font-size:11px; color:var(--text-muted); }
  .drawer-body { padding:16px 20px 32px; overflow-y:auto; flex:1; }
  .sect { margin-bottom:20px; }
  .sect-h { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin:0 0 8px; display:flex; align-items:center; gap:6px; }
  .sect-h .ct { background:var(--bg-muted); color:var(--text-secondary); border-radius:var(--radius-full); padding:0 7px; font-size:10px; }
  .summary-txt { font-size:13px; color:var(--text-secondary); line-height:1.55; }
  .dw-item { display:flex; gap:8px; padding:8px 10px; background:var(--destructive-soft); border:1px solid var(--destructive-border); border-radius:var(--radius-md); font-size:12px; color:var(--destructive-ink); margin-bottom:6px; line-height:1.45; }
  .dw-item svg { flex:none; margin-top:1px; }
  .dir-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px dashed var(--border-strong); border-radius:var(--radius-md); margin-bottom:6px; font-size:12.5px; color:var(--text-secondary); }
  .effort { font-size:10px; font-weight:700; width:24px; text-align:center; padding:1px 0; border-radius:var(--radius-xs); flex:none; }
  .dep-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px solid var(--info-border); background:var(--info-soft); border-radius:var(--radius-md); margin-bottom:6px; font-size:12.5px; color:var(--info-ink); cursor:pointer; }
  .dep-item:hover { box-shadow:var(--shadow-sm); }
  .dep-item.missing { background:var(--muted-soft); border-color:var(--border-strong); color:var(--text-muted); cursor:default; }
  .link-grp { margin-bottom:8px; }
  .link-grp .lk-h { font-size:11px; font-weight:600; color:var(--text-secondary); margin-bottom:4px; display:flex; gap:5px; align-items:center; }
  .link-path { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px; color:var(--text-muted); background:var(--bg-muted); border-radius:var(--radius-sm); padding:3px 7px; margin:0 0 3px; word-break:break-all; }
  .empty-note { font-size:12px; color:var(--text-muted); font-style:italic; }
</style>
</head>

const allFeatures=Object.values(featById);
function normDirs(f){ return (f.directions||[]).filter(d=>d&&d.label).map(d=>({label:d.label,effort:['S','M','L','XL'].includes(d.effort)?d.effort:null})); }

const filters={health:new Set(),status:new Set(),q:''};
function passFilter(f){
  if(filters.health.size&&!filters.health.has(f.health))return false;
  if(filters.status.size&&!filters.status.has(f.status))return false;
  if(filters.q){ const q=filters.q.toLowerCase(); if(!((f.label+' '+(f.summary||'')).toLowerCase().includes(q)))return false; }
  return true;
}

// ---- layout: radial clusters ----
const world=document.getElementById('world'), edgesSvg=document.getElementById('edges'), stage=document.getElementById('stage');
const collapsedSurfaces=new Set();
let selectedId=null, hoveredId=null;
const pos={}; // id -> {x,y} world coords
let view={x:0,y:0,k:1};

function layout(){
  pos.surfaces={}; pos.feats={}; pos.dirs={};
  const N=DATA.surfaces.length;
  // Surface ring radius scales with the busiest surface so dense clusters
  // (Segments 13, Chat 16) don't overlap their neighbours toward the center.
  const maxFeat=Math.max(...DATA.surfaces.map(s=>s.features.filter(passFilter).length),1);
  const Rsurface=Math.max(620, 380+maxFeat*30); const cx=1100, cy=1100;
  DATA.surfaces.forEach((s,i)=>{
    const ang=(i/N)*Math.PI*2 - Math.PI/2;
    const sx=cx+Math.cos(ang)*Rsurface, sy=cy+Math.sin(ang)*Rsurface;
    pos.surfaces[s.id]={x:sx,y:sy,ang};
    const feats=s.features.filter(passFilter);
    const fn=feats.length;
    // Multi-ring fan: keep angular pitch ~constant so labels never collide; when
    // an arc would exceed ~150°, push the overflow onto an outer concentric ring.
    const pitch=0.30;                 // radians between adjacent features on a ring
    const maxArc=Math.PI*0.83;        // cap a single ring's fan at ~150°
    const perRing=Math.max(1,Math.floor(maxArc/pitch)+1);
    feats.forEach((f,j)=>{
      const ring=Math.floor(j/perRing);
      const idxInRing=j%perRing;
      const countInRing=Math.min(perRing, fn-ring*perRing);
      const Rfeat=260+ring*180;
      const spread=Math.min(maxArc,(countInRing-1)*pitch);
      const t=countInRing===1?0:(idxInRing/(countInRing-1)-0.5);
      const fa=ang + t*spread;
      const fx=sx+Math.cos(fa)*Rfeat, fy=sy+Math.sin(fa)*Rfeat;
      pos.feats[f.id]={x:fx,y:fy,ang:fa};
      const dirs=normDirs(f);
      dirs.forEach((d,k)=>{
        const Rdir=120; const dspread=0.6;
        const da=fa + (dirs.length===1?0:(k/(dirs.length-1)-0.5))*dspread;
        pos.dirs[f.id+'#'+k]={x:fx+Math.cos(da)*Rdir, y:fy+Math.sin(da)*Rdir, label:d.label, effort:d.effort};
      });
    });
  });
}

function render(){
  layout();
  world.innerHTML='';
  const edgeParts=[];
  // surface->feature spokes + feature->dir dashed + dep edges
  DATA.surfaces.forEach(s=>{
    if(collapsedSurfaces.has(s.id)) return;
    const sp=pos.surfaces[s.id];
    s.features.filter(passFilter).forEach(f=>{
      const fp=pos.feats[f.id];
      edgeParts.push('<line x1="'+sp.x+'" y1="'+sp.y+'" x2="'+fp.x+'" y2="'+fp.y+'" stroke="var(--edge)" stroke-width="1.2"/>');
      normDirs(f).forEach((d,k)=>{ const dp=pos.dirs[f.id+'#'+k]; if(dp) edgeParts.push('<line x1="'+fp.x+'" y1="'+fp.y+'" x2="'+dp.x+'" y2="'+dp.y+'" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3 3"/>'); });
    });
  });
  // dependency edges only when a node hovered/selected (reduce clutter)
  const focusId=hoveredId||selectedId;
  if(focusId){
    const f=featById[focusId];
    (f.deps||[]).forEach(dep=>{ if(pos.feats[focusId]&&pos.feats[dep]&&!collapsedSurfaces.has(featSurfaceId[dep])){ const a=pos.feats[focusId],b=pos.feats[dep];
      edgeParts.push('<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="var(--edge-dep)" stroke-width="2" marker-end="url(#arrow)"/>'); } });
    allFeatures.filter(x=>(x.deps||[]).includes(focusId)).forEach(x=>{ if(pos.feats[x.id]&&pos.feats[focusId]&&!collapsedSurfaces.has(featSurfaceId[x.id])){ const a=pos.feats[x.id],b=pos.feats[focusId];
      edgeParts.push('<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="var(--edge-dep)" stroke-width="2" marker-end="url(#arrow)"/>'); } });
  }
  edgesSvg.innerHTML='<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--edge-dep)"/></marker></defs>'+edgeParts.join('');

  // nodes
  DATA.surfaces.forEach(s=>{
    const sp=pos.surfaces[s.id]; const collapsed=collapsedSurfaces.has(s.id);
    const visFeats=s.features.filter(passFilter);
    const sn=document.createElement('div'); sn.className='node';
    sn.style.left=sp.x+'px'; sn.style.top=sp.y+'px';
    const inner=document.createElement('div'); inner.className='surface-node'+(collapsed?' collapsed':'');
    inner.innerHTML='<span class="sn-name">'+esc(s.label)+'</span><span class="sn-count">'+visFeats.length+(visFeats.length!==s.features.length?(' / '+s.features.length):'')+' features</span><span class="sn-toggle">'+(collapsed?'▸ expand':'▾ collapse')+'</span>';
    inner.onclick=()=>{ if(collapsed)collapsedSurfaces.delete(s.id);else collapsedSurfaces.add(s.id); render(); };
    sn.appendChild(inner); world.appendChild(sn);
    if(collapsed) return;

    visFeats.forEach(f=>{
      const fp=pos.feats[f.id]; const dirs=normDirs(f);
      const fnode=document.createElement('div'); fnode.className='node'; fnode.style.left=fp.x+'px'; fnode.style.top=fp.y+'px';
      const inn=document.createElement('div'); inn.className='feat-node'+(selectedId===f.id?' sel':'');
      const st=STATUS[f.status]||STATUS.idea;
      let marks='';
      if((f.drawbacks||[]).length) marks+='<span class="mk mk-dw">⚠'+f.drawbacks.length+'</span>';
      if((f.deps||[]).length) marks+='<span class="mk mk-dir">↳'+f.deps.length+'</span>';
      inn.innerHTML='<span class="accent" style="background:'+HEALTH[f.health].color+'"></span>'+
        '<span class="fn-name">'+esc(f.label)+'</span>'+
        '<span class="fn-meta"><span class="sbadge" style="background:'+st.sw+'" title="'+st.label+'"></span><span class="fn-marks">'+marks+'</span></span>';
      inn.onclick=(e)=>{ e.stopPropagation(); openDrawer(f.id); };
      inn.onmouseenter=()=>{ hoveredId=f.id; render(); };
      inn.onmouseleave=()=>{ if(hoveredId===f.id){hoveredId=null; render();} };
      fnode.appendChild(inn); world.appendChild(fnode);

      dirs.forEach((d,k)=>{ const dp=pos.dirs[f.id+'#'+k]; if(!dp)return;
        const dn=document.createElement('div'); dn.className='node'; dn.style.left=dp.x+'px'; dn.style.top=dp.y+'px';
        const di=document.createElement('div'); di.className='dir-node';
        di.innerHTML='<span class="dl">'+esc(d.label)+'</span>'+(d.effort?'<span class="ef ef-'+d.effort+'">'+d.effort+'</span>':'');
        di.title=d.label; dn.appendChild(di); world.appendChild(dn);
      });
    });
  });
  applyView();
}
function applyView(){
  world.style.transform='translate('+view.x+'px,'+view.y+'px) scale('+view.k+')';
  edgesSvg.style.transform='translate('+view.x+'px,'+view.y+'px) scale('+view.k+')';
}

// ---- pan/zoom ----
let dragging=false, sx0,sy0,vx0,vy0;
stage.addEventListener('mousedown',e=>{ if(e.target.closest('.feat-node')||e.target.closest('.surface-node'))return; dragging=true; stage.classList.add('grabbing'); sx0=e.clientX; sy0=e.clientY; vx0=view.x; vy0=view.y; document.getElementById('hint').style.display='none'; });
window.addEventListener('mousemove',e=>{ if(!dragging)return; view.x=vx0+(e.clientX-sx0); view.y=vy0+(e.clientY-sy0); applyView(); });
window.addEventListener('mouseup',()=>{ dragging=false; stage.classList.remove('grabbing'); });
stage.addEventListener('wheel',e=>{ e.preventDefault(); const f=e.deltaY<0?1.12:0.89; zoomAt(e.clientX,e.clientY,f); },{passive:false});
function zoomAt(px,py,factor){ const nk=Math.min(2.2,Math.max(0.25,view.k*factor));
  const wx=(px-view.x)/view.k, wy=(py-view.y)/view.k; view.k=nk; view.x=px-wx*nk; view.y=py-wy*nk; applyView(); }
document.getElementById('zin').onclick=()=>zoomAt(innerWidth/2,innerHeight/2,1.2);
document.getElementById('zout').onclick=()=>zoomAt(innerWidth/2,innerHeight/2,0.83);
document.getElementById('zfit').onclick=fit;
function fit(){
  // compute bbox of visible nodes
  const xs=[],ys=[];
  Object.values(pos.surfaces).forEach(p=>{xs.push(p.x);ys.push(p.y);});
  Object.values(pos.feats).forEach(p=>{xs.push(p.x);ys.push(p.y);});
  Object.values(pos.dirs).forEach(p=>{xs.push(p.x);ys.push(p.y);});
  if(!xs.length)return;
  const minX=Math.min(...xs)-180,maxX=Math.max(...xs)+180,minY=Math.min(...ys)-120,maxY=Math.max(...ys)+120;
  const w=maxX-minX,h=maxY-minY; const topPad=150;
  const k=Math.min((innerWidth-80)/w,(innerHeight-topPad-60)/h,1.4);
  view.k=k; view.x=(innerWidth-w*k)/2-minX*k; view.y=topPad+(innerHeight-topPad-h*k)/2-minY*k; applyView();
}

// ---- filter chips ----
function countBy(g){const m={};allFeatures.forEach(f=>{const k=g(f);m[k]=(m[k]||0)+1;});return m;}
const hc=countBy(f=>f.health), sc=countBy(f=>f.status);
function chip(text,on,dot,count,fn){const el=document.createElement('span');el.className='chip'+(on?' on':'');if(dot){const d=document.createElement('span');d.className='dot';d.style.background=dot;el.appendChild(d);}el.appendChild(document.createTextNode(text));if(count!=null){const c=document.createElement('span');c.style.cssText='font-size:10px;opacity:.7;font-variant-numeric:tabular-nums';c.textContent=count;el.appendChild(c);}el.onclick=fn;return el;}
function renderChips(){
  const fh=document.getElementById('f-health');fh.innerHTML='';
  HEALTH_ORDER.forEach(h=>fh.appendChild(chip(HEALTH[h].label,filters.health.has(h),HEALTH[h].color,hc[h]||0,()=>tog('health',h))));
  const fs=document.getElementById('f-status');fs.innerHTML='';
  STATUS_ORDER.filter(s=>sc[s]).forEach(s=>fs.appendChild(chip(STATUS[s].label,filters.status.has(s),STATUS[s].sw,sc[s]||0,()=>tog('status',s))));
}
function tog(k,v){const set=filters[k];if(set.has(v))set.delete(v);else set.add(v);renderChips();render();}

// ---- drawer (same as v1) ----
const drawer=document.getElementById('drawer'),scrim=document.getElementById('scrim');
const IC={warn:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  link:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
  bulb:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>',
  x:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>'};
function openDrawer(id){
  selectedId=id; const f=featById[id]; if(!f)return; const dirs=normDirs(f);
  let html='<div class="drawer-head"><div class="drawer-top"><span class="accent" style="background:'+HEALTH[f.health].color+'"></span>';
  html+='<div style="flex:1"><h2 class="drawer-title">'+esc(f.label)+'</h2><div class="drawer-surface">'+esc(featSurfaceLabel[id])+'</div></div>';
  html+='<button class="drawer-close" id="dclose">'+IC.x+'</button></div><div class="drawer-badges">';
  const st=STATUS[f.status]||STATUS.idea; html+='<span class="badge" style="background:'+st.soft+';color:'+st.ink+'">'+esc(st.label)+'</span>';
  const hl=HEALTH[f.health]; html+='<span class="badge" style="background:'+hl.soft+';color:'+hl.color+';border:1px solid '+hl.bd+'"><span class="bdot" style="background:'+hl.color+'"></span>'+hl.label+'</span>';
  if(f.lastTouched) html+='<span class="touched">touched '+esc(f.lastTouched)+'</span>';
  html+='</div></div><div class="drawer-body">';
  html+='<div class="sect"><div class="sect-h">Summary</div><div class="summary-txt">'+esc(f.summary||'—')+'</div></div>';
  html+='<div class="sect"><div class="sect-h">Drawbacks'+((f.drawbacks||[]).length?'<span class="ct">'+f.drawbacks.length+'</span>':'')+'</div>';
  if((f.drawbacks||[]).length)f.drawbacks.forEach(d=>html+='<div class="dw-item">'+IC.warn+'<span>'+esc(d)+'</span></div>'); else html+='<div class="empty-note">No known drawbacks.</div>';
  html+='</div>';
  html+='<div class="sect"><div class="sect-h">Directions <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">· ideation</span>'+(dirs.length?'<span class="ct">'+dirs.length+'</span>':'')+'</div>';
  if(dirs.length)dirs.forEach(d=>html+='<div class="dir-item">'+IC.bulb+'<span style="flex:1">'+esc(d.label)+'</span>'+(d.effort?'<span class="effort ef-'+d.effort+'">'+d.effort+'</span>':'')+'</div>'); else html+='<div class="empty-note">No directions logged yet.</div>';
  html+='</div>';
  if((f.deps||[]).length){ html+='<div class="sect"><div class="sect-h">Depends on <span class="ct">'+f.deps.length+'</span></div>';
    f.deps.forEach(dep=>{const t=featById[dep]; if(t)html+='<div class="dep-item" data-dep="'+esc(dep)+'">'+IC.link+'<span>'+esc(t.label)+'</span></div>'; else html+='<div class="dep-item missing">'+IC.link+'<span>'+esc(dep)+' (external / unmodeled)</span></div>';}); html+='</div>'; }
  const rd=allFeatures.filter(x=>(x.deps||[]).includes(id));
  if(rd.length){ html+='<div class="sect"><div class="sect-h">Depended on by <span class="ct">'+rd.length+'</span></div>'; rd.forEach(x=>html+='<div class="dep-item" data-dep="'+esc(x.id)+'">'+IC.link+'<span>'+esc(x.label)+'</span></div>'); html+='</div>'; }
  const lk=f.links||{};
  if((lk.plans||[]).length||(lk.code||[]).length||(lk.memory||[]).length){ html+='<div class="sect"><div class="sect-h">Links</div>';
    if((lk.code||[]).length){html+='<div class="link-grp"><div class="lk-h">'+IC.link+' Code</div>';lk.code.forEach(p=>html+='<p class="link-path">'+esc(p)+'</p>');html+='</div>';}
    if((lk.plans||[]).length){html+='<div class="link-grp"><div class="lk-h">'+IC.link+' Plans</div>';lk.plans.forEach(p=>html+='<p class="link-path">'+esc(p)+'</p>');html+='</div>';}
    if((lk.memory||[]).length){html+='<div class="link-grp"><div class="lk-h">'+IC.link+' Memory</div>';lk.memory.forEach(p=>html+='<p class="link-path">'+esc(p)+'</p>');html+='</div>';}
    html+='</div>'; }
  html+='</div>';
  drawer.innerHTML=html; drawer.classList.add('open'); drawer.setAttribute('aria-hidden','false'); scrim.classList.add('open');
  document.getElementById('dclose').onclick=closeDrawer;
  drawer.querySelectorAll('.dep-item[data-dep]').forEach(el=>el.onclick=()=>focusFeature(el.getAttribute('data-dep')));
  render();
}
function closeDrawer(){ drawer.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); scrim.classList.remove('open'); selectedId=null; render(); }
scrim.onclick=closeDrawer; document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
function focusFeature(id){ const sid=featSurfaceId[id]; collapsedSurfaces.delete(sid);
  if(filters.health.size&&!filters.health.has(featById[id].health))filters.health.clear();
  if(filters.status.size&&!filters.status.has(featById[id].status))filters.status.clear();
  filters.q=''; document.getElementById('search').value=''; renderChips(); render();
  const p=pos.feats[id]; if(p){ view.k=Math.max(view.k,0.9); view.x=innerWidth/2-p.x*view.k; view.y=innerHeight/2-p.y*view.k; applyView(); }
  openDrawer(id);
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

document.getElementById('search').addEventListener('input',e=>{filters.q=e.target.value.trim();render();});
const tt=document.getElementById('themeToggle');
tt.onclick=()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',d?'light':'dark');tt.textContent=d?'Dark':'Light';};

renderChips(); render(); fit();
window.addEventListener('resize',()=>{ /* keep view */ });
</script>
