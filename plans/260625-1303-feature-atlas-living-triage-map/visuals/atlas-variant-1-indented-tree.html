    --brand:#f06b3a; --brand-hover:#f7894e; --brand-soft:rgba(240,90,34,.12);
    --bg-app:#0a0a0a; --bg-card:#171717; --bg-muted:#262626;
    --border-card:#262626; --border-strong:#404040;
    --text-primary:#fafafa; --text-secondary:#d4d4d4; --text-muted:#737373;
    --success-soft:rgba(16,185,129,.15); --success-ink:#6ee7b7; --success-border:rgba(16,185,129,.4);
    --warning-soft:rgba(217,119,6,.18); --warning-ink:#fcd34d; --warning-border:rgba(217,119,6,.45);
    --destructive-soft:rgba(220,38,38,.18); --destructive-ink:#fca5a5; --destructive-border:rgba(220,38,38,.4);

    --shadow-md:0 4px 12px rgba(0,0,0,.5);

  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-sans); }
  body { font-size:13px; line-height:1.5; }
  .page { max-width:1100px; margin:0 auto; padding:24px 32px 80px; }

  /* Header */
  .eyebrow { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:4px; }
  .titlerow { display:flex; align-items:center; gap:10px; }
  .titlerow h1 { margin:0; font-size:20px; font-weight:700; color:var(--text-primary); }
  .ico { color:var(--brand); flex:none; }
  .lede { margin:4px 0 20px; font-size:13px; color:var(--text-muted); max-width:62ch; }

  /* Toolbar */
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; position:sticky; top:0; z-index:20;
    background:var(--bg-app); padding:8px 0 10px; border-bottom:1px solid var(--border-card); }
  .search { flex:1; min-width:200px; display:flex; align-items:center; gap:8px; background:var(--bg-card);
    border:1px solid var(--border-card); border-radius:var(--radius-md); padding:6px 10px; }
  .search input { flex:1; border:none; background:transparent; outline:none; font:inherit; color:var(--text-primary); }
  .search svg { color:var(--text-muted); flex:none; }
  .ghostbtn { background:var(--bg-card); border:1px solid var(--border-card); color:var(--text-secondary);
    border-radius:var(--radius-md); padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer; }
  .ghostbtn:hover { box-shadow:var(--shadow-sm); }

  /* Filter chip rows */
  .filterbar { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .filterrow { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .filterrow .flabel { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em;
    color:var(--text-muted); width:64px; flex:none; }
  .chip { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:var(--radius-full);
    border:1px solid var(--border-card); background:var(--bg-card); color:var(--text-secondary);
    font-size:12px; font-weight:500; cursor:pointer; user-select:none; transition:.12s; }
  .chip:hover { border-color:var(--border-strong); }
  .chip .dot { width:8px; height:8px; border-radius:var(--radius-full); flex:none; }
  .chip.on { background:var(--brand-soft); border-color:var(--brand); color:var(--brand); }
  .chip .ct { font-variant-numeric:tabular-nums; color:var(--text-muted); font-size:11px; }
  .chip.on .ct { color:var(--brand); }

  /* Result count */
  .meta { font-size:12px; color:var(--text-muted); margin-bottom:10px; display:flex; gap:14px; align-items:center; }

  /* Surface section */
  .surface { margin-bottom:6px; border:1px solid var(--border-card); border-radius:var(--radius-lg);
    background:var(--bg-card); overflow:hidden; }
  .surface-head { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; user-select:none; }
  .surface-head:hover { background:var(--bg-muted); }
  .caret { width:14px; height:14px; flex:none; color:var(--text-muted); transition:transform .15s; }
  .surface.collapsed .caret { transform:rotate(-90deg); }
  .surface-head .sname { font-size:14px; font-weight:700; color:var(--text-primary); }
  .surface-head .scount { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
  .surface-health { display:flex; gap:3px; margin-left:auto; align-items:center; }
  .hbar { height:6px; border-radius:var(--radius-full); }
  .surface-body { padding:0 8px 10px 8px; }
  .surface.collapsed .surface-body { display:none; }

  /* Feature row */
  .feat { display:flex; flex-direction:column; border-left:2px solid transparent; margin-left:18px; }
  .feat-row { display:flex; align-items:center; gap:10px; padding:7px 10px 7px 8px; border-radius:var(--radius-md);
    cursor:pointer; position:relative; }
  .feat-row:hover { background:var(--bg-muted); }
  .feat-row.sel { background:var(--brand-soft); }
  .accent { width:4px; align-self:stretch; border-radius:var(--radius-full); flex:none; min-height:18px; }
  .feat-caret { width:12px; height:12px; flex:none; color:var(--text-muted); transition:transform .15s; }
  .feat.collapsed .feat-caret { transform:rotate(-90deg); }
  .feat-caret.empty { visibility:hidden; }
  .feat-name { font-size:13px; font-weight:500; color:var(--text-primary); }
  .feat-summary { font-size:12px; color:var(--text-muted); margin-left:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .feat-spacer { flex:1; min-width:8px; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:var(--radius-full);
    font-size:10.5px; font-weight:600; letter-spacing:.02em; flex:none; }
  .badge .bdot { width:6px; height:6px; border-radius:var(--radius-full); }
  .dwbg { display:inline-flex; align-items:center; gap:3px; font-size:10.5px; font-weight:600; color:var(--destructive-ink);
    background:var(--destructive-soft); border:1px solid var(--destructive-border); padding:1px 6px; border-radius:var(--radius-full); flex:none; }
  .depbg { display:inline-flex; align-items:center; gap:3px; font-size:10.5px; font-weight:600; color:var(--info-ink);
    background:var(--info-soft); border:1px solid var(--info-border); padding:1px 6px; border-radius:var(--radius-full); flex:none; }

  /* directions sub-leaves */
  .dirs { margin:2px 0 6px 38px; display:flex; flex-direction:column; gap:4px; padding-left:12px;

  .drawer-body { padding:16px 20px 32px; overflow-y:auto; flex:1; }
  .sect { margin-bottom:20px; }
  .sect-h { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted);

  .summary-txt { font-size:13px; color:var(--text-secondary); line-height:1.55; }
  .dw-item { display:flex; gap:8px; padding:8px 10px; background:var(--destructive-soft); border:1px solid var(--destructive-border);

  .dir-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px dashed var(--border-strong);

  .dep-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px solid var(--info-border);

  .dep-item:hover { box-shadow:var(--shadow-sm); }

<script>
"use strict";
const DATA = JSON.parse(document.getElementById('atlas-data').textContent);
document.getElementById('reconciled').textContent = DATA.reconciledAt;

// ---- encoding maps ----
const HEALTH = {
  healthy:  { label:'Healthy',  color:'var(--success-ink)',     soft:'var(--success-soft)',     bd:'var(--success-border)' },
  partial:  { label:'Partial',  color:'var(--warning-ink)',     soft:'var(--warning-soft)',     bd:'var(--warning-border)' },
  'at-risk':{ label:'At-risk',  color:'var(--destructive-ink)', soft:'var(--destructive-soft)', bd:'var(--destructive-border)' },
  stale:    { label:'Stale',    color:'var(--muted-ink)',       soft:'var(--muted-soft)',       bd:'var(--border-strong)' },
};
const HEALTH_ORDER = ['at-risk','partial','healthy','stale'];
const STATUS = {
  idea:        { label:'idea',        soft:'var(--muted-soft)',       ink:'var(--muted-ink)' },
  planned:     { label:'planned',     soft:'var(--info-soft)',        ink:'var(--info-ink)' },
  'in-flight': { label:'in-flight',   soft:'var(--warning-soft)',     ink:'var(--warning-ink)' },
  shipped:     { label:'shipped',     soft:'var(--success-soft)',     ink:'var(--success-ink)' },
  deprecated:  { label:'deprecated',  soft:'var(--destructive-soft)', ink:'var(--destructive-ink)' },
};
const STATUS_ORDER = ['idea','planned','in-flight','shipped','deprecated'];

// ---- index ----
const featById = {};
const featSurface = {};
DATA.surfaces.forEach(s => s.features.forEach(f => { featById[f.id] = f; featSurface[f.id] = s.label; }));
const allFeatures = Object.values(featById);

// normalize directions (data has one malformed entry; keep label-only when effort missing)
function normDirs(f){
  return (f.directions||[]).filter(d => d && d.label).map(d => ({ label:d.label, effort: ['S','M','L','XL'].includes(d.effort)?d.effort:null }));
}

// ---- filter state ----
const filters = { health:new Set(), status:new Set(), surface:new Set(), q:'' };

function matches(f, surfaceId){
  if (filters.health.size && !filters.health.has(f.health)) return false;
  if (filters.status.size && !filters.status.has(f.status)) return false;
  if (filters.surface.size && !filters.surface.has(surfaceId)) return false;
  if (filters.q){
    const q = filters.q.toLowerCase();
    const hay = (f.label + ' ' + (f.summary||'')).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

// ---- build filter chips ----
function countBy(getKey){
  const m = {};
  allFeatures.forEach(f => { const k = getKey(f); m[k] = (m[k]||0)+1; });
  return m;
}
const healthCounts = countBy(f=>f.health);
const statusCounts = countBy(f=>f.status);
const surfaceCounts = {}; DATA.surfaces.forEach(s => surfaceCounts[s.id]=s.features.length);

function chip(text, on, dotColor, count, onClick){
  const el = document.createElement('span');
  el.className = 'chip' + (on?' on':'');
  if (dotColor){ const d=document.createElement('span'); d.className='dot'; d.style.background=dotColor; el.appendChild(d); }
  el.appendChild(document.createTextNode(text));
  if (count!=null){ const c=document.createElement('span'); c.className='ct'; c.textContent=count; el.appendChild(c); }
  el.onclick = onClick;
  return el;
}
function renderFilterChips(){
  const fh = document.getElementById('f-health'); fh.innerHTML='';
  HEALTH_ORDER.forEach(h => fh.appendChild(chip(HEALTH[h].label, filters.health.has(h), HEALTH[h].color, healthCounts[h]||0, ()=>toggle('health',h))));
  const fs = document.getElementById('f-status'); fs.innerHTML='';
  STATUS_ORDER.filter(s=>statusCounts[s]).forEach(s => fs.appendChild(chip(STATUS[s].label, filters.status.has(s), null, statusCounts[s]||0, ()=>toggle('status',s))));
  const fsu = document.getElementById('f-surface'); fsu.innerHTML='';
  DATA.surfaces.forEach(s => fsu.appendChild(chip(s.label, filters.surface.has(s.id), null, surfaceCounts[s.id], ()=>toggle('surface',s.id))));
}
function toggle(kind, val){
  const set = filters[kind];
  if (set.has(val)) set.delete(val); else set.add(val);
  renderFilterChips(); renderTree();
}

// ---- icons ----
const IC = {
  caret:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
  warn:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  link:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
  bulb:'<svg class="dir-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>',
  x:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
};

// ---- render tree ----
const treeEl = document.getElementById('tree');
const collapsedSurfaces = new Set(); // surface ids collapsed
const collapsedFeats = new Set();    // feature ids whose dirs collapsed
let selectedId = null;

function healthBar(features){
  // tiny stacked composition bar of health for the surface
  const counts = {}; features.forEach(f=>counts[f.health]=(counts[f.health]||0)+1);
  const total = features.length || 1;
  const frag = document.createDocumentFragment();
  HEALTH_ORDER.forEach(h=>{ if(counts[h]){ const b=document.createElement('span'); b.className='hbar';
    b.style.background=HEALTH[h].color; b.style.width=Math.max(6,(counts[h]/total)*60)+'px'; b.title=counts[h]+' '+HEALTH[h].label; frag.appendChild(b);} });
  return frag;
}

function makeBadge(status){
  const st = STATUS[status] || {label:status, soft:'var(--muted-soft)', ink:'var(--muted-ink)'};
  const b=document.createElement('span'); b.className='badge'; b.style.background=st.soft; b.style.color=st.ink;
  b.textContent=st.label; return b;
}

function renderTree(){
  treeEl.innerHTML='';
  let shown=0;
  DATA.surfaces.forEach(s=>{
    const visFeats = s.features.filter(f=>matches(f,s.id));
    if (!visFeats.length) return;
    shown += visFeats.length;
    const sec=document.createElement('div'); sec.className='surface'+(collapsedSurfaces.has(s.id)?' collapsed':'');
    const head=document.createElement('div'); head.className='surface-head';
    const car=document.createElement('span'); car.className='caret'; car.innerHTML=IC.caret;
    const nm=document.createElement('span'); nm.className='sname'; nm.textContent=s.label;
    const ct=document.createElement('span'); ct.className='scount'; ct.textContent=visFeats.length+(visFeats.length!==s.features.length?(' / '+s.features.length):'');
    const hh=document.createElement('span'); hh.className='surface-health'; hh.appendChild(healthBar(visFeats));
    head.appendChild(car); head.appendChild(nm); head.appendChild(ct); head.appendChild(hh);
    head.onclick=()=>{ if(collapsedSurfaces.has(s.id))collapsedSurfaces.delete(s.id);else collapsedSurfaces.add(s.id); renderTree(); };
    sec.appendChild(head);

    const body=document.createElement('div'); body.className='surface-body';
    visFeats.forEach(f=>{
      const dirs=normDirs(f);
      const feat=document.createElement('div'); feat.className='feat'+(collapsedFeats.has(f.id)?' collapsed':'');
      const row=document.createElement('div'); row.className='feat-row'+(selectedId===f.id?' sel':'');
      const acc=document.createElement('span'); acc.className='accent'; acc.style.background=HEALTH[f.health].color;
      const fc=document.createElement('span'); fc.className='feat-caret'+(dirs.length?'':' empty'); fc.innerHTML=IC.caret;
      const nm2=document.createElement('span'); nm2.className='feat-name'; nm2.textContent=f.label;
      const sm=document.createElement('span'); sm.className='feat-summary'; sm.textContent=f.summary||'';
      const sp=document.createElement('span'); sp.className='feat-spacer';
      row.appendChild(acc); row.appendChild(fc); row.appendChild(nm2); row.appendChild(sm); row.appendChild(sp);
      if ((f.drawbacks||[]).length){ const d=document.createElement('span'); d.className='dwbg'; d.innerHTML=IC.warn+' '+f.drawbacks.length; d.title=f.drawbacks.length+' drawback(s)'; row.appendChild(d); }
      if ((f.deps||[]).length){ const d=document.createElement('span'); d.className='depbg'; d.textContent='dep '+f.deps.length; d.title=f.deps.length+' dependency(ies)'; row.appendChild(d); }
      row.appendChild(makeBadge(f.status));
      // caret toggles dirs; rest opens drawer
      fc.onclick=(e)=>{ e.stopPropagation(); if(!dirs.length)return; if(collapsedFeats.has(f.id))collapsedFeats.delete(f.id);else collapsedFeats.add(f.id); renderTree(); };
      row.onclick=()=>openDrawer(f.id);
      feat.appendChild(row);
      if (dirs.length){
        const dd=document.createElement('div'); dd.className='dirs';
        dirs.forEach(dir=>{
          const de=document.createElement('div'); de.className='dir';
          de.innerHTML=IC.bulb;
          const dl=document.createElement('span'); dl.className='dlabel'; dl.textContent=dir.label; de.appendChild(dl);
          if(dir.effort){ const ef=document.createElement('span'); ef.className='effort ef-'+dir.effort; ef.textContent=dir.effort; de.appendChild(ef); }
          dd.appendChild(de);
        });
        feat.appendChild(dd);
      }
      body.appendChild(feat);
    });
    sec.appendChild(body);
    treeEl.appendChild(sec);
  });
  document.getElementById('noresults').classList.toggle('hidden', shown>0);
  document.getElementById('resultcount').textContent = shown+' of '+allFeatures.length+' features';
  const atrisk = allFeatures.filter(f=>matches(f,featSurfaceId(f))&&f.health==='at-risk').length;
  document.getElementById('riskcount').textContent = atrisk? ('· '+atrisk+' at-risk in view') : '';
}
function featSurfaceId(f){ for(const s of DATA.surfaces){ if(s.features.includes(f)) return s.id; } return null; }

// ---- drawer ----
const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
function openDrawer(id){
  selectedId=id; const f=featById[id]; if(!f) return;
  const dirs=normDirs(f);
  const surfaceLabel=featSurface[id];
  let html='';
  html+='<div class="drawer-head"><div class="drawer-top">';
  html+='<span class="accent" style="background:'+HEALTH[f.health].color+'"></span>';
  html+='<div style="flex:1"><h2 class="drawer-title">'+esc(f.label)+'</h2><div class="drawer-surface">'+esc(surfaceLabel)+'</div></div>';
  html+='<button class="drawer-close" id="dclose">'+IC.x+'</button></div>';
  html+='<div class="drawer-badges">';
  const st=STATUS[f.status]||{label:f.status,soft:'var(--muted-soft)',ink:'var(--muted-ink)'};
  html+='<span class="badge" style="background:'+st.soft+';color:'+st.ink+'">'+esc(st.label)+'</span>';
  const hl=HEALTH[f.health];
  html+='<span class="badge" style="background:'+hl.soft+';color:'+hl.color+';border:1px solid '+hl.bd+'"><span class="bdot" style="background:'+hl.color+'"></span>'+hl.label+'</span>';
  if (f.lastTouched) html+='<span class="touched" style="align-self:center">touched '+esc(f.lastTouched)+'</span>';
  html+='</div></div>';

  html+='<div class="drawer-body">';
  html+='<div class="sect"><div class="sect-h">Summary</div><div class="summary-txt">'+esc(f.summary||'—')+'</div></div>';

  html+='<div class="sect"><div class="sect-h">Drawbacks';
  if((f.drawbacks||[]).length) html+='<span class="ct">'+f.drawbacks.length+'</span>'; html+='</div>';
  if((f.drawbacks||[]).length){ f.drawbacks.forEach(d=>{ html+='<div class="dw-item">'+IC.warn+'<span>'+esc(d)+'</span></div>'; }); }
  else html+='<div class="empty-note">No known drawbacks.</div>';
  html+='</div>';

  html+='<div class="sect"><div class="sect-h">Directions <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">· ideation</span>';
  if(dirs.length) html+='<span class="ct">'+dirs.length+'</span>'; html+='</div>';
  if(dirs.length){ dirs.forEach(d=>{ html+='<div class="dir-item">'+IC.bulb+'<span style="flex:1">'+esc(d.label)+'</span>'+(d.effort?'<span class="effort ef-'+d.effort+'">'+d.effort+'</span>':'')+'</div>'; }); }
  else html+='<div class="empty-note">No directions logged yet.</div>';
  html+='</div>';

  if((f.deps||[]).length){
    html+='<div class="sect"><div class="sect-h">Depends on <span class="ct">'+f.deps.length+'</span></div>';
    f.deps.forEach(dep=>{ const t=featById[dep];
      if(t) html+='<div class="dep-item" data-dep="'+esc(dep)+'">'+IC.link+'<span>'+esc(t.label)+'</span></div>';
      else html+='<div class="dep-item missing">'+IC.link+'<span>'+esc(dep)+' (external / unmodeled)</span></div>';
    });
    html+='</div>';
  }
  // reverse deps (who depends on me)
  const rdeps=allFeatures.filter(x=>(x.deps||[]).includes(id));
  if(rdeps.length){
    html+='<div class="sect"><div class="sect-h">Depended on by <span class="ct">'+rdeps.length+'</span></div>';
    rdeps.forEach(x=>{ html+='<div class="dep-item" data-dep="'+esc(x.id)+'">'+IC.link+'<span>'+esc(x.label)+'</span></div>'; });
    html+='</div>';
  }

  const links=f.links||{};
  if((links.plans||[]).length||(links.code||[]).length||(links.memory||[]).length){
    html+='<div class="sect"><div class="sect-h">Links</div>';
    if((links.code||[]).length){ html+='<div class="link-grp"><div class="lk-h">'+IC.link+' Code</div>'; links.code.forEach(p=>html+='<p class="link-path">'+esc(p)+'</p>'); html+='</div>'; }
    if((links.plans||[]).length){ html+='<div class="link-grp"><div class="lk-h">'+IC.link+' Plans</div>'; links.plans.forEach(p=>html+='<p class="link-path">'+esc(p)+'</p>'); html+='</div>'; }
    if((links.memory||[]).length){ html+='<div class="link-grp"><div class="lk-h">'+IC.link+' Memory</div>'; links.memory.forEach(p=>html+='<p class="link-path">'+esc(p)+'</p>'); html+='</div>'; }
    html+='</div>';
  }
  html+='</div>';

  drawer.innerHTML=html;
  drawer.classList.add('open'); drawer.setAttribute('aria-hidden','false'); scrim.classList.add('open');
  document.getElementById('dclose').onclick=closeDrawer;
  drawer.querySelectorAll('.dep-item[data-dep]').forEach(el=>{ el.onclick=()=>focusFeature(el.getAttribute('data-dep')); });
  renderTree();
}
function closeDrawer(){ drawer.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); scrim.classList.remove('open'); selectedId=null; renderTree(); }
scrim.onclick=closeDrawer;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

function focusFeature(id){
  const f=featById[id]; if(!f) return;
  // ensure surface expanded + filters not hiding it
  const sid=featSurface[id]; const surf=DATA.surfaces.find(s=>s.label===sid);
  if(surf) collapsedSurfaces.delete(surf.id);
  // clear filters that would hide it
  if(filters.health.size && !filters.health.has(f.health)) filters.health.clear();
  if(filters.status.size && !filters.status.has(f.status)) filters.status.clear();
  if(filters.surface.size && surf && !filters.surface.has(surf.id)) filters.surface.clear();
  filters.q=''; document.getElementById('search').value='';
  renderFilterChips();
  openDrawer(id);
  // scroll to the row
  setTimeout(()=>{ const rows=treeEl.querySelectorAll('.feat-row'); /* find by re-render and label */
    let target=null; treeEl.querySelectorAll('.feat-name').forEach(n=>{ if(n.textContent===f.label) target=n.closest('.feat-row'); });
    if(target){ target.scrollIntoView({behavior:'smooth',block:'center'}); target.style.transition='outline .2s'; target.style.outline='2px solid var(--brand)'; setTimeout(()=>target.style.outline='none',1200);} },60);
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---- wires ----
document.getElementById('search').addEventListener('input',e=>{ filters.q=e.target.value.trim(); renderTree(); });
document.getElementById('expandAll').onclick=()=>{ collapsedSurfaces.clear(); collapsedFeats.clear(); renderTree(); };
document.getElementById('collapseAll').onclick=()=>{ DATA.surfaces.forEach(s=>collapsedSurfaces.add(s.id)); renderTree(); };
const tt=document.getElementById('themeToggle');
tt.onclick=()=>{ const d=document.documentElement.getAttribute('data-theme')==='dark'; document.documentElement.setAttribute('data-theme',d?'light':'dark'); tt.textContent=d?'Dark':'Light'; };

// initial: collapse all but expand directions; surfaces expanded by default for legibility
DATA.surfaces.forEach(s=>collapsedFeats.add.call(collapsedFeats)); // noop guard
allFeatures.forEach(f=>collapsedFeats.add(f.id)); // directions collapsed by default to tame density
renderFilterChips();
renderTree();
</script>
</body>
</html>
