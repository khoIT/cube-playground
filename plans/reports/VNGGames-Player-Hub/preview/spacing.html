<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;display:flex;flex-direction:column;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--neutral-600)}
  .row{display:flex;align-items:center;gap:12px}
  .bar{background:#f05a22;height:12px;border-radius:3px}
  .n{width:80px;flex-shrink:0;color:var(--neutral-500)}
</style></head>
<body>
<div class="row"><span class="n">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="n">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="n">--space-3 · 12</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="n">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="n">--space-5 · 20</span><div class="bar" style="width:20px"></div></div>
<div class="row"><span class="n">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="n">--space-8 · 32</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="n">--space-10 · 40</span><div class="bar" style="width:40px"></div></div>
<div class="row"><span class="n">--space-12 · 48</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="n">--space-16 · 64</span><div class="bar" style="width:64px"></div></div>
</body></html>
