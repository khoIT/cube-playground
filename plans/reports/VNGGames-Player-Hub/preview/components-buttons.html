<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;gap:10px;align-items:center}
  .k{font-family:var(--font-ui);font-size:10px;color:var(--neutral-500);width:88px;letter-spacing:0.04em;text-transform:uppercase;font-weight:600}
  .btn{font-family:Inter,sans-serif;font-weight:500;font-size:14px;letter-spacing:-0.005em;border-radius:9999px;padding:8px 16px;border:1px solid transparent;cursor:pointer;line-height:1}
  .primary{background:#f05a22;color:#fff}
  .neutral{background:#171717;color:#fafafa}
  .secondary{background:#f5f5f5;color:#171717}
  .outline{background:#fff;color:#171717;border-color:#e5e5e5}
  .ghost{background:transparent;color:#171717}
  .destructive{background:#dc2626;color:#fff}
  .sm{padding:6px 14px;font-size:13px}
  .lg{padding:10px 20px;font-size:15px}
</style></head>
<body>
<div class="row"><span class="k">Default</span><button class="btn primary">Primary</button><button class="btn neutral">Neutral</button><button class="btn secondary">Secondary</button><button class="btn outline">Outline</button><button class="btn ghost">Ghost</button><button class="btn destructive">Destructive</button></div>
<div class="row"><span class="k">Small</span><button class="btn primary sm">Primary</button><button class="btn neutral sm">Neutral</button><button class="btn secondary sm">Secondary</button><button class="btn outline sm">Outline</button><button class="btn ghost sm">Ghost</button></div>
<div class="row"><span class="k">Large</span><button class="btn primary lg">Primary</button><button class="btn neutral lg">Neutral</button><button class="btn outline lg">Outline</button></div>
</body></html>
