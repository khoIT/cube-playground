<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
  .r{aspect-ratio:1;background:var(--neutral-100);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-family:var(--font-mono);font-size:10px;color:var(--neutral-500)}
</style></head>
<body>
<div class="r" style="border-radius:4px">4px · xs</div>
<div class="r" style="border-radius:6px">6px · sm</div>
<div class="r" style="border-radius:8px">8px · md</div>
<div class="r" style="border-radius:10px">10px · lg</div>
<div class="r" style="border-radius:12px">12px · xl</div>
<div class="r" style="border-radius:16px">16px · 2xl</div>
<div class="r" style="border-radius:9999px">pill</div>
</body></html>
