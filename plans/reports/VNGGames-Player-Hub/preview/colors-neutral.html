<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;}
  .scale{display:grid;grid-template-columns:repeat(11,1fr);gap:8px;}
  .sw{aspect-ratio:1;border-radius:8px;box-shadow:0 0 0 1px rgba(0,0,0,0.04) inset;position:relative;overflow:hidden}
  .lbl{font-family:var(--font-ui);font-size:10px;color:var(--neutral-500);margin-top:6px;text-align:center;letter-spacing:0.02em;font-weight:500}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--neutral-400);text-align:center;margin-top:1px}
  .cell{display:flex;flex-direction:column}
</style></head>
<body>
<div class="scale" id="sc"></div>
<script>
const steps=[["50","#fafafa"],["100","#f5f5f5"],["200","#e5e5e5"],["300","#d4d4d4"],["400","#a3a3a3"],["500","#737373"],["600","#525252"],["700","#404040"],["800","#262626"],["900","#171717"],["950","#0a0a0a"]];
sc.innerHTML=steps.map(([k,v])=>`<div class="cell"><div class="sw" style="background:${v}"></div><div class="lbl">${k}</div><div class="hex">${v.toUpperCase()}</div></div>`).join('');
</script>
</body></html>
