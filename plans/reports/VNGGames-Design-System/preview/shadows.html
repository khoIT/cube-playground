<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px 24px;background:#f5f5f5;display:grid;grid-template-columns:repeat(6,1fr);gap:16px}
  .card{aspect-ratio:1.1;background:#fff;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--neutral-500)}
</style></head>
<body>
<div class="card" style="box-shadow:var(--shadow-xs)"><div class="n">shadow-xs</div></div>
<div class="card" style="box-shadow:var(--shadow-sm)"><div class="n">shadow-sm</div></div>
<div class="card" style="box-shadow:var(--shadow-md)"><div class="n">shadow-md</div></div>
<div class="card" style="box-shadow:var(--shadow-lg)"><div class="n">shadow-lg</div></div>
<div class="card" style="box-shadow:var(--shadow-xl)"><div class="n">shadow-xl</div></div>
<div class="card" style="box-shadow:var(--shadow-2xl)"><div class="n">shadow-2xl</div></div>
</body></html>
