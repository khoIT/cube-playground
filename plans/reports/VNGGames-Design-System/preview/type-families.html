<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=League+Gothic&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .fam{border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:4px;min-height:100px}
  .k{font-family:'Inter',sans-serif;font-size:10px;color:var(--neutral-500);letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
  .n{font-size:26px;line-height:1.05;letter-spacing:-0.01em}
  .u{font-family:var(--font-mono);font-size:10px;color:var(--neutral-500)}
</style></head>
<body>
<div class="fam"><div class="k">Display</div><div class="n" style="font-family:'League Gothic';font-weight:400;font-size:42px;letter-spacing:0.01em;line-height:1">LEAGUE GOTHIC</div><div class="u">Headlines, hero titles, eSports moments</div></div>
<div class="fam"><div class="k">Body · UI</div><div class="n" style="font-family:'Inter';font-weight:500">Inter — Aa Bb 123</div><div class="u">Body, labels, buttons, everything UI</div></div>
<div class="fam"><div class="k">Alt sans</div><div class="n" style="font-family:Geist;font-weight:500">Geist — Aa Bb 123</div><div class="u">Secondary sans · product copy</div></div>
<div class="fam"><div class="k">Monospace</div><div class="n" style="font-family:'Geist Mono';font-weight:500">Geist Mono — Aa 01</div><div class="u">Code, IDs, numerals</div></div>
</body></html>
