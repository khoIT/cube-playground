<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:stretch}
  .card{display:flex;flex-direction:column;gap:8px}
  .k{font-family:Inter,sans-serif;font-size:9px;color:var(--neutral-500);letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
  .box{border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;align-items:center;justify-content:center;min-height:92px;flex:1}
  .dark{background:#0a0a0a;border-color:#0a0a0a}
  .wordmark{max-width:100%;height:28px;display:block}
  .mark{width:56px;height:56px;display:block}
  .single{grid-column:auto}
</style></head>
<body>
<div class="card"><span class="k">VNGGames · Light</span><div class="box"><img class="wordmark" src="../assets/logo/vnggames-light.png"></div></div>
<div class="card"><span class="k">VNGGames · Dark</span><div class="box dark"><img class="wordmark" src="../assets/logo/vnggames-dark.png"></div></div>
<div class="card"><span class="k">LevelUp · Subbrand</span><div class="box"><img class="wordmark" src="../assets/logo/levelup.png" style="height:24px"></div></div>
<div class="card"><span class="k">App mark · Light</span><div class="box"><img class="mark" src="../assets/logo/appmark-light.png"></div></div>
<div class="card"><span class="k">App mark · Dark</span><div class="box dark"><img class="mark" src="../assets/logo/appmark-dark.png"></div></div>
</body></html>
