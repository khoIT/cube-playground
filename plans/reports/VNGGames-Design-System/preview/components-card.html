<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fafafa;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .c{background:#fff;border:1px solid #e5e5e5;border-radius:10px;box-shadow:var(--shadow-sm);padding:20px;display:flex;flex-direction:column;gap:12px}
  .h{font-family:Inter,sans-serif;font-weight:600;font-size:16px;letter-spacing:-0.005em;color:#0a0a0a;margin:0}
  .d{font-family:Inter,sans-serif;font-size:13px;color:#737373;margin:0}
  .row{display:flex;align-items:center;gap:10px}
  .stat{font-family:Inter,sans-serif;font-weight:700;font-size:28px;color:#0a0a0a;letter-spacing:-0.01em}
  .trend{font-family:Inter,sans-serif;font-size:12px;color:#059669;display:inline-flex;gap:4px;align-items:center}
  .btn{background:#f05a22;color:#fff;border:0;border-radius:9999px;padding:7px 14px;font-family:Inter,sans-serif;font-weight:500;font-size:13px;cursor:pointer;align-self:flex-start}
  .c i{font-size:14px;line-height:1}
</style></head>
<body>
<div class="c">
  <div class="row" style="justify-content:space-between">
    <p class="d" style="font-size:12px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600">Daily active players</p>
    <i class="ri-group-line" style="color:#737373;font-size:16px"></i>
  </div>
  <div class="stat">842,104</div>
  <span class="trend"><i class="ri-arrow-up-line"></i>+12.4% vs last week</span>
</div>
<div class="c">
  <h3 class="h">Verify your account</h3>
  <p class="d">Confirm your email to unlock rewards and cross-platform sync.</p>
  <button class="btn">Send verification</button>
</div>
</body></html>
