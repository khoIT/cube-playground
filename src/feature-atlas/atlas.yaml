# Feature Atlas — living triage & ideation map for cube-playground.
#
# Source of truth. Dual-use: human triage/ideation view (rendered at /admin/dev/atlas)
# AND agent-readable context. Kept fresh on-demand via `/atlas reconcile` (NO automation).
#
# Model: Surface -> Feature -> Direction. Edit THIS file; the in-app page is a pure renderer.
#   status:  idea | planned | in-flight | shipped | deprecated
#   health:  healthy | partial | at-risk | stale
#   directions: future bets, rendered as dashed leaf nodes (the ideation surface)
#   drawbacks:  known limitations / open gaps (the triage surface)
#   deps:       other feature ids this relies on
#
# Seeded 2026-06-25 from plans/ + plans/complete/ + MEMORY.md. Curate freely.
version: 1
# Quoted so the GMT+7 time survives (an unquoted datetime is parsed to a Date
# and normalizeAtlas would slice off the time). Header shows date + HH:mm.
