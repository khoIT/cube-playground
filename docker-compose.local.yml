# Local-mirror override for docker-compose.prod.yml.
#
# Goal: run the EXACT production composition on a developer laptop, so a change
# verified locally behaves identically once pushed to playground.gds.vng.vn.
#
# This file holds ONLY the deltas a local host needs. The prod topology, build
# targets, service wiring, healthchecks, and published ports all come from
# docker-compose.prod.yml and are deliberately NOT restated here — restating
# them would let the local and prod definitions drift, defeating the purpose.
#
# Run via:  npm run stack            (wrapper: scripts/stack-local.mjs)
# which layers this file on the prod compose, auto-selects the cubestore image
# arch for the host, and feeds .env.docker.local for both container env_file and
# ${VAR} interpolation. Equivalent raw command:
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.local.yml \
#     --env-file .env.docker.local up -d --build
#
# Deltas vs prod:
#   - env_file → .env.docker.local: the laptop's local-posture secrets
#     (AUTH_DISABLED=true, local Trino/Anthropic creds) stay out of the prod .env
#     and out of git. cube_api/cubestore read their values via ${VAR}
#     interpolation, which the wrapper's --env-file supplies from the same file.
#   - cubestore image arch: the wrapper sets CUBESTORE_TAG to the arm64v8 build on
#     Apple Silicon (cubejs/cubestore is not multi-arch); prod keeps amd64 :latest.

services:
  server:
    env_file:
      - .env.docker.local
    # Laptop posture is break-glass (AUTH_DISABLED=true, see above). The server's
    # fail-closed guard refuses to boot when AUTH_DISABLED is true under
    # NODE_ENV=production — that guard protects the REAL prod host
    # (playground.gds.vng.vn), not this local mirror. Override NODE_ENV here so
    # the documented local break-glass posture can actually start. Real prod
    # keeps NODE_ENV=production from docker-compose.prod.yml and must run
    # AUTH_DISABLED=false. Flip this mirror to real auth only once Keycloak is
    # wired into .env.docker.local (KEYCLOAK_URL/REALM/CLIENT_ID/SECRET).
    environment:
      NODE_ENV: development

  chat-service:
    env_file:
      - .env.docker.local

  cube_api:
    # colima/lima file-shares deny reads on single-FILE bind mounts ("cannot
    # open ...: operation not permitted") — the prod compose mounts the
    # entrypoint patch as one such file. Directory mounts (e.g. /cube/conf) are
    # fine. So locally we INLINE the same patch (strip Trino's unprivileged
    # `SET SESSION query_max_run_time` from the Presto driver, then exec the
    # stock entrypoint) instead of reading the mounted script. Behaviour is
    # identical to docker/cube-entrypoint-patched.sh; prod uses the file mount
    # on a real Linux host and is untouched (this override is local-only).
    entrypoint:
      - sh
      - -c
      - |
        P=/cube/node_modules/@cubejs-backend/prestodb-driver/dist/src/PrestoDriver.js
        [ -f "$$P" ] && sed -i 's|.*query_max_run_time.*|                    session: undefined,|' "$$P"
        exec docker-entrypoint.sh "$$@"
      - sh
