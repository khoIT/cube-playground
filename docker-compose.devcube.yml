# Dedicated Cube backend for the `npm run dev` / `dev:all` loop.
#
# This is a SEPARATE pair of containers (cube_api_dev + cubestore_dev), NOT an
# override of the stack's cube_api. Why: the dev loop wants Cube in the
# standalone file-auth posture on :4000, while `npm run stack` wants the prod
# mirror (server-bridge auth on :17001). They used to share one cube_api
# container and fight over its posture/ports — every recreate by one mode broke
# the other. Giving the dev loop its own container lets BOTH run at once:
#   - `npm run stack`  → cube_api      (:17001, AUTH_API_URL=http://server:3004)
#   - `npm run dev:all`→ cube_api_dev  (:4000,  AUTH_API_URL="" file auth)
#
# Layered ONLY when STACK_DEV_CUBE=1 (the dev:all watchdog sets it); the full
# stack never sees these services. The watchdog brings them up explicitly:
#   docker compose -f docker-compose.prod.yml -f docker-compose.local.yml \
#     -f docker-compose.devcube.yml --env-file .env.docker.local \
#     up -d cube_api_dev cubestore_dev
#
# It restates cube_api's config (rather than `extends`) so it can publish ONLY
# :4000 and carry its own name without compose list-merge appending the prod
# :17001/:15432 mappings or colliding on the explicit container_name. The DB
# creds and secret still come from .env.docker.local via ${VAR} interpolation,
# so there's a single source for those — only the topology is duplicated.

services:
  cube_api_dev:
    image: cubejs/cube:latest
    container_name: cube-playground-cube-api-dev
    environment:
      CUBEJS_DEV_MODE: "false"
      CUBEJS_LOG_LEVEL: ${CUBEJS_LOG_LEVEL:-info}
      CUBEJS_SCHEMA_PATH: model
      TZ: ${TZ:-UTC}
      # Trino connection — same creds as the stack cube_api (from .env.docker.local).
      CUBEJS_DB_TYPE: ${CUBEJS_DB_TYPE:-trino}
      CUBEJS_DB_HOST: ${CUBEJS_DB_HOST:-}
      CUBEJS_DB_PORT: ${CUBEJS_DB_PORT:-8080}
      CUBEJS_DB_USER: ${CUBEJS_DB_USER:-}
      CUBEJS_DB_PASS: ${CUBEJS_DB_PASS:-}
      CUBEJS_DB_PRESTO_CATALOG: ${CUBEJS_DB_PRESTO_CATALOG:-game_integration}
      CUBEJS_DB_CATALOG: ${CUBEJS_DB_CATALOG:-game_integration}
      CUBEJS_DB_SSL: ${CUBEJS_DB_SSL:-true}
      # Must equal the host gateway's CUBEJS_API_SECRET so its minted JWTs verify.
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-}
      CUBEJS_CUBESTORE_HOST: cubestore_dev
      CUBEJS_CUBESTORE_PORT: "3030"
      # Raise Node's heap ceiling (default ~2GB). Compiling the large multi-game
      # model + serializing the ~34MB /v1/meta spikes memory; the default heap
      # OOMs → restart → recompile loop (the 503 hang). Container/host (colima VM)
      # RAM must be >= this, else Docker OOM-kills before V8 hits the ceiling.
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Hard OFF on the serving instance (event-loop wedge risk). Rollups are
      # built by cube_refresh_worker_dev below; pinned literal so an env value
      # meant for the worker can never flip this instance.
      CUBEJS_REFRESH_WORKER: "false"
      # Single auth source: resolve JWT userIds via the HOST gateway's
      # /internal/access bridge — the same authority the stack cube uses. The
      # gateway mints per-user tokens (userId = the user's email), so file auth
      # would deny every real user ("Unknown user khoitn@vng.com.vn"). Under
      # AUTH_DISABLED the bridge resolves every key as an all-games admin,
      # mirroring the synth identity. File path kept as an explicit opt-out
      # (set CUBE_DEV_AUTH_API_URL="" to fall back to auth-users.example.json).
      AUTH_API_URL: ${CUBE_DEV_AUTH_API_URL:-http://host.docker.internal:3004}
      AUTH_USERS_FILE: /cube/conf/auth-users.example.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # colima/lima file-shares deny reads on single-FILE bind mounts, so inline
    # the same patch the stack uses (strip Trino's unprivileged SET SESSION
    # query_max_run_time from the Presto driver) instead of mounting the script.
    entrypoint:
      - sh
      - -c
      - |
        P=/cube/node_modules/@cubejs-backend/prestodb-driver/dist/src/PrestoDriver.js
        [ -f "$$P" ] && sed -i 's|.*query_max_run_time.*|                    session: undefined,|' "$$P"
        exec docker-entrypoint.sh "$$@"
      - sh
    command: ["cubejs", "server"]
    ports:
      - "4000:4000"   # REST / GraphQL — where the host gateway + Vite proxy point
    volumes:
      - ./cube-dev/cube:/cube/conf:ro
    depends_on:
      - cubestore_dev
    restart: unless-stopped

  # Dedicated pre-aggregation refresh worker for the dev cube. Without it a
  # fresh cubestore_dev volume reproduces the prod failure exactly: any query
  # matching a model rollup hard-fails with "No pre-aggregation partitions were
  # built yet". Same file-auth posture as cube_api_dev; refresh contexts are
  # synthetic (cube-dev/cube/cube.js scheduledRefreshContexts) so it builds all
  # games' rollups standalone. Started by scripts/ensure-cube-api.mjs alongside
  # cube_api_dev.
  cube_refresh_worker_dev:
    image: cubejs/cube:latest
    container_name: cube-playground-cube-refresh-worker-dev
    environment:
      CUBEJS_DEV_MODE: "false"
      CUBEJS_LOG_LEVEL: ${CUBEJS_LOG_LEVEL:-info}
      CUBEJS_SCHEMA_PATH: model
      TZ: ${TZ:-UTC}
      CUBEJS_DB_TYPE: ${CUBEJS_DB_TYPE:-trino}
      CUBEJS_DB_HOST: ${CUBEJS_DB_HOST:-}
      CUBEJS_DB_PORT: ${CUBEJS_DB_PORT:-8080}
      CUBEJS_DB_USER: ${CUBEJS_DB_USER:-}
      CUBEJS_DB_PASS: ${CUBEJS_DB_PASS:-}
      CUBEJS_DB_PRESTO_CATALOG: ${CUBEJS_DB_PRESTO_CATALOG:-game_integration}
      CUBEJS_DB_CATALOG: ${CUBEJS_DB_CATALOG:-game_integration}
      CUBEJS_DB_SSL: ${CUBEJS_DB_SSL:-true}
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-}
      CUBEJS_CUBESTORE_HOST: cubestore_dev
      CUBEJS_CUBESTORE_PORT: "3030"
      # Raise Node's heap ceiling well above the API: this worker compiles the
      # full model AND builds every game's rollups standalone (games × rollups ×
      # partitions), the heaviest memory consumer in the stack. Container/host
      # (colima VM) RAM must be >= this, else Docker OOM-kills before V8's limit.
      NODE_OPTIONS: "--max-old-space-size=8192"
      # Keep the laptop→Trino backfill gentle (games × rollups × ~29 partitions).
      CUBEJS_REFRESH_WORKER_CONCURRENCY: ${CUBEJS_REFRESH_WORKER_CONCURRENCY:-2}
      # THIS is the refresh worker, sweeping hourly (a full all-games sweep is a
      # heavy Trino+CubeStore job, so it runs once an hour rather than minutely).
      # Per-rollup refresh_key `every:` still governs actual rebuild cadence; the
      # sweep is just how often the worker wakes to evaluate staleness. Deliberately
      # NOT using CUBEJS_REFRESH_WORKER — that boolean short-circuits Cube's
      # refreshWorkerMode env chain and the numeric timer would be ignored
      # (interval silently stays 30s). The numeric timer alone both enables
      # worker mode and sets the sweep interval (seconds).
      CUBEJS_SCHEDULED_REFRESH_TIMER: ${CUBEJS_SCHEDULED_REFRESH_TIMER:-3600}
      # Optional: scope the scheduled sweep to a subset of games (comma-separated).
      # Used by cube-dev/scripts/trigger-preagg-build.sh to seal one game's rollups
      # without re-grinding all tenants. Empty = every supported game (default).
      CUBE_REFRESH_GAMES: ${CUBE_REFRESH_GAMES:-}
      # Pre-aggregation partitions are built per query timezone — a query in a
      # timezone the worker didn't build for finds no partitions and hard-fails
      # ("No pre-aggregation partitions were built yet"). The UI sends the
      # viewer's browser timezone (Asia/Saigon for this team), so build both it
      # and UTC. log_date-grain data is date-only, so the extra timezone is cheap.
      CUBEJS_SCHEDULED_REFRESH_TIMEZONES: ${CUBEJS_SCHEDULED_REFRESH_TIMEZONES:-UTC,Asia/Saigon}
      AUTH_API_URL: ""
      AUTH_USERS_FILE: /cube/conf/auth-users.example.json
    # Same inline Presto-driver patch as cube_api_dev (colima denies single-file
    # bind mounts, so the script can't be mounted).
    entrypoint:
      - sh
      - -c
      - |
        P=/cube/node_modules/@cubejs-backend/prestodb-driver/dist/src/PrestoDriver.js
        [ -f "$$P" ] && sed -i 's|.*query_max_run_time.*|                    session: undefined,|' "$$P"
        exec docker-entrypoint.sh "$$@"
      - sh
    command: ["cubejs", "server"]
    # No ports: serves no traffic, only builds rollups into cubestore_dev.
    volumes:
      - ./cube-dev/cube:/cube/conf:ro
    depends_on:
      - cubestore_dev
    restart: unless-stopped

  cubestore_dev:
    image: cubejs/cubestore:${CUBESTORE_TAG:-latest}
    container_name: cube-playground-cubestore-dev
    # Expose the MySQL-protocol port so the host dev server (:3000, tsx-watch)
    # can run read-only SYSTEM.* introspection for the CubeStore storage panel.
    # In-stack callers reach it by service name; this map is only for host dev.
    ports:
      - "13306:3306"
    environment:
      CUBESTORE_DATA_DIR: /cube/data
    volumes:
      - cubestore_dev_data:/cube/data
    restart: unless-stopped

volumes:
  # Separate pre-agg store so the dev cube never contends with the stack's
  # cubestore_data volume.
  cubestore_dev_data:
