# mf_users-hub preset bundle — SINGLE SOURCE OF TRUTH for both consumers:
#   - FE   (src/pages/Segments/presets/mf-users-hub.ts, build-time ?raw import):
#          renders the Insights tabs and hydrates cards from the server cache by
#          `kpi:<id>` / `kpi:<tabId>:<id>` / `card:<tabId>:<cardId>` keys.
#   - Server (server/src/presets/mf-users-hub.ts, boot-time fs read): the
#          card-runner precomputes exactly these specs into segment_card_cache.
# One file means the cache keys and measures CANNOT drift between the two sides
# (they did twice as hand-synced TS mirrors).
#
# mf_users is a per-user dimensional table (1 row per user), so time-series
# cards key off lifecycle dates (install / first_active / first_recharge).
#
# Measure choice: composition / install-trend / paying-rate cards use the
# APPROX count measures so they route to the `user_composition` rollup
# (exact count_distinct cannot be served from a year-partitioned rollup);
# ±~2% HLL error is fine for bars/trends. Headline KPIs and cards whose
# group-by/time-dim is in no rollup (campaign, last-login country,
# first-active / first-recharge trends) keep the exact measure — approx
# there would change numbers without a routing win.

id: mf_users-hub
label: mf_users hub
hubCube: mf_users
identityDim: mf_users.user_id
reachableCubes: [mf_users]
# Grouped by user_id, ltv_total_vnd aggregates to that one user's lifetime
# value — the ranking key the refresh job uses for member tiers (server-only).
ltvMeasure: mf_users.ltv_total_vnd
# Exact distinct user count — the refresh job sizes cohorts with this measure
# (a single COUNT(DISTINCT) pushed to Trino) instead of `total: true`, which
# forced Cube to project + group every identity row (~10x slower). The _approx
# HLL variant is pre-aggregation-backed and undercounts badly when those
# rollups are only partially sealed, so sizing must use the exact measure.
sizeMeasure: mf_users.user_count

headlineKpis:
  - { id: size,   label: Size,              measure: mf_users.user_count,             format: compact }
  - { id: paying, label: Paying users,      measure: mf_users.paying_users,           format: compact }
  - { id: ltv,    label: LTV total,         measure: mf_users.ltv_total_vnd,          format: currency }
  - { id: arpu,   label: ARPU,              measure: mf_users.arpu_vnd,               format: currency }
  - { id: whales, label: Whales,            measure: mf_users.whales_count,           format: compact }
  - { id: lapsed, label: Lapsed this month, measure: mf_users.lapsed_this_month_count, format: compact }

# Per-member info on the Members tab (FE-only; server ignores).
memberColumns:
  # Friendly identity: latest in-game role name. Only some games model it
  # (jus today) — games without the dim drop the column via the /meta check
  # in use-member-dim-rows.
  - { id: name,        label: In-game name, dimension: mf_users.ingame_name }
  - { id: ltv,         label: LTV,         measure: mf_users.ltv_total_vnd, format: currency }
  - { id: stage,       label: Stage,       dimension: mf_users.lifecycle_stage }
  - { id: last-active, label: Last active, dimension: mf_users.last_active_date }
  - { id: joined,      label: Joined,      dimension: mf_users.install_date }

tabs:
  - id: overview
    label: Overview
    gridCols: 2
    kpis: []
    cards:
      - { kind: segmented-bar, id: lifecycle-strip,  label: Lifecycle stage, measure: mf_users.user_count_approx, groupBy: mf_users.lifecycle_stage, limit: 5 }
      - { kind: segmented-bar, id: payer-tier-strip, label: Spend tier,      measure: mf_users.user_count_approx, groupBy: mf_users.payer_tier,      limit: 5, footer: 'Avg LTV: see Monetization tab' }
      - { kind: bar,           id: top-countries,    label: Top countries,   measure: mf_users.user_count_approx, groupBy: mf_users.country,         limit: 10, format: compact }
      - { kind: donut,         id: platform-donut,   label: Device platform, measure: mf_users.user_count_approx, groupBy: mf_users.os_platform,     limit: 5 }
      - { kind: line,          id: installs-90d,     label: Installs (last 90 days), measure: mf_users.user_count_approx, timeDimension: mf_users.install_date, dateRange: last 90 days, granularity: day, format: compact }
      - { kind: bar,           id: top-campaigns,    label: Top campaigns,   measure: mf_users.user_count, groupBy: mf_users.campaign_label, chipBy: mf_users.campaign_platform, limit: 8, format: compact }
      - { kind: bar,           id: acq-platform,     label: Acquisition platform, measure: mf_users.user_count, groupBy: mf_users.ad_platform, limit: 7, format: compact }

  - id: engagement
    label: Engagement
    gridCols: 2
    kpis:
      - { id: paying-30d, label: Paying users (30d), measure: mf_users.paying_users_30d,        format: compact }
      - { id: rate-30d,   label: Paying rate (30d),  measure: mf_users.paying_rate_30d,         format: percent }
      - { id: lapsed,     label: Lapsed this month,  measure: mf_users.lapsed_this_month_count, format: compact }
    cards:
      - { kind: composition, id: lifecycle-eng,    label: Lifecycle stage,             measure: mf_users.user_count_approx, groupBy: mf_users.lifecycle_stage, limit: 6 }
      - { kind: bar,         id: last-country,     label: Users by last-login country, measure: mf_users.user_count, groupBy: mf_users.last_login_country, limit: 8, format: compact }
      - { kind: line,        id: first-active-90d, label: First-active (last 90 days), measure: mf_users.user_count, timeDimension: mf_users.first_active_date, dateRange: last 90 days, granularity: day, format: compact }

  - id: monetization
    label: Monetization
    gridCols: 2
    kpis:
      - { id: ltv-total, label: LTV total, measure: mf_users.ltv_total_vnd,     format: currency }
      - { id: ltv-30d,   label: LTV 30d,   measure: mf_users.ltv_30d_total_vnd, format: currency }
      - { id: arppu,     label: ARPPU,     measure: mf_users.arppu_vnd,         format: currency }
      - { id: whales,    label: Whales,    measure: mf_users.whales_count,      format: compact }
    cards:
      - { kind: composition, id: payer-tier-comp, label: Payer tier,                    measure: mf_users.user_count_approx, groupBy: mf_users.payer_tier, limit: 6 }
      - { kind: bar,         id: rev-by-media,    label: LTV by media source,           measure: mf_users.ltv_total_vnd, groupBy: mf_users.media_source, limit: 6, format: currency }
      - { kind: line,        id: first-rev-90d,   label: First-recharge (last 90 days), measure: mf_users.user_count, timeDimension: mf_users.first_recharge_date, dateRange: last 90 days, granularity: day, format: compact }
      - { kind: bar,         id: rev-by-platform, label: LTV by OS platform,            measure: mf_users.ltv_total_vnd, groupBy: mf_users.os_platform, limit: 5, format: currency }

  - id: retention
    label: Retention
    gridCols: 2
    kpis:
      - { id: paying-30d-r, label: Paying users (30d), measure: mf_users.paying_users_30d,        format: compact }
      - { id: rate-30d-r,   label: Paying rate (30d),  measure: mf_users.paying_rate_30d,         format: percent }
      - { id: lapsed-r,     label: Lapsed this month,  measure: mf_users.lapsed_this_month_count, format: compact }
    cards:
      - { kind: composition, id: lifecycle-ret,    label: Lifecycle stage,              measure: mf_users.user_count_approx,  groupBy: mf_users.lifecycle_stage, limit: 6 }
      - { kind: bar,         id: rate-by-platform, label: Paying rate by OS platform,   measure: mf_users.paying_rate_approx, groupBy: mf_users.os_platform, limit: 5, format: percent }
      - { kind: bar,         id: rate-by-media,    label: Paying rate by media source,  measure: mf_users.paying_rate_approx, groupBy: mf_users.media_source, limit: 6, format: percent }
      - { kind: line,        id: installs-30d-ret, label: Installs (last 30 days),      measure: mf_users.user_count_approx,  timeDimension: mf_users.install_date, dateRange: last 30 days, granularity: day, format: compact }
