id: arpu
label: ARPU
description: Average revenue per active user — revenue divided by DAU/WAU/MAU.
synonyms: [average_revenue_per_user]
tier: 1
domain: revenue
owner: data-platform@vng
trust: certified
formula:
  type: measure
  ref: mf_users.arpu_vnd
unit: VND
format: currency
game_compatibility:
  required_cubes: [mf_users]
meta:
  serving:
    - game: cfm_vn
      latency: cold
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        mf_users ltv_by_install_cohort_batch rollup is keyed on install_date,
        not a daily time-series; no daily-grain pre-agg exists for arpu_vnd.
