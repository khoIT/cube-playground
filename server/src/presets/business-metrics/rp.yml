id: rp
label: Paying retention (day n)
description: >-
  Classic exact-day paying retention rate — Rpuser(n) / NPU on D0. Day 0 is the first payment date.
  Tracks whether new payers continue paying on day n.
synonyms:
  - paying_retention_rate
  - rp_dn
  - payer_retention
tier: 2
domain: retention
owner: data-platform@vng
trust: certified
formula:
  type: ratio
  numerator: new_user_retention.rpnpu_d7
  denominator: new_user_retention.npu
game_compatibility:
  required_cubes:
    - new_user_retention
parameter:
  name: 'n'
  label: Day (n)
  options:
    - 1
    - 3
    - 7
    - 14
    - 21
    - 30
    - 60
    - 90
  default: 7
format: percent
