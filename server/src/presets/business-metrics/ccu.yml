id: ccu
label: CCU
description: Concurrent users — distinct users online at a measurement timestamp.
synonyms:
  - concurrent_users
tier: 2
domain: concurrency
owner: data-platform@vng
trust: certified
formula:
  type: measure
  ref: ccu.avg
game_compatibility:
  required_cubes:
    - ccu
format: compact
# No static anomaly block: CCU resolves per game (jus_vn ~10k avg, ptg ~97k) so a
# single global hardcoded delta can't be correct for both. Anomaly state comes
# from the live detector — the legacy /load pass z-scores ccu.avg per game and
# the SQLite inbox watches ccu.peak (see anomaly-config.ts). The badge falls back
# to nothing (not a fabricated value) when the detector has no entry.
meta:
  applicability:
    - game: jus_vn
      applicable: true
      at: '2026-06-17T00:00:00.000Z'
      note: >-
        etl_ingame_ccu sampling source exists (~30s, 14 servers); the ccu cube aligns servers into a
        1-min bucket and sums system-wide concurrency. Headline CCU = average of the per-bucket
        system series over the window.
    - game: ptg
      applicable: true
      at: '2026-06-17T00:00:00.000Z'
      note: >-
        etl_ingame_ccu sampling source exists (~5min, 2 servers); the ccu cube aligns servers into a
        5-min bucket and sums system-wide concurrency. Headline CCU = average of the per-bucket
