id: diamond_spend_events
label: Diamond spend events
description: >-
  Total diamond-spend transaction events in the period. Counts outflow events
  from etl_money_flow filtered to diamond currency and spend-type transactions
  only (apply segments: diamond_only + spends_only at query time).
synonyms: [diamond_outflow_events, diamond_spend_count]
tier: 3
domain: engagement
owner: data-platform@vng
trust: draft
formula:
  type: measure
  ref: etl_money_flow.out_events
format: compact
game_compatibility:
  required_cubes: [etl_money_flow]
