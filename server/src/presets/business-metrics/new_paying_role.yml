id: new_paying_role
label: New paying role
description: >-
  Unique game characters/roles that made their first ever payment during the
  period. Each role counts once in its lifetime.
synonyms: [new_paying_character]
tier: 3
domain: payments
owner: data-platform@vng
trust: draft
formula:
  type: measure
  ref: mf_users.new_paying_roles
format: compact
game_compatibility:
  required_cubes: [mf_users]
meta:
  applicability:
    - game: cfm_vn
      applicable: false
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        role-grain identity exists for cfm_vn (user_roles), but per-role recharge
        columns are not populated upstream — new-paying-role counts would be 0
        until ETL backfills. Use user-grain new_paying_users meanwhile.
