  Funnel-step conversion rate at the CDN Download step. AppsFlyer_ids that
  completed CDN Download divided by the total AppsFlyer_id pool.
synonyms: [funnel_cdn_cvr, download_conversion]
tier: 2
domain: acquisition
owner: marketing-ops@vng
trust: draft
formula:
  type: ratio
  numerator: funnel.users_completed_cdn_download
  denominator: funnel.users_total
format: percent
game_compatibility:
  required_cubes: [funnel]
meta:
  applicability:
    - game: cfm_vn
      applicable: false
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        cfm_vn does not have a funnel cube; AppsFlyer funnel data is not
        ingested for this game.
