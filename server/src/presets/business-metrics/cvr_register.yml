id: cvr_register
label: CVR — Registration
description: >-
  Funnel-step conversion rate at the Registration step. AppsFlyer_ids that
  completed registration divided by the total AppsFlyer_id pool.
synonyms: [funnel_register_cvr, registration_conversion]
tier: 2
domain: acquisition
owner: data-platform@vng
trust: draft
formula:
  type: ratio
  numerator: funnel.users_completed_register
  denominator: funnel.users_total
format: percent
game_compatibility:
  required_cubes: [funnel]
meta:
  applicability:
    - game: cfm_vn
      applicable: false
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        cfm_vn does not have a funnel cube; AppsFlyer funnel data is not
        ingested for this game.
