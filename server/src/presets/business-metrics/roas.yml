id: roas
label: ROAS (day n)
description: >-
  Return on ad spend at day n — cumulative revenue per install (RevRPI(n))
  divided by marketing cost on the report date. Canonical parameterized ROAS;
  concrete fixed variants (e.g. roas_07) are equivalent projections.
synonyms: [return_on_ad_spend, roas_dn]
tier: 1
domain: marketing
owner: marketing-ops@vng
trust: draft
formula:
  type: ratio
  numerator: mf_users.rev_per_install_d7
  denominator: mf_users.marketing_cost
format: percent
game_compatibility:
  required_cubes: [mf_users]
parameter:
  name: n
  label: Day (n)
  options: [0, 1, 3, 7, 14, 21, 30, 60, 90, 120, 150, 180]
  default: 7
