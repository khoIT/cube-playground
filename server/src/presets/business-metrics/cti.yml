id: cti
label: CTI
description: >-
  Click-to-install rate — installs divided by clicks. Measures how efficiently ad clicks convert
  into app installations.
synonyms:
  - click_to_install_rate
tier: 2
domain: marketing
owner: marketing-ops@vng
trust: certified
formula:
  type: ratio
  numerator: game_key_metrics.installs
  denominator: game_key_metrics.clicks
game_compatibility:
  required_cubes:
    - game_key_metrics
format: percent
