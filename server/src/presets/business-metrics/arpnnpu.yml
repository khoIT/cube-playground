id: arpnnpu
label: ARPNNPU
description: >-
  Average revenue per new register & new paying user (RevNNPU / NNPU). After
  repoint to game_key_metrics, numerator is total cohort revenue (not
  NNPU-only) — best available single-mart approximation.
synonyms: [avg_revenue_per_nnpu]
tier: 3
domain: revenue
owner: data-platform@vng
trust: draft
formula:
  type: ratio
  numerator: game_key_metrics.rev
  denominator: game_key_metrics.nnpu
unit: VND
format: currency
game_compatibility:
  required_cubes: [game_key_metrics]
