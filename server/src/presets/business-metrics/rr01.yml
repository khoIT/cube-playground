id: rr01
label: D1 retention
description: >-
  Day-1 new-user retention rate — users active on D1 / users that registered
  on D0. Classic exact-day retention.
synonyms: [retention_d1, r1]
tier: 1
domain: retention
owner: data-platform@vng
trust: certified
formula:
  type: ratio
  numerator: retention.retained_d1
  denominator: retention.cohort_size
format: percent
game_compatibility:
  required_cubes: [retention]
meta:
  serving:
    - game: cfm_vn
      latency: cold
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        retention cube is a SQL-derived two-pass self-join with no
        pre_aggregations block; cold scan ~14s.
