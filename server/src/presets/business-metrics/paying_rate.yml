id: paying_rate
label: Paying rate
description: >-
  Ratio of paying users to active users in the same period
  (daily / weekly / monthly).
synonyms: [conversion_to_paying]
tier: 2
domain: payments
owner: data-platform@vng
trust: certified
formula:
  type: ratio
  numerator: recharge.paying_users
  denominator: active_daily.dau
format: percent
game_compatibility:
  required_cubes: [recharge, active_daily]
parameter:
  name: window
  label: Window
  options: [daily, weekly, monthly]
  default: daily
meta:
  serving:
    - game: cfm_vn
      latency: cold
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        Cross-cube ratio; recharge has no pre-aggregation so the numerator
        always scans source. Full scan ~5s.
