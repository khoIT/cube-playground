id: ltv_30
label: LTV Day 30
description: >-
  Daily cohort LTV at D30 (rev/NRU on report_date) — total revenue on
  report_date divided by NRU on that date. Not a D0..D30 cumulative LTV: true
  30-day cohort LTV requires summing revenue attributed to the cohort from D0
  to D30, which needs a cohort-window join not yet available. Kept draft until
  semantics are confirmed.
synonyms: [lifetime_value_d30]
tier: 1
domain: retention
owner: data-platform@vng
trust: draft
formula:
  type: ratio
  numerator: game_key_metrics.rev
  denominator: game_key_metrics.nru
unit: VND
format: currency
game_compatibility:
  required_cubes: [game_key_metrics]
meta:
  serving:
    - game: cfm_vn
      latency: cold
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        Draft pending semantics review; query scans game_key_metrics source
        when no rollup partition covers the requested date range.
anomaly:
  state: trend
  deltaPct: 7.8
  period: 14d rolling
  breakdowns:
    country:
      - label: VN
        deltaPct: 11.4
      - label: TH
        deltaPct: 6.0
      - label: ID
        deltaPct: 3.2
    channel:
      - label: paid_google
        deltaPct: 14.3
      - label: paid_meta
        deltaPct: 8.1
      - label: organic
        deltaPct: 2.5
