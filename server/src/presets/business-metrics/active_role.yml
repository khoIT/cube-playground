id: active_role
label: Active role
description: >-
  Unique game characters/roles that were active during the period. Each role counts once per
  reporting window regardless of activity volume.
synonyms:
  - active_characters
  - active_roles
tier: 3
domain: engagement
owner: data-platform@vng
trust: certified
formula:
  type: measure
  ref: user_roles.active_roles
game_compatibility:
  required_cubes:
    - user_roles
format: compact
meta:
  applicability:
    - game: ballistar
      applicable: false
      at: '2026-05-30T08:08:33.070Z'
    - game: cfm_vn
      applicable: true
      at: '2026-06-17T00:00:00.000Z'
      note: >-
        cfm_vn has multi-role identity (user_roles is one row per user×server×role); active_roles
        counts distinct roles whose last_active_date falls in the window.
  trust_history:
    - trust: certified
      at: '2026-06-17T06:24:14.406Z'
      actor: khoitn@vng.com.vn
      note: role-grain measures added to user_roles cube; refs resolve vs cfm_vn /meta
