id: active_role
label: Active role
description: >-
  Unique game characters/roles that were active during the period. Each role counts once per
  reporting window regardless of activity volume.
synonyms:
  - active_characters
  - active_roles
tier: 3
domain: engagement
owner: data-platform@vng
trust: draft
formula:
  type: measure
  ref: mf_users.active_roles
game_compatibility:
  required_cubes:
    - mf_users
format: compact
meta:
  applicability:
    - game: ballistar
      applicable: false
      at: "2026-05-30T08:08:33.070Z"
    - game: cfm_vn
      applicable: false
      at: "2026-06-10T00:00:00.000Z"
      note: >-
        cfm_vn uses a single-character model; per-role metrics are structurally
        not applicable.
