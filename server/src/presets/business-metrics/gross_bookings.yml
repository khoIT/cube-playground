id: gross_bookings
label: Gross bookings
description: >-
  Total amount charged to users across purchase orders, before deductions and
  refunds. Approximated by recharge.revenue_vnd today — exact for wallet-less
  games, slight under-count for games where wallet top-ups defer item delivery.
  Re-point to a dedicated billing cube measure when Billing exposes one.
synonyms: [gross_bookings_vnd, billing_gross]
tier: 2
domain: revenue
owner: billing@vng
trust: draft
formula:
  type: measure
  ref: recharge.revenue_vnd
unit: VND
format: currency
game_compatibility:
  required_cubes: [recharge]
