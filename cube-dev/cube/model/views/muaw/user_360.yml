views:
  # ===========================================================================
  # 360-view surfaces (entity-first, one user at a time) — muaw
  #
  # Thin facets over one source each, mirroring the ballistar/jus core-360 family
  # so the product layer reuses the same core panel shape:
  #
  #   user_profile           ← mf_users
  #   user_activity_timeline ← active_daily            (std_ingame_user_active_daily)
  #   user_recharge_timeline ← user_recharge_daily     (std_ingame_user_recharge_daily)
  #   user_transactions      ← recharge (raw)          (etl_ingame_recharge)
  #
  # No FPS / role / device / IP cubes modeled yet → core 360 only. Issue the four
  # queries in PARALLEL with a user_id equality filter; wall-clock is bounded by
  # the slowest.
  # ===========================================================================

  - name: user_profile
    description: >
      Single-user wide profile (one row per user). Always filter by user_id
      with the equals operator for sub-second response.
    cubes:
      - join_path: mf_users
        includes:
          # identity & acquisition
          - user_id
          - country
          - os_platform
          - install_date
          - install_month
          - media_source
          - campaign_id
          - is_paid_install
          # login state
          - first_login_date
          - first_login_channel
          - first_login_country
          - first_device_model
          - last_login_date
          - last_login_channel
          - last_login_country
          # activity state
          - first_active_date
          - last_active_date
          - total_active_days
          - max_role_level
          - max_fighting_power
          - last_role_class
          - last_server_id
          - days_since_install
          - days_since_last_active
          - days_since_last_recharge
          # recharge state (lifetime + 30d rolling pre-aggregated)
          - first_recharge_date
          - last_recharge_date
          - ltv_vnd
          - ltv_usd
          - ltv_30d_vnd
          - ltv_30d_usd
          - ltv_iap_vnd
          - ltv_web_vnd
          - lifetime_txn_count
          - lifetime_txn_count_iap
          - lifetime_txn_count_web
          - txn_count_30d
          - max_vip_level
          # derived classifications
          - is_paying_user
          - is_paying_30d
          - payer_tier
          - lifecycle_stage

  - name: user_activity_timeline
    description: >
      One row per day a user was active. Filter by user_id equals + date range
      and order by log_date desc for the activity-history panel of a 360 view.
    cubes:
      - join_path: active_daily
        includes:
          - user_id
          - log_date
          - log_month
          - server_id
          - role_id
          - role_class
          - country_code
          - os_platform
          - client_ip
          - device_id
          - max_role_level
          - max_fighting_power
          - online_time_sec
          - distinct_servers_today
          - distinct_devices_today
          - is_recharge_day
          - rows
          - last_7d
          - last_30d

  - name: user_recharge_timeline
    description: >
      One row per day a user recharged, with daily totals already pre-aggregated
      upstream. Faster than raw transactions — use this for the 360 revenue
      timeline. For per-transaction detail, see user_transactions.
    cubes:
      - join_path: user_recharge_daily
        includes:
          - user_id
          - log_date
          - log_month
          - server_id
          - role_id
          - role_level
          - vip_level
          - max_vip_level_today
          - country_code
          - os_platform
          - payment_channel
          - product_id
          - revenue_vnd
          - revenue_usd
          - revenue_vnd_iap
          - revenue_vnd_web
          - txn_count
          - txn_count_iap
          - txn_count_web
          - revenue_vnd_total
          - txn_count_total
          - last_7d
          - last_30d

  # muaw's recharge cube has no currency / country_code / yuanbao_received
  # members (jus-specific) — those are dropped here.
  - name: user_transactions
    description: >
      One row per recharge transaction. Slower than user_recharge_timeline —
      only request when the 360 panel needs per-transaction detail.
    cubes:
      - join_path: recharge
        includes:
          - user_id
          - transaction_id
          - role_id
          - role_name
          - recharge_time
          - recharge_date
          - log_month
          - payment_channel
          - product_id
          - server_id
          - os_platform
          - value_vnd
          - txn_value_band_vnd
          - transactions
          - revenue_vnd
          - last_7d
          - last_30d
