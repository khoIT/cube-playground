views:
  # ===========================================================================
  # 360-view surfaces — CFM VN (mirror of ballistar_vn/user_360.yml)
  # See cube/model/views/ballistar_vn/user_360.yml for the design notes.
  # ===========================================================================

  - name: user_profile
    description: >
      Single-user wide profile (one row per user). Always filter by user_id
      with the equals operator for sub-second response.
    cubes:
      - join_path: mf_users
        includes:
          - user_id
          - appsflyer_id
          - country
          - os_platform
          - install_date
          - install_month
          - media_source
          - campaign_id
          - is_paid_install
          - first_login_date
          - first_login_channel
          - first_login_country
          - first_device_model
          - last_login_date
          - last_login_channel
          - last_login_country
          - geo_moved
          - first_active_date
          - last_active_date
          - total_active_days
          - max_role_level
          - max_fighting_power
          - last_role_class
          - last_server_id
          - days_since_install
          - days_since_last_active
          - days_since_last_recharge
          - first_recharge_date
          - last_recharge_date
          - ltv_vnd
          - ltv_usd
          - ltv_30d_vnd
          - ltv_30d_usd
          - ltv_iap_vnd
          - ltv_web_vnd
          - lifetime_txn_count
          - lifetime_txn_count_iap
          - lifetime_txn_count_web
          - txn_count_30d
          - max_vip_level
          - is_paying_user
          - is_paying_30d
          - payer_tier
          - lifecycle_stage
          - engagement_segment

  - name: user_activity_timeline
    description: >
      One row per day a user was active. Filter by user_id equals + date range
      and order by log_date desc for the activity-history panel of a 360 view.
    cubes:
      - join_path: active_daily
        includes:
          - user_id
          - log_date
          - log_month
          - server_id
          - role_id
          - role_class
          - country_code
          - os_platform
          - client_ip
          - device_id
          - max_role_level
          - max_fighting_power
          - online_time_sec
          - distinct_servers_today
          - distinct_devices_today
          - is_recharge_day
          - rows
          - last_7d
          - last_30d

  - name: user_recharge_timeline
    description: >
      One row per day a user recharged, with daily totals already pre-aggregated
      upstream. Faster than raw transactions — use this for the 360 revenue
      timeline. For per-transaction detail, see cfm_user_transactions.
    cubes:
      - join_path: user_recharge_daily
        includes:
          - user_id
          - log_date
          - log_month
          - server_id
          - role_id
          - role_level
          - vip_level
          - max_vip_level_today
          - country_code
          - os_platform
          - payment_channel
          - product_id
          - revenue_vnd
          - revenue_usd
          - revenue_vnd_iap
          - revenue_vnd_web
          - txn_count
          - txn_count_iap
          - txn_count_web
          - revenue_vnd_total
          - txn_count_total
          - last_7d
          - last_30d

  - name: user_transactions
    description: >
      One row per recharge transaction. Slower than cfm_user_recharge_timeline —
      only request when the 360 panel needs per-transaction detail.
    cubes:
      - join_path: recharge
        includes:
          - user_id
          - transaction_id
          - recharge_time
          - recharge_date
          - log_month
          - payment_channel
          - product_id
          - server_id
          - value_vnd
          - ingame_value
          - txn_value_band_vnd
          - transactions
          - revenue_vnd
          - last_7d
          - last_30d

  - name: user_audience
    description: >
      Segmentation + top-N surface (mf_users dims only — no event-stream joins).
      Two usage modes.
      (1) Cohort aggregation — group by cohort dimensions (country, payer_tier,
      lifecycle_stage, engagement_segment, ...) and read measures (user_count,
      paying_rate, ltv_total_vnd, ...). Do NOT include user_id.
      (2) Top-N user ranking — include user_id as a dimension plus any
      per-user numeric/time dimension (ltv_vnd, total_active_days,
      max_role_level, last_active_date, ...) and supply order = desc with a
      limit N for top-N. Use asc for bottom-N / oldest / least-active. Pair
      with segments (whales, vn_users, at_risk_paying, ...) to scope the
      leaderboard.
      For single-user profile lookup, use cfm_user_profile instead.
    cubes:
      - join_path: mf_users
        includes:
          # identity (required for top-N user ranking)
          - user_id
          # cohort + filter dimensions
          - country
          - os_platform
          - install_month
          - media_source
          - campaign_id
          - is_paid_install
          - payer_tier
          - lifecycle_stage
          - engagement_segment
          - is_paying_user
          - is_paying_30d
          - last_role_class
          - last_server_id
          # per-user sortable numeric dims (top-N sort keys)
          - total_active_days
          - max_role_level
          - max_fighting_power
          - max_vip_level
          - ltv_vnd
          - ltv_usd
          - ltv_30d_vnd
          - ltv_30d_usd
          - ltv_iap_vnd
          - ltv_web_vnd
          - lifetime_txn_count
          - lifetime_txn_count_iap
          - lifetime_txn_count_web
          - txn_count_30d
          - days_since_install
          - days_since_last_active
          - days_since_last_recharge
          # per-user sortable time dims (newest-first / oldest-first ranking)
          - install_date
          - first_login_date
          - last_login_date
          - first_active_date
          - last_active_date
          - first_recharge_date
          - last_recharge_date
          # cohort measures
          - user_count
          - user_count_approx
          - paying_users
          - paying_users_30d
          - whales_count
          - lapsed_this_month_count
          - ltv_total_vnd
          - ltv_30d_total_vnd
          - arpu_vnd
          - arppu_vnd
          - paying_rate
          - paying_rate_30d
          # segments
          - vn_users
          - paying_lifetime
          - paying_recently_30d
          - whales
          - high_level_players
          - at_risk_paying
          - new_install_7d
          - paid_install
          - lapsed_this_month

  - name: revenue_metrics
    description: Daily / monthly revenue metrics from the recharge event stream.
    cubes:
      - join_path: recharge
        includes:
          - recharge_time
          - recharge_date
          - payment_channel
          - product_id
          - txn_value_band_vnd
          - revenue_vnd
          - transactions
          - paying_users
          - arppu_vnd
          - arpt_vnd
          - last_7d
          - last_30d

  - name: activity_metrics
    description: DAU / MAU / activity-day analytics from std_ingame_user_active_daily.
    cubes:
      - join_path: active_daily
        includes:
          - log_date
          - log_month
          - country_code
          - os_platform
          - server_id
          - dau
          - mau
          - mau_prev_month
          - rows
          - active_servers
          - last_7d
          - last_30d
          - yesterday

  # ===========================================================================
  # Extended 360 panels — built on cubes joined to mf_users via user_id.
  # ===========================================================================

  - name: user_roles_panel
    description: >
      All characters/roles a user has played. Filter by user_id equals for the
      "characters" panel of a 360 view. Aggregates without a user filter give
      role-level cohort views (paying_roles, vip_roles, etc.).
    cubes:
      - join_path: user_roles
        includes:
          - user_id
          - role_id
          - server_id
          - first_role_name
          - last_role_name
          - first_role_class
          - last_role_class
          - first_active_date
          - last_active_date
          - first_recharge_date
          - last_recharge_date
          - total_active_days
          - total_recharge_days
          - min_role_level
          - max_role_level
          - last_role_level
          - max_fighting_power
          - last_fighting_power
          - min_vip_level
          - max_vip_level
          - role_ltv_vnd
          - role_ltv_usd
          - role_ltv_30d_vnd
          - role_txn_count
          - role_txn_count_30d
          - rows
          - distinct_roles
          - distinct_servers
          - roles_revenue_vnd
          - roles_txn_count
          - paying_roles
          - high_level_roles
          - vip_roles

  - name: user_devices_panel
    description: >
      All devices a user has played from. Useful for shared-device detection
      and the "devices" panel of a 360 view. device_id is PII — surfaced
      behind public=false on the underlying cube.
    cubes:
      - join_path: user_devices
        includes:
          - user_id
          - first_active_date
          - last_active_date
          - first_recharge_date
          - last_recharge_date
          - rows
          - distinct_devices
          - distinct_users

  - name: user_ips_panel
    description: >
      All IPs a user has connected from. Useful for fraud / shared-network
      analysis. client_ip is PII — surfaced behind public=false; obs sidecar
      hashes filter values automatically.
    cubes:
      - join_path: user_ips
        includes:
          - user_id
          - first_active_date
          - last_active_date
          - first_recharge_date
          - last_recharge_date
          - rows
          - distinct_ips
          - distinct_users

  - name: user_activity_monthly
    description: >
      Per-user, per-month activity rollup. Use for monthly retention curves,
      MAU trends, and the monthly band of the activity panel in a 360 view.
      For daily detail use cfm_user_activity_timeline.
    cubes:
      - join_path: user_active_monthly
        includes:
          - user_id
          - log_month
          - log_quarter
          - log_year
          - active_days
          - recharge_days
          - is_recharge_month
          - last_role_class
          - max_role_level
          - last_role_level
          - last_country_code
          - last_os_platform
          - last_server_id
