  # ===========================================================================
  # Cross-cutting ops panels — iceberg-sourced enrichment joined to mf_users.
  # Each panel is its own single-cube view (no multi-fact blend → no fan-out).
  # PII dims (device/email/staff) are public:false on the cubes and excluded here.
  # ===========================================================================

  - name: user_identity_panel
    description: >
      [freshness: lagging] The net-new-vs-mf_users identity fields for one user
      from the cross-game VGA pipeline (load ~1 month behind): account
      register_date, last OS, install app store, vga user_type. Everything else
      (geo, channels, LTV, lifecycle) lives in the live mf_users panels above.
    cubes:
      - join_path: user_identity
        includes:
          - user_id
          - register_date
          - last_os
          - install_app_store
          - user_type
          - users

  - name: user_billing_detail_panel
    description: >
      [freshness: live] Payment gateway/method/store/item/promo breakdown for one
      user (gateway-charged cash — enrichment, NOT the authoritative revenue; that
      stays user_recharge_timeline). Filter by user_id; group by currency before
      summing amounts (jus is mixed USD+VND). Gross only.
    cubes:
      - join_path: billing_detail
        includes:
          - user_id
          - order_date
          - currency
          - payment_gateway
          - payment_method_id
          - payment_provider_id
          - store
          - item_type
          - promotion_type
          - txn_count_total
          - cash_charged_gross
          - promo_charged_gross
          - lps_charged_gross
          - wallet_charged_gross
          - product_delivered_gross
          - wallet_delivered_gross
          - paying_users
          - last_7d
          - last_30d
          - promo_orders

  - name: user_billing_lifetime_panel
    description: >
      [freshness: live] RECONCILIATION-ONLY. Gateway-charged lifetime value per
      user — compare against the authoritative ingame mf_users LTV (a gap is
      expected, gateway cash vs ingame delivery). NOT a new LTV source.
    cubes:
      - join_path: billing_lifetime
        includes:
          - user_id
          - lifetime_txn_count
          - lifetime_vnd
          - lifetime_usd
          - payers
          - lifetime_vnd_total
          - lifetime_usd_total
          - lifetime_txn_total
          - lifetime_arppu_vnd

  - name: user_cs_tickets_panel
    description: >
      [freshness: lagging] Support tickets with resolution / CSAT / sentiment /
      VIP / routing. Game-aggregate metrics are reliable (100% product-scoped);
      member-level join is best-effort (~23% cfm — most CS is Facebook,
      unjoinable). Filter by member_user_id for a single member's tickets.
    cubes:
