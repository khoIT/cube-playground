          - recharging_users
          - this_month
          - prev_month
          - last_3_months

  - name: user_revenue_monthly
    description: >
      Per-user, per-month revenue rollup. Use for MRR trend, paying-user
      retention, and the monthly band of the revenue panel in a 360 view.
      For daily detail use cfm_user_recharge_timeline; per-txn cfm_user_transactions.
    cubes:
