cubes:
  - name: mf_users
    # The raw mf_users mart carries each real user as TWO disjoint rows keyed in
    # different identity namespaces: a bare GDS-id row holding the SDK/MMP
    # attribution columns (country, os_platform, campaign, media_source) and an
    # `<id>@vng_vie.win.163.com` row holding the ingame columns (recharge, LTV,
    # activity). The upstream identity join misses because ingame sources key
    # accounts with the channel suffix — so attribution dims were NULL for every
    # paying user and user counts were ~2x inflated. Merge the halves here on
    # the normalized id; split_part is a no-op for already-bare ids. max()
    # ignores NULLs, so each column resolves from whichever half carries it.
    # ingame_name (latest active role name) is attached from mf_ingame_roles
    # for human-readable member lists.
    sql: >
      WITH merged AS (
        SELECT
          split_part(user_id, '@', 1) AS user_id,
          max(gds_bundle_code) AS gds_bundle_code,
          max(install_date) AS install_date,
          max(install_month) AS install_month,
          max(media_source) AS media_source,
          max(campaign_id) AS campaign_id,
          max(is_paid_install) AS is_paid_install,
          max(appsflyer_id) AS appsflyer_id,
          max(unified_first_country_code) AS unified_first_country_code,
          max(unified_first_os_platform) AS unified_first_os_platform,
          max(sdk_first_login_date) AS sdk_first_login_date,
          max(sdk_first_login_month) AS sdk_first_login_month,
          max(sdk_last_login_date) AS sdk_last_login_date,
          max(sdk_first_login_channel) AS sdk_first_login_channel,
          max(sdk_last_login_channel) AS sdk_last_login_channel,
          max(sdk_first_login_country_code) AS sdk_first_login_country_code,
          max(sdk_last_login_country_code) AS sdk_last_login_country_code,
          max(sdk_first_login_device_model) AS sdk_first_login_device_model,
          max(ingame_first_active_date) AS ingame_first_active_date,
          max(ingame_last_active_date) AS ingame_last_active_date,
          max(ingame_total_active_days) AS ingame_total_active_days,
          max(ingame_max_active_role_level) AS ingame_max_active_role_level,
          max(ingame_max_active_fighting_power) AS ingame_max_active_fighting_power,
          max(ingame_last_active_role_class) AS ingame_last_active_role_class,
          max(ingame_last_active_server_id) AS ingame_last_active_server_id,
          max(ingame_first_recharge_date) AS ingame_first_recharge_date,
          max(ingame_last_recharge_date) AS ingame_last_recharge_date,
          max(ingame_total_recharge_value_vnd) AS ingame_total_recharge_value_vnd,
          max(ingame_total_recharged_value_usd) AS ingame_total_recharged_value_usd,
          max(ingame_total_recharge_value_vnd_30d) AS ingame_total_recharge_value_vnd_30d,
          max(ingame_total_recharge_value_usd_30d) AS ingame_total_recharge_value_usd_30d,
          max(ingame_total_recharged_value_vnd_iap) AS ingame_total_recharged_value_vnd_iap,
          max(ingame_total_recharged_value_vnd_web) AS ingame_total_recharged_value_vnd_web,
          max(ingame_total_recharge_transaction_id) AS ingame_total_recharge_transaction_id,
          max(ingame_total_recharge_transaction_id_iap) AS ingame_total_recharge_transaction_id_iap,
          max(ingame_total_recharge_transaction_id_web) AS ingame_total_recharge_transaction_id_web,
          max(ingame_total_recharge_transaction_id_30d) AS ingame_total_recharge_transaction_id_30d,
          max(ingame_max_recharge_vip_level) AS ingame_max_recharge_vip_level
        FROM mf_users
        GROUP BY 1
      ),
      latest_role AS (
        SELECT
          split_part(user_id, '@', 1) AS user_id,
          max_by(ingame_last_active_role_name, ingame_last_active_date) AS ingame_name
        FROM mf_ingame_roles
        GROUP BY 1
      )
      SELECT merged.*, latest_role.ingame_name
      FROM merged
      LEFT JOIN latest_role ON merged.user_id = latest_role.user_id
    title: JUS VN — User Master Profile
    description: |
      Wide feature store with one row per user. Pre-aggregates lifetime metrics (LTV, total active days, max role level) and rolling 30-day metrics (LTV 30d, recharge count 30d). Use this cube whenever a metric is already materialized here — Cube will read a single column instead of scanning event tables.
    joins:
      - name: active_daily
        relationship: one_to_many
        sql: "{CUBE}.user_id = split_part({active_daily}.user_id, '@', 1)"
      - name: user_recharge_daily
        relationship: one_to_many
        sql: "{CUBE}.user_id = split_part({user_recharge_daily}.user_id, '@', 1)"
      - name: recharge
        relationship: one_to_many
        sql: "{CUBE}.user_id = split_part({recharge}.account_id, '@', 1)"
    refresh_key:
      every: 1 hour
    dimensions:
      - name: user_id
        sql: user_id
        type: string
        primary_key: true
        public: true
      - name: ingame_name
        sql: ingame_name
        type: string
        description: Latest in-game role name (most recently active role, from mf_ingame_roles)
      - name: gds_bundle_code
        sql: gds_bundle_code
        type: string
      - name: install_date
        sql: from_iso8601_timestamp(CAST({CUBE}.install_date AS VARCHAR) || 'T00:00:00Z')
        type: time
        description: Attributed install date (from MMP). NULL for organic / pre-attribution users.
      - name: install_month
        sql: install_month
        type: string
      - name: media_source
        sql: media_source
        type: string
      - name: campaign_id
        sql: campaign_id
        type: string
      - name: is_paid_install
        sql: is_paid_install
        type: boolean
      - name: appsflyer_id
        sql: appsflyer_id
        type: string
        public: false
      - name: country
        sql: unified_first_country_code
        type: string
        description: First-seen country code (ISO-2)
      - name: os_platform
        sql: unified_first_os_platform
        type: string
      - name: first_login_date
        sql: from_iso8601_timestamp(CAST({CUBE}.sdk_first_login_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: first_login_month
        sql: sdk_first_login_month
        type: string
      - name: last_login_date
        sql: from_iso8601_timestamp(CAST({CUBE}.sdk_last_login_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: first_login_channel
        sql: sdk_first_login_channel
        type: string
      - name: last_login_channel
        sql: sdk_last_login_channel
        type: string
      - name: first_login_country
        sql: sdk_first_login_country_code
        type: string
      - name: last_login_country
        sql: sdk_last_login_country_code
        type: string
      - name: first_device_model
        sql: sdk_first_login_device_model
        type: string
      - name: first_active_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_first_active_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: last_active_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_last_active_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: total_active_days
        sql: ingame_total_active_days
        type: number
        description: Lifetime distinct active days
      - name: max_role_level
        sql: ingame_max_active_role_level
        type: number
      - name: max_fighting_power
        sql: ingame_max_active_fighting_power
        type: number
      - name: last_role_class
        sql: ingame_last_active_role_class
        type: string
      - name: last_server_id
        sql: ingame_last_active_server_id
        type: string
      - name: first_recharge_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_first_recharge_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: last_recharge_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_last_recharge_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: ltv_vnd
        sql: ingame_total_recharge_value_vnd
        type: number
        description: Lifetime recharge value in VND
      - name: ltv_usd
        sql: ingame_total_recharged_value_usd
        type: number
      - name: ltv_30d_vnd
        sql: ingame_total_recharge_value_vnd_30d
        type: number
        description: Rolling 30-day recharge value (pre-aggregated in mf_users)
      - name: ltv_30d_usd
        sql: ingame_total_recharge_value_usd_30d
        type: number
      - name: ltv_iap_vnd
        sql: ingame_total_recharged_value_vnd_iap
        type: number
      - name: ltv_web_vnd
        sql: ingame_total_recharged_value_vnd_web
        type: number
      - name: lifetime_txn_count
        sql: ingame_total_recharge_transaction_id
        type: number
      - name: lifetime_txn_count_iap
        sql: ingame_total_recharge_transaction_id_iap
        type: number
      - name: lifetime_txn_count_web
        sql: ingame_total_recharge_transaction_id_web
        type: number
      - name: txn_count_30d
        sql: ingame_total_recharge_transaction_id_30d
        type: number
      - name: max_vip_level
        sql: ingame_max_recharge_vip_level
        type: number
      - name: is_paying_user
        sql: CASE WHEN {CUBE}.ingame_total_recharge_value_vnd > 0 THEN TRUE ELSE FALSE END
        type: boolean
        description: Has any lifetime recharge
      - name: is_paying_30d
        sql: CASE WHEN {CUBE}.ingame_total_recharge_value_vnd_30d > 0 THEN TRUE ELSE FALSE END
        type: boolean
      - name: payer_tier
        type: string
        case:
          when:
            - sql: '{CUBE}.ingame_total_recharge_value_vnd >= 10000000'
              label: whale
            - sql: '{CUBE}.ingame_total_recharge_value_vnd >= 1000000'
              label: dolphin
            - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
              label: minnow
          else:
            label: non_payer
      - name: days_since_install
        sql: DATE_DIFF('day', {CUBE}.install_date, CURRENT_DATE)
        type: number
      - name: days_since_last_active
        sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE)
        type: number
      - name: days_since_last_recharge
        sql: DATE_DIFF('day', {CUBE}.ingame_last_recharge_date, CURRENT_DATE)
        type: number
      - name: lifecycle_stage
        type: string
        description: Bucketed user lifecycle based on last activity recency
        case:
          when:
            - sql: '{CUBE}.ingame_first_active_date IS NULL'
              label: registered_inactive
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 1
              label: active_today
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 7
              label: active_7d
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 30
              label: active_30d
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 90
              label: dormant
          else:
            label: churned
      - name: churn_risk
        type: string
        description: Churn-risk bucket for payers — at_risk = paying user inactive 7–30 days.
        case:
          when:
            - sql: >
                {CUBE}.ingame_total_recharge_value_vnd > 0
                AND DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) BETWEEN 7 AND 30
              label: at_risk
            - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
              label: active_payer
          else:
            label: non_payer
    measures:
      - name: user_count
        type: count_distinct
        sql: user_id
        description: Exact distinct user count (slower)
      - name: user_count_approx
        type: count_distinct_approx
        sql: user_id
        description: Approx distinct via Trino approx_distinct (HLL) — fast, ~1.6% error
      - name: ltv_total_vnd
        sql: ingame_total_recharge_value_vnd
        type: sum
      - name: ltv_total_usd
        sql: ingame_total_recharged_value_usd
        type: sum
      - name: ltv_30d_total_vnd
        sql: ingame_total_recharge_value_vnd_30d
        type: sum
        description: Sum of pre-aggregated 30d LTV across users
      - name: paying_users
        type: count_distinct
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
      - name: paying_users_approx
        type: count_distinct_approx
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
      - name: paying_users_30d
        type: count_distinct
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd_30d > 0'
      - name: whales_count
        type: count_distinct
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd >= 10000000'
      - name: lapsed_this_month_count
        type: count_distinct_approx
        sql: user_id
        filters:
          - sql: DATE_TRUNC('month', {CUBE}.ingame_last_active_date) = DATE_TRUNC('month', CURRENT_DATE) - INTERVAL '1' MONTH
        description: Approx count of users active last month but not yet this month
      - name: arpu_vnd
        sql: '{ltv_total_vnd} * 1.0 / NULLIF({user_count}, 0)'
        type: number
      - name: arppu_vnd
        sql: '{ltv_total_vnd} * 1.0 / NULLIF({paying_users}, 0)'
        type: number
        description: Average revenue per paying user (lifetime)
      - name: paying_rate
        sql: 'CAST({paying_users} AS DOUBLE) / NULLIF({user_count}, 0)'
        type: number
        format: percent
      - name: paying_rate_approx
        sql: 'CAST({paying_users_approx} AS DOUBLE) / NULLIF({user_count_approx}, 0)'
        type: number
      - name: paying_rate_30d
        sql: 'CAST({paying_users_30d} AS DOUBLE) / NULLIF({user_count}, 0)'
        type: number
        format: percent
    segments:
      - name: vn_users
        sql: '{CUBE}.unified_first_country_code = ''VN'''
        description: Vietnam first-seen users
      - name: paying_lifetime
        sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
      - name: paying_recently_30d
        sql: '{CUBE}.ingame_total_recharge_value_vnd_30d > 0'
      - name: whales
        sql: '{CUBE}.ingame_total_recharge_value_vnd >= 10000000'
        description: Lifetime recharge >= 10M VND
      - name: high_level_players
        sql: '{CUBE}.ingame_max_active_role_level >= 50'
      - name: at_risk_paying
        sql: |
          {CUBE}.ingame_total_recharge_value_vnd > 0
          AND DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) BETWEEN 7 AND 30
        description: Paying users inactive 7–30 days — churn risk
      - name: lapsed_this_month
        sql: DATE_TRUNC('month', {CUBE}.ingame_last_active_date) = DATE_TRUNC('month', CURRENT_DATE) - INTERVAL '1' MONTH
        description: Active in last calendar month but no login yet this month (last_active_date falls in previous month)
      - name: new_install_7d
        sql: '{CUBE}.install_date >= CURRENT_DATE - INTERVAL ''7'' DAY'
      - name: paid_install
        sql: '{CUBE}.is_paid_install = TRUE'

    pre_aggregations:
      - name: ltv_by_install_cohort_batch
        type: rollup
        measures:
          - ltv_total_vnd
          - ltv_30d_total_vnd
          - user_count_approx
        dimensions:
          - country
          - media_source
          - is_paid_install
          - os_platform
          - payer_tier
          - install_month
          - is_paying_user
        time_dimension: install_date
        granularity: day
        partition_granularity: year
        refresh_key:
          every: 6 hours
          incremental: true
        # Bound to the source's real data extent; year granularity collapses
        # sparse install months so no empty partition blocks the rollup.
        build_range_start:
          sql: "SELECT from_iso8601_timestamp(CAST(MIN(install_date) AS VARCHAR) || 'T00:00:00Z') FROM mf_users"
        build_range_end:
          sql: "SELECT from_iso8601_timestamp(CAST(MAX(install_date) AS VARCHAR) || 'T00:00:00Z') FROM mf_users"
      - name: ltv_by_install_cohort
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.ltv_by_install_cohort_batch

      - name: user_composition_batch
        type: rollup
        measures:
          - user_count_approx
          - paying_users_approx
        dimensions:
          - country
          - media_source
          - os_platform
          - payer_tier
          - lifecycle_stage
          - is_paying_user
        time_dimension: install_date
        granularity: day
        partition_granularity: year
        refresh_key:
          every: 6 hours
          incremental: true
        build_range_start:
          sql: "SELECT from_iso8601_timestamp(CAST(MIN(install_date) AS VARCHAR) || 'T00:00:00Z') FROM mf_users"
        build_range_end:
          sql: "SELECT from_iso8601_timestamp(CAST(MAX(install_date) AS VARCHAR) || 'T00:00:00Z') FROM mf_users"

      - name: user_composition
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.user_composition_batch
