# Retention cube — Day-N retention from std_ingame_user_active_daily.
#
# Detection contract (frontend auto-detects):
#   cube name matches /retention/i AND exposes cohort_size, retained_d1/3/7/14/30,
#   and install_date time dim. See docs/cohort-retention-cube-template.md.
#
# Definition:
#   cohort      = users by first day they appear in std_ingame_user_active_daily
#   retained DN = same user has another active row exactly N days after install
#
# Identical SQL across ballistar/cfm/jus/pubg (std_ingame_user_active_daily
# is schema-stable). Cube's per-tenant routing picks the right Trino schema.

cubes:
  - name: retention
    sql: |
      WITH first_seen AS (
        SELECT
          user_id,
          CAST(MIN(log_date) AS TIMESTAMP) AS install_date
        FROM std_ingame_user_active_daily
        WHERE {FILTER_PARAMS.retention.install_date.filter('log_date')}
        GROUP BY user_id
      ),
      activity AS (
        SELECT DISTINCT user_id, log_date AS active_date
        FROM std_ingame_user_active_daily
      )
      SELECT
        fs.install_date,
        COUNT(DISTINCT fs.user_id) AS cohort_size,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '1'  DAY THEN fs.user_id END) AS retained_d1,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '3'  DAY THEN fs.user_id END) AS retained_d3,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '7'  DAY THEN fs.user_id END) AS retained_d7,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '14' DAY THEN fs.user_id END) AS retained_d14,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '30' DAY THEN fs.user_id END) AS retained_d30
      FROM first_seen fs
      LEFT JOIN activity a ON a.user_id = fs.user_id
      GROUP BY fs.install_date

    refresh_key:
      every: 1 hour

    dimensions:
      - name: install_date
        sql: install_date
        type: time

    measures:
      - name: cohort_size
        sql: cohort_size
        type: sum

      - name: retained_d1
        sql: retained_d1
        type: sum

      - name: retained_d3
        sql: retained_d3
        type: sum

      - name: retained_d7
        sql: retained_d7
        type: sum

      - name: retained_d14
        sql: retained_d14
        type: sum

      - name: retained_d30
        sql: retained_d30
        type: sum

      # D30 churn complement: cohort members who did NOT return on day 30.
      # SUM is additive (SUM(cohort_size) - SUM(retained_d30)); churn_rate metric
      # divides this by cohort_size client-side, mirroring the rr30 ratio.
      - name: churned_d30
        sql: cohort_size - retained_d30
        type: sum

    pre_aggregations:
      # Cohort retention rollup — what churn_rate (churned_d30 / cohort_size)
      # rides on. Without it the metric is a cold ~14s two-pass self-join over
      # std_ingame_user_active_daily. Every measure here is an additive sum, so
      # the rollup serves day/week/month/total queries on install_date exactly.
      - name: cohort_retention_batch
        type: rollup
        measures:
          - cohort_size
          - retained_d1
          - retained_d3
          - retained_d7
          - retained_d14
          - retained_d30
          - churned_d30
        time_dimension: install_date
        granularity: day
        # NOT partitioned, by design. The cohort aggregate is tiny — one row per
        # install day (~hundreds total). A monthly-partitioned build only ever
        # materialised the end-month partition on this prod-mode stack: scheduled
        # refresh builds the partition holding build_range_end and considers the
        # job done; the earlier months in the range are only built on-demand
        # (a query touching them), which is disabled here. So historical cohorts
        # never sealed and D30 churn for mature cohorts returned 0 rows even
        # though the source has months of data. A single unpartitioned rollup
        # builds the full history in one CREATE TABLE, so every cohort —
        # including the ≥30-day-mature ones churn needs — is served. No
        # build_range needed: the rollup covers exactly what the cube SQL returns.
        refresh_key:
          every: 1 hour

      # Lambda union: sealed batch partitions + a live tail straight from source,
      # so recent install cohorts appear without waiting for a refresh cycle.
      - name: cohort_retention
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.cohort_retention_batch
