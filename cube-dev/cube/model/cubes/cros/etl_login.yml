cubes:
  - name: etl_login
    sql_table: etl_ingame_login
    title: CROS — Login Events
    description: >
      Per-role login events. This table carries user_id (19-digit, = mf_users.user_id)
      directly, so it joins to cros_mf_users without a role bridge. role_id
      (9-char alphanumeric, e.g. BBBQL2232) is still exposed for in-game-character
      analysis. ALWAYS query with user_id OR role_id filter + bounded log_date range
      (queryRewrite enforces this).

    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.user_id = {mf_users}.user_id"

      - name: user_roles
        relationship: many_to_one
        sql: "{CUBE}.role_id = {user_roles}.role_id"

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT(COALESCE({CUBE}.user_id, ''), '__', CAST({CUBE}.login_time AS VARCHAR), '__', COALESCE({CUBE}.role_id, ''), '__', COALESCE({CUBE}.device_id, ''))"
        type: string
        primary_key: true
        public: false

      - name: user_id
        sql: user_id
        type: string
        description: SDK account user_id (19-digit) — direct join key to mf_users

      - name: role_id
        sql: role_id
        type: string

      - name: role_name
        sql: role_name
        type: string

      - name: login_time
        sql: login_time
        type: time

      - name: log_date
        # Physical column is a Trino DATE — Cube's timezone conversion
        # (AT TIME ZONE) rejects bare dates, so cast like tf/user_recharge_daily.
        sql: "CAST({CUBE}.log_date AS TIMESTAMP)"
        type: time
        description: Partition column — REQUIRED filter for this table

      - name: log_month
        sql: log_month
        type: string

      - name: hour_of_day_vn
        sql: "HOUR({CUBE}.login_time AT TIME ZONE 'Asia/Ho_Chi_Minh')"
        type: number
        description: 0–23 in Asia/Ho_Chi_Minh

      - name: day_of_week_vn
        sql: "DAY_OF_WEEK(CAST({CUBE}.login_time AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE))"
        type: number

      - name: server_id
        sql: server_id
        type: string

      - name: server_name
        sql: server_name
        type: string

      - name: role_level
        sql: role_level
        type: number

      - name: level
        sql: level
        type: number

      - name: login_channel
        sql: login_channel
        type: string

      - name: os_platform
        sql: os_platform
        type: string

      - name: os_version
        sql: os_version
        type: string

      - name: device_id
        sql: device_id
        type: string
        public: false

      - name: device_name
        sql: device_name
        type: string

      - name: client_ip
        sql: client_ip
        type: string
        public: false

      - name: country_code
        sql: country_code
        type: string

    measures:
      - name: logins
        type: count

      - name: distinct_days
        type: count_distinct_approx
        sql: log_date

      - name: distinct_devices
        type: count_distinct_approx
        sql: device_id

      - name: distinct_ips
        type: count_distinct_approx
        sql: client_ip

      - name: distinct_servers
        type: count_distinct_approx
        sql: server_id

      - name: max_role_level
        sql: role_level
        type: max

    segments:
      - name: last_7d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"
