cubes:
  - name: ccu_by_server
    sql: >
      SELECT logdatetime_timezone_utc_7 AS online_time, log_date,
             serverid AS server, MAX(numberuseronline) AS server_online
      FROM etl_ingame_ccu
      GROUP BY logdatetime_timezone_utc_7, log_date, serverid
    title: PTG — Concurrent Users by Server (CCU breakdown)
    description: >
      One row per (online_time, server) = players online on that server at that
      ~5-minute sample. Use for per-server load balancing (hot vs cold shards).
      ptg has no login-channel split (single numberuseronline). For the single
      system-wide CCU number use the ccu cube.

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT(CAST({CUBE}.online_time AS VARCHAR), '__', {CUBE}.server)"
        type: string
        primary_key: true
        public: false

      - name: online_time
        sql: online_time
        type: time

      - name: log_date
        sql: log_date
        type: time

      - name: server
        sql: server
        type: string
        description: Game server / shard id.

    measures:
      - name: server_peak
        sql: server_online
        type: max
        description: Peak concurrent on this server in the window.

      - name: server_avg
        sql: server_online
        type: avg
        description: Average concurrent on this server in the window.

      - name: server_low
        sql: server_online
        type: min
        description: Lowest concurrent on this server in the window.

      - name: sample_count
        sql: server_online
        type: count

      - name: distinct_servers
        sql: server
        type: count_distinct_approx
        description: Number of distinct servers seen in the window.
