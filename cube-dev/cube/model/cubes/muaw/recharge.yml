cubes:
  # ===========================================================================
  # recharge — raw recharge transactions for MUAW.
  # Source: <CUBEJS_DB_SCHEMA>.etl_ingame_recharge
  #
  # IDENTITY: account_id is the GDS user id PREFIXED with a platform tag
  # ("100:3263201558784262144"); mf_users.user_id is the bare snowflake. The
  # mf_users join strips the prefix with split_part — verified 100% match
  # (51,599/51,599 txns, 2026-05-25..06-04). The header previously claimed
  # MUAW had no mf_users/std tables; the game has since graduated to the
  # full table set.
  #
  # The recharge schema is a "cleaner curated" shape — closer to ballistar's
  # canonical form than to the VNG SDK / Netease raw shapes.
  #
  # Notable quirks:
  #   - is_first_charge is VARCHAR (likely '0' / '1') — cast in CASE expression
  #   - "class" / "level" are bare column names (vs ballistar's role_class / role_level)
  #   - platform_os instead of os_platform
  #   - log_time and recharge_time both exist; recharge_time is the business event,
  #     log_time is ETL ingest time
  # ===========================================================================
  - name: recharge
    sql_table: etl_ingame_recharge
    title: MUAW — Recharge Transactions (raw events)
    description: >
      One row per recharge transaction in MUAW. Joins to mf_users via
      gds_user_id (account_id with its platform prefix stripped — raw
      account_id is "100:<gds id>" and never matches mf_users directly).
      Filter by account_id for per-user lookups.

    joins:
      - name: mf_users
        relationship: many_to_one
        # account_id carries a platform prefix ("100:<gds id>"); strip it to
        # reach the bare snowflake mf_users is keyed by.
        sql: "split_part({CUBE}.account_id, ':', 2) = {mf_users}.user_id"

    refresh_key:
      every: 5 minute

    dimensions:
      - name: transaction_id
        sql: transaction_id
        type: string
        primary_key: true

      - name: user_id
        sql: account_id
        type: string
        description: MUAW account id with platform prefix ("100:<gds id>") — use gds_user_id for the bare canonical id

      - name: gds_user_id
        sql: "split_part({CUBE}.account_id, ':', 2)"
        type: string
        description: Canonical GDS user id (account_id with the platform prefix stripped) — matches mf_users.user_id

      - name: account_id
        sql: account_id
        type: string
        public: false

      - name: role_id
        sql: role_id
        type: string

      - name: role_name
        sql: role_name
        type: string

      - name: role_class
        sql: class
        type: string

      - name: role_level
        sql: level
        type: number

      - name: vip_level
        sql: vip_level
        type: number

      - name: server_id
        sql: server_id
        type: string

      - name: recharge_time
        sql: recharge_time
        type: time

      - name: log_time
        sql: log_time
        type: time
        description: ETL ingest time (use recharge_time for business event time)

      - name: recharge_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.log_date AS VARCHAR) || 'T00:00:00Z')"
        type: time

      - name: log_month
        sql: log_month
        type: string

      - name: payment_channel
        sql: payment_channel
        type: string

      - name: os_platform
        sql: platform_os
        type: string

      - name: money_type
        sql: money_type
        type: string

      - name: product_id
        sql: product_id
        type: string

      - name: client_ip
        sql: client_ip
        type: string
        public: false

      - name: value_vnd
        sql: charged_value
        type: number
        description: Charged value in VND (MUAW is VN-only)

      - name: recharge_total_money
        sql: recharge_total_money
        type: number
        description: >
          Additional money column distinct from charged_value. Purpose unclear
          (possibly running total or multi-item recharge sum) — confirm with
          data team before using for revenue reporting.

      - name: is_first_recharge
        sql: "CASE WHEN {CUBE}.is_first_charge = '1' THEN TRUE ELSE FALSE END"
        type: boolean
        description: Source is VARCHAR; assumes '1' = true. Sample to confirm value space.

      - name: txn_value_band_vnd
        type: string
        case:
          when:
            - sql: "{CUBE}.charged_value >= 1000000"
              label: ">= 1M"
            - sql: "{CUBE}.charged_value >= 200000"
              label: "200K - 1M"
            - sql: "{CUBE}.charged_value >= 50000"
              label: "50K - 200K"
            - sql: "{CUBE}.charged_value >= 10000"
              label: "10K - 50K"
          else:
            label: "< 10K"

    measures:
      - name: transactions
        type: count

      - name: revenue_vnd
        sql: charged_value
        type: sum

      - name: paying_users
        type: count_distinct_approx
        sql: account_id

      - name: paying_users_exact
        type: count_distinct
        sql: account_id

      - name: arppu_vnd
        sql: "{revenue_vnd} * 1.0 / NULLIF({paying_users}, 0)"
        type: number

      - name: arpt_vnd
        sql: "{revenue_vnd} * 1.0 / NULLIF({transactions}, 0)"
        type: number

      - name: first_recharges
        type: count
        filters:
          - sql: "{CUBE}.is_first_charge = '1'"

    segments:
      - name: first_recharges_only
        sql: "{CUBE}.is_first_charge = '1'"

      - name: last_7d
        sql: "{CUBE}.recharge_time >= CURRENT_TIMESTAMP - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.recharge_time >= CURRENT_TIMESTAMP - INTERVAL '30' DAY"

    pre_aggregations:
      - name: revenue_daily_by_channel_batch
        type: rollup
        measures:
          - revenue_vnd
          - transactions
          - paying_users
        dimensions:
          - payment_channel
          - os_platform
          - role_class
        time_dimension: recharge_time
        granularity: day
        partition_granularity: month
        refresh_key:
          every: 1 hour
          incremental: true
        build_range_start:
          sql: "SELECT MIN(recharge_time) FROM etl_ingame_recharge"
        build_range_end:
          sql: "SELECT MAX(recharge_time) FROM etl_ingame_recharge"
      - name: revenue_daily_by_channel
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.revenue_daily_by_channel_batch
