cubes:
  - name: mf_users
    # ingame_name (latest active role name) is attached from mf_ingame_roles for
    # human-readable member lists. max_by picks the most recently active role;
    # GROUP BY collapses the one-row-per-role source to one name per user so the
    # LEFT JOIN cannot fan out mf_users' one-row-per-user grain.
    sql: >
      SELECT base.*, latest_role.ingame_name
      FROM mf_users base
      LEFT JOIN (
        SELECT
          user_id,
          max_by(ingame_last_active_role_name, ingame_last_active_date) AS ingame_name
        FROM mf_ingame_roles
        GROUP BY 1
      ) latest_role ON base.user_id = latest_role.user_id
    title: MUAW — User Master Profile
    description: |
      Wide feature store with one row per user. Pre-aggregates lifetime metrics (LTV, total active days, max role level) and rolling 30-day metrics (LTV 30d, recharge count 30d). Use this cube whenever a metric is already materialized here — Cube will read a single column instead of scanning event tables.
    joins:
      - name: active_daily
        relationship: one_to_many
        sql: '{CUBE}.user_id = {active_daily}.user_id'
      - name: user_recharge_daily
        relationship: one_to_many
        sql: '{CUBE}.user_id = {user_recharge_daily}.user_id'
      - name: recharge
        relationship: one_to_many
        # recharge.account_id carries a platform prefix ("100:<gds id>") —
        # strip it to match the bare snowflake this cube is keyed by.
        sql: "{CUBE}.user_id = split_part({recharge}.account_id, ':', 2)"
    refresh_key:
      every: 1 hour
    dimensions:
      - name: user_id
        sql: user_id
        type: string
        primary_key: true
        public: true
      - name: ingame_name
        sql: ingame_name
        type: string
        description: Latest in-game role name (most recently active role, from mf_ingame_roles)
      - name: gds_bundle_code
        sql: gds_bundle_code
        type: string
      - name: install_date
        sql: from_iso8601_timestamp(CAST({CUBE}.install_date AS VARCHAR) || 'T00:00:00Z')
        type: time
        description: Attributed install date (from MMP). NULL for organic / pre-attribution users.
      - name: install_month
        sql: install_month
        type: string
      - name: media_source
        sql: media_source
        type: string
      - name: campaign_id
        sql: campaign_id
        type: string
      - name: is_paid_install
        sql: is_paid_install
        type: boolean
      - name: appsflyer_id
        sql: appsflyer_id
        type: string
        public: false
      - name: country
        sql: unified_first_country_code
        type: string
        description: First-seen country code (ISO-2)
      - name: os_platform
        sql: unified_first_os_platform
        type: string
      - name: first_login_date
        sql: from_iso8601_timestamp(CAST({CUBE}.sdk_first_login_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: first_login_month
        sql: sdk_first_login_month
        type: string
      - name: last_login_date
        sql: from_iso8601_timestamp(CAST({CUBE}.sdk_last_login_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: first_login_channel
        sql: sdk_first_login_channel
        type: string
      - name: last_login_channel
        sql: sdk_last_login_channel
        type: string
      - name: first_login_country
        sql: sdk_first_login_country_code
        type: string
      - name: last_login_country
        sql: sdk_last_login_country_code
        type: string
      - name: first_device_model
        sql: sdk_first_login_device_model
        type: string
      - name: first_active_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_first_active_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: last_active_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_last_active_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: total_active_days
        sql: ingame_total_active_days
        type: number
        description: Lifetime distinct active days
      - name: max_role_level
        sql: ingame_max_active_role_level
        type: number
      - name: max_fighting_power
        sql: ingame_max_active_fighting_power
        type: number
      - name: last_role_class
        sql: ingame_last_active_role_class
        type: string
      - name: last_server_id
        sql: ingame_last_active_server_id
        type: string
      - name: first_recharge_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_first_recharge_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: last_recharge_date
        sql: from_iso8601_timestamp(CAST({CUBE}.ingame_last_recharge_date AS VARCHAR) || 'T00:00:00Z')
        type: time
      - name: ltv_vnd
        sql: ingame_total_recharge_value_vnd
        type: number
        description: Lifetime recharge value in VND
      - name: ltv_usd
        sql: ingame_total_recharged_value_usd
        type: number
      - name: ltv_30d_vnd
        sql: ingame_total_recharge_value_vnd_30d
        type: number
        description: Rolling 30-day recharge value (pre-aggregated in mf_users)
      - name: ltv_30d_usd
        sql: ingame_total_recharge_value_usd_30d
        type: number
      - name: ltv_iap_vnd
        sql: ingame_total_recharged_value_vnd_iap
        type: number
      - name: ltv_web_vnd
        sql: ingame_total_recharged_value_vnd_web
        type: number
      - name: lifetime_txn_count
        sql: ingame_total_recharge_transaction_id
        type: number
      - name: lifetime_txn_count_iap
        sql: ingame_total_recharge_transaction_id_iap
        type: number
      - name: lifetime_txn_count_web
        sql: ingame_total_recharge_transaction_id_web
        type: number
      - name: txn_count_30d
        sql: ingame_total_recharge_transaction_id_30d
        type: number
      - name: max_vip_level
        sql: ingame_max_recharge_vip_level
        type: number
      - name: is_paying_user
        sql: CASE WHEN {CUBE}.ingame_total_recharge_value_vnd > 0 THEN TRUE ELSE FALSE END
        type: boolean
        description: Has any lifetime recharge
      - name: is_paying_30d
        sql: CASE WHEN {CUBE}.ingame_total_recharge_value_vnd_30d > 0 THEN TRUE ELSE FALSE END
        type: boolean
      - name: payer_tier
        type: string
        case:
          when:
            - sql: '{CUBE}.ingame_total_recharge_value_vnd >= 10000000'
              label: whale
            - sql: '{CUBE}.ingame_total_recharge_value_vnd >= 1000000'
              label: dolphin
            - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
              label: minnow
          else:
            label: non_payer
      - name: days_since_install
        sql: DATE_DIFF('day', {CUBE}.install_date, CURRENT_DATE)
        type: number
      - name: days_since_last_active
        sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE)
        type: number
      - name: days_since_last_recharge
        sql: DATE_DIFF('day', {CUBE}.ingame_last_recharge_date, CURRENT_DATE)
        type: number
      - name: lifecycle_stage
        type: string
        description: Bucketed user lifecycle based on last activity recency
        case:
          when:
            - sql: '{CUBE}.ingame_first_active_date IS NULL'
              label: registered_inactive
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 1
              label: active_today
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 7
              label: active_7d
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 30
              label: active_30d
            - sql: DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) <= 90
              label: dormant
          else:
            label: churned
      - name: churn_risk
        type: string
        description: Churn-risk bucket for payers — at_risk = paying user inactive 7–30 days.
        case:
          when:
            - sql: >
                {CUBE}.ingame_total_recharge_value_vnd > 0
                AND DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) BETWEEN 7 AND 30
              label: at_risk
            - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
              label: active_payer
          else:
            label: non_payer
    measures:
      - name: user_count
        type: count_distinct
        sql: user_id
        description: Exact distinct user count (slower)
      - name: user_count_approx
        type: count_distinct_approx
        sql: user_id
        description: Approx distinct via Trino approx_distinct (HLL) — fast, ~1.6% error
      - name: ltv_total_vnd
        sql: ingame_total_recharge_value_vnd
        type: sum
      - name: ltv_total_usd
        sql: ingame_total_recharged_value_usd
        type: sum
      - name: ltv_30d_total_vnd
        sql: ingame_total_recharge_value_vnd_30d
        type: sum
        description: Sum of pre-aggregated 30d LTV across users
      - name: paying_users
        type: count_distinct
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
      - name: paying_users_approx
        type: count_distinct_approx
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
      - name: paying_users_30d
        type: count_distinct
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd_30d > 0'
      - name: whales_count
        type: count_distinct
        sql: user_id
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd >= 10000000'
      - name: lapsed_this_month_count
        type: count_distinct_approx
        sql: user_id
        filters:
          - sql: DATE_TRUNC('month', {CUBE}.ingame_last_active_date) = DATE_TRUNC('month', CURRENT_DATE) - INTERVAL '1' MONTH
        description: Approx count of users active last month but not yet this month
      - name: arpu_vnd
        sql: '{ltv_total_vnd} * 1.0 / NULLIF({user_count}, 0)'
        type: number
      - name: arppu_vnd
        sql: '{ltv_total_vnd} * 1.0 / NULLIF({paying_users}, 0)'
        type: number
        description: Average revenue per paying user (lifetime)
      - name: payer_active_days_total
        sql: ingame_total_active_days
        type: sum
        filters:
          - sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
        description: Sum of lifetime active days across paying users
      - name: avg_total_active_days
        sql: '{payer_active_days_total} * 1.0 / NULLIF({paying_users}, 0)'
        type: number
        description: Average lifetime active days per paying user (the decomposition lens lifespan factor)
      - name: paying_rate
        # CAST to DOUBLE, not `* 1.0`: the numerator is a count_distinct (bigint),
        # and `bigint * 1.0` yields decimal(_,1). Trino decimal division keeps the
        # dividend's scale (1), so a 0.7% rate truncates to 0.0. DOUBLE division
        # is floating-point and keeps full precision.
        sql: 'CAST({paying_users} AS DOUBLE) / NULLIF({user_count}, 0)'
        type: number
        format: percent
      - name: paying_rate_approx
        sql: 'CAST({paying_users_approx} AS DOUBLE) / NULLIF({user_count_approx}, 0)'
        type: number
      - name: paying_rate_30d
        sql: 'CAST({paying_users_30d} AS DOUBLE) / NULLIF({user_count}, 0)'
        type: number
        format: percent
    segments:
      - name: vn_users
        sql: '{CUBE}.unified_first_country_code = ''VN'''
        description: Vietnam first-seen users
      - name: paying_lifetime
        sql: '{CUBE}.ingame_total_recharge_value_vnd > 0'
      - name: paying_recently_30d
        sql: '{CUBE}.ingame_total_recharge_value_vnd_30d > 0'
      - name: whales
        sql: '{CUBE}.ingame_total_recharge_value_vnd >= 10000000'
        description: Lifetime recharge >= 10M VND
      - name: high_level_players
        sql: '{CUBE}.ingame_max_active_role_level >= 50'
      - name: at_risk_paying
        sql: |
          {CUBE}.ingame_total_recharge_value_vnd > 0
          AND DATE_DIFF('day', {CUBE}.ingame_last_active_date, CURRENT_DATE) BETWEEN 7 AND 30
        description: Paying users inactive 7–30 days — churn risk
      - name: lapsed_this_month
        sql: DATE_TRUNC('month', {CUBE}.ingame_last_active_date) = DATE_TRUNC('month', CURRENT_DATE) - INTERVAL '1' MONTH
        description: Active in last calendar month but no login yet this month (last_active_date falls in previous month)
      - name: new_install_7d
        sql: '{CUBE}.install_date >= CURRENT_DATE - INTERVAL ''7'' DAY'
      - name: paid_install
        sql: '{CUBE}.is_paid_install = TRUE'

    # Cohort-by-install-date rollup. Eliminates the 2–3 minute Presto scans
    # over mf_users for LTV / cohort queries by pre-aggregating the heavy
    # sum + HLL columns. paying_users_30d (exact count_distinct) is excluded
    # on purpose — it can't merge across partitions. Use user_count_approx
    # plus a separate exact query if you need the precise count.
    pre_aggregations:
      - name: ltv_by_install_cohort_batch
        type: rollup
        measures:
          - ltv_total_vnd
          - ltv_30d_total_vnd
          - user_count_approx
        dimensions:
          - country
          - media_source
          - is_paid_install
          - os_platform
          - payer_tier
          - install_month
          - is_paying_user
          - max_vip_level
        time_dimension: install_date
        granularity: day
        partition_granularity: year
        refresh_key:
          every: 6 hours
          incremental: true
        build_range_start:
          sql: "SELECT from_iso8601_timestamp(CAST(MIN(install_date) AS VARCHAR) || 'T00:00:00Z') FROM mf_users"
        build_range_end:
          sql: "SELECT from_iso8601_timestamp(CAST(MAX(install_date) AS VARCHAR) || 'T00:00:00Z') FROM mf_users"

      # Lambda union: sealed batch partitions + a live tail straight from the
      # source table, so recent rows appear without waiting for a refresh cycle
      # and the batch rollup can refresh on a relaxed cadence.
      - name: ltv_by_install_cohort
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.ltv_by_install_cohort_batch

      - name: user_composition_batch
        type: rollup
        measures:
          - user_count_approx
          - paying_users_approx
          # LTV sums (additive) so payer_tier / lifecycle value cards route here
          # instead of a raw full-table scan.
          - ltv_total_vnd
          - ltv_30d_total_vnd
        dimensions:
          - country
          - media_source
          - os_platform
          - payer_tier
          - lifecycle_stage
          - is_paying_user
          # Recency bucket so churn_risk group-by + segment-scoped cards route to
          # the rollup. CURRENT_DATE-relative case dim (like lifecycle_stage),
          # correct as of the 6h build.
          - churn_risk
        # Cohort cards are commonly scoped by a cube segment (whales / at-risk /
        # paying). Listing them lets scoped queries match the rollup; each maps to
        # a dim already present so the merge stays additive.
        segments:
          - whales
          - at_risk_paying
          - paying_lifetime
        # Non-partitioned: composition is a user-attribute snapshot, not a time
        # series. One partition covers every user (incl. NULL install_date) and
        # sidesteps the partial-seal failure of partitioned rollups. All measures
        # additive, so any payer_tier/lifecycle/churn_risk filter merges right.
        refresh_key:
          every: 6 hours
