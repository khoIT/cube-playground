cubes:
  - name: active_daily
    sql_table: std_ingame_user_active_daily
    title: TF — Daily Active Snapshots (per user, per day)
    description: >
      One row per user per active day. Use this cube whenever you need a
      time window NOT pre-computed in mf_users, OR to retrieve a user's
      day-by-day activity timeline for the 360 view. For best 1-user latency,
      ALWAYS pass a user_id equality filter.

    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.user_id = {mf_users}.user_id"

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT({CUBE}.user_id, '__', CAST({CUBE}.log_date AS VARCHAR))"
        type: string
        primary_key: true
        public: false

      - name: user_id
        sql: user_id
        type: string

      - name: log_date
        sql: "CAST({CUBE}.log_date AS TIMESTAMP)"
        type: time

      - name: log_month
        sql: "DATE_TRUNC('month', {CUBE}.log_date)"
        type: time

      - name: server_id
        sql: ingame_last_active_server_id
        type: string

      - name: role_id
        sql: ingame_last_active_role_id
        type: string

      - name: role_class
        sql: ingame_last_active_role_class
        type: string

      - name: country_code
        sql: ingame_last_active_country_code
        type: string

      - name: os_platform
        sql: ingame_last_active_os_platform
        type: string

      - name: client_ip
        sql: ingame_last_active_client_ip
        type: string
        public: false

      - name: device_id
        sql: ingame_last_active_device_id
        type: string
        public: false

      - name: max_role_level
        sql: ingame_max_active_role_level
        type: number

      - name: max_fighting_power
        sql: ingame_max_active_fighting_power
        type: number

      - name: online_time_sec
        sql: total_online_time
        type: number

      - name: distinct_servers_today
        sql: total_server_id_active
        type: number

      - name: distinct_devices_today
        sql: total_device_id_active
        type: number

      - name: is_recharge_day
        sql: "CASE WHEN {CUBE}.is_recharge = 1 THEN TRUE ELSE FALSE END"
        type: boolean

    measures:
      - name: rows
        type: count
        description: Total user-day rows

      - name: dau
        type: count_distinct_approx
        sql: user_id
        description: Daily active users (HLL approx_distinct)

      - name: dau_exact
        type: count_distinct
        sql: user_id

      - name: paying_dau
        type: count_distinct_approx
        sql: user_id
        filters:
          - sql: "{CUBE}.is_recharge = 1"
        description: >
          Distinct active users with at least one recharge day in the selected
          window. Payer share / recharge rate = paying_dau / dau. Prefer this
          over grouping dau by is_recharge_day for multi-day windows — that
          split double-counts users who paid on some days but not others.

      - name: active_servers
        type: count_distinct_approx
        sql: ingame_last_active_server_id

      - name: total_online_time_sec
        sql: total_online_time
        type: sum

      - name: mau
        type: count_distinct_approx
        sql: user_id
        description: Monthly active users — query with time_dimension granularity=month

    segments:
      - name: last_7d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"

      - name: yesterday
        sql: "{CUBE}.log_date = CURRENT_DATE - INTERVAL '1' DAY"

    pre_aggregations:
      - name: dau_by_country_payer_daily_batch
        type: rollup
        measures:
          - dau
          - paying_dau
        dimensions:
          - mf_users.country
          - mf_users.payer_tier
        time_dimension: log_date
        granularity: day
        partition_granularity: month
        refresh_key:
          every: 1 hour
          incremental: true
        build_range_start:
          sql: "SELECT from_iso8601_timestamp(CAST(MIN(log_date) AS VARCHAR) || 'T00:00:00Z') FROM std_ingame_user_active_daily"
        build_range_end:
          sql: "SELECT from_iso8601_timestamp(CAST(MAX(log_date) AS VARCHAR) || 'T00:00:00Z') FROM std_ingame_user_active_daily"
      - name: dau_by_country_payer_daily
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.dau_by_country_payer_daily_batch
      - name: dau_daily_batch
        type: rollup
        measures:
          - dau
          - paying_dau
        time_dimension: log_date
        granularity: day
        partition_granularity: month
        refresh_key:
          every: 1 hour
          incremental: true
        build_range_start:
          sql: "SELECT from_iso8601_timestamp(CAST(MIN(log_date) AS VARCHAR) || 'T00:00:00Z') FROM std_ingame_user_active_daily"
        build_range_end:
          sql: "SELECT from_iso8601_timestamp(CAST(MAX(log_date) AS VARCHAR) || 'T00:00:00Z') FROM std_ingame_user_active_daily"
      - name: dau_daily
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.dau_daily_batch
