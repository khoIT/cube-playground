cubes:
  - name: etl_prop_flow
    sql_table: etl_ingame_propflow
    title: CFM VN — Prop Flow (events, PropFlow / 道具流水)
    description: >
      Per-player in-game item / weapon / skin transaction events. Sourced
      from t-log `PropFlow` (struct in docs/cfm_tlog_desc_20251210 (2).xml).
      Joins via playerid → cfm_user_roles.role_id → cfm_mf_users.user_id.
      Use for the "items / fashion / weapons obtained" panel of a 360 view —
      groups by reason show how the player acquires and spends props.
      ALWAYS query with playerid OR user_id + bounded log_date.

    joins:
      - name: user_roles
        relationship: many_to_one
        sql: "{CUBE}.playerid = {user_roles}.role_id"

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT({CUBE}.playerid, '__', CAST({CUBE}.dteventtime AS VARCHAR), '__', COALESCE({CUBE}.propid, ''), '__', COALESCE({CUBE}.reason, ''), '__', COALESCE({CUBE}.serial, ''))"
        type: string
        primary_key: true
        public: false

      - name: playerid
        sql: playerid
        type: string

      - name: dteventtime
        sql: dteventtime
        type: time

      - name: log_date
        sql: log_date
        type: time
        description: Partition column — REQUIRED filter for this table

      - name: log_month
        sql: log_month
        type: string

      - name: level
        sql: level
        type: number

      - name: prop_id
        sql: propid
        type: string
        description: Item ID — see docs/cfm_tlog_desc_20251210 (2).xml PropFlow.propid

      - name: prop_group_id
        sql: propgid
        type: string

      - name: prop_type
        sql: proptype
        type: string

      - name: prop_quality
        sql: propquality
        type: string

      - name: prop_num
        sql: propnum
        type: number

      - name: prop_delta
        sql: propdelta
        type: number
        description: Net change in prop count (+ acquired / - consumed)

      - name: prop_time_delta
        sql: proptimedelta
        type: number
        description: Net change in prop duration (seconds) for time-limited items

      - name: gold
        sql: gold
        type: number

      - name: gold_delta
        sql: golddelta
        type: number

      - name: weapon_point
        sql: weaponpoint
        type: number

      - name: weapon_point_delta
        sql: weaponpointdelta
        type: number

      - name: reason
        sql: reason
        type: string
        description: Primary reason code — see docs/cfm_tlog_desc_20251210 (2).xml PropFlow.reason enum

      - name: sub_reason
        sql: subreason
        type: string

      - name: source
        sql: source
        type: string

      - name: account_type
        sql: accounttype
        type: string

      - name: direction
        type: string
        case:
          when:
            - sql: "{CUBE}.propdelta > 0"
              label: gain
            - sql: "{CUBE}.propdelta < 0"
              label: loss
          else:
            label: neutral

      - name: is_instalment
        sql: isinstalment
        type: string

      - name: transaction_id
        sql: transactionid
        type: string

      - name: expire_time
        sql: expiretime
        type: string

    measures:
      - name: events
        type: count

      - name: distinct_players
        type: count_distinct_approx
        sql: playerid

      - name: distinct_props
        type: count_distinct_approx
        sql: propid

      - name: total_prop_delta
        sql: propdelta
        type: sum

      - name: total_gold_delta
        sql: golddelta
        type: sum

      - name: total_weapon_point_delta
        sql: weaponpointdelta
        type: sum

      - name: gains
        type: count
        filters:
          - sql: "{CUBE}.propdelta > 0"

      - name: losses
        type: count
        filters:
          - sql: "{CUBE}.propdelta < 0"

      - name: total_gains
        sql: propdelta
        type: sum
        filters:
          - sql: "{CUBE}.propdelta > 0"

      - name: total_losses
        sql: propdelta
        type: sum
        filters:
          - sql: "{CUBE}.propdelta < 0"

    segments:
      - name: last_7d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"

      - name: last_90d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '90' DAY"

      - name: gains_only
        sql: "{CUBE}.propdelta > 0"

      - name: losses_only
        sql: "{CUBE}.propdelta < 0"
