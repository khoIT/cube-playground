cubes:
  # ===========================================================================
  # economy_flow — virtual-currency sources and sinks.
  # Source: cfm_vn.etl_ingame_moneyflow
  #
  # One row per currency-change event. Identity key vopenid (= mf_users.user_id).
  # `delta` is the signed change (positive = earned/granted, negative = spent),
  # `balance` is the post-change balance, `reason`/`subreason` classify why.
  # Use to break down currency inflow vs outflow by reason and money type.
  #
  # ⚠ FRESHNESS: this table stopped updating ~2026-05-01 (historical only at
  # time of modeling). It holds large history but is not a live feed — confirm
  # with the data team whether the pipeline is paused or the table was renamed
  # before relying on it for current reporting.
  # ===========================================================================
  - name: economy_flow
    sql_table: etl_ingame_moneyflow
    title: CFM VN — Economy Flow (virtual currency, historical)
    description: >
      Virtual-currency sources/sinks. delta>0 = earned, delta<0 = spent;
      classified by reason/subreason and money type. HISTORICAL — table last
      updated ~2026-05-01.

    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.vopenid = {mf_users}.user_id"

    refresh_key:
      every: 1 hour

    dimensions:
      - name: composite_pk
        sql: "CONCAT(COALESCE({CUBE}.serial, COALESCE({CUBE}.sequence, '')), '__', COALESCE({CUBE}.vopenid, ''), '__', CAST({CUBE}.dteventtime AS VARCHAR))"
        type: string
        primary_key: true
        public: false

      - name: user_id
        sql: vopenid
        type: string

      - name: money_type
        sql: imoneytype
        type: string
        description: Currency type identifier

      - name: reason
        sql: reason
        type: string

      - name: subreason
        sql: subreason
        type: string

      - name: add_or_reduce
        sql: addorreduce
        type: string

      - name: vip_level
        sql: viplevel
        type: number

      - name: event_time
        sql: event_time_with_timezone
        type: time

      - name: log_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.log_date AS VARCHAR) || 'T00:00:00Z')"
        type: time

      - name: log_month
        sql: log_month
        type: string

    measures:
      - name: events
        type: count

      - name: players
        type: count_distinct_approx
        sql: vopenid

      - name: net_flow
        sql: delta
        type: sum
        description: Net currency change (sum of signed delta)

      - name: inflow
        sql: "CASE WHEN {CUBE}.delta > 0 THEN {CUBE}.delta ELSE 0 END"
        type: sum
        description: Currency earned/granted (positive deltas)

      - name: outflow
        sql: "CASE WHEN {CUBE}.delta < 0 THEN -{CUBE}.delta ELSE 0 END"
        type: sum
        description: Currency spent (absolute value of negative deltas)

    segments:
      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"
