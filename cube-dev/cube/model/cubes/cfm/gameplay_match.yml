cubes:
  # ===========================================================================
  # gameplay_match — per-player, per-match settlement detail.
  # Source: cfm_vn.etl_ingame_game_detail
  #
  # One row per player per finished match. Identity key playeropenid
  # (= mf_users.user_id). The raw table is very wide (280+ cols, most VARCHAR);
  # this cube curates the high-signal gameplay stats. Numeric stats are stored
  # as VARCHAR upstream, so measures use TRY_CAST(... AS DOUBLE) to coerce
  # safely (bad/empty values become NULL and are skipped by SUM/AVG).
  #
  # ⚠ FRESHNESS: this table stopped updating ~2026-05-01 (historical only at
  # time of modeling). Confirm with the data team whether the pipeline is
  # paused or the table was renamed before relying on it for current reporting.
  # ===========================================================================
  - name: gameplay_match
    sql_table: etl_ingame_game_detail
    title: CFM VN — Gameplay Match Detail (historical)
    description: >
      Per-player per-match results: mode/map, kills, deaths, damage, headshots,
      duration. Keyed by player (playeropenid). HISTORICAL — table last updated
      ~2026-05-01.

    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.playeropenid = {mf_users}.user_id"

    refresh_key:
      every: 1 hour

    dimensions:
      - name: composite_pk
        sql: "CONCAT(COALESCE({CUBE}.playerid, ''), '__', COALESCE({CUBE}.roundid, ''), '__', CAST({CUBE}.dteventtime AS VARCHAR))"
        type: string
        primary_key: true
        public: false

      - name: user_id
        sql: playeropenid
        type: string

      - name: role_id
        sql: roleid
        type: string

      - name: game_mode
        sql: gamemode
        type: string

      - name: game_type
        sql: gametype
        type: string

      - name: map_id
        sql: mapid
        type: string

      - name: level
        sql: level
        type: number

      - name: game_result
        sql: gameresult
        type: string
        description: Match result code (value space unconfirmed — kept as raw string)

      - name: is_newbie
        sql: isnewbie
        type: string

      - name: is_team
        sql: isteam
        type: string

      - name: room_id
        sql: roomid
        type: string

      - name: event_time
        sql: event_time_with_timezone
        type: time

      - name: log_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.log_date AS VARCHAR) || 'T00:00:00Z')"
        type: time

      - name: log_month
        sql: log_month
        type: string

    measures:
      - name: matches
        type: count

      - name: players
        type: count_distinct_approx
        sql: playeropenid

      - name: total_kills
        sql: "TRY_CAST({CUBE}.timeskill AS DOUBLE)"
        type: sum

      - name: total_deaths
        sql: "TRY_CAST({CUBE}.timesbekilled AS DOUBLE)"
        type: sum

      - name: total_damage
        sql: "TRY_CAST({CUBE}.damagevalue AS DOUBLE)"
        type: sum

      - name: total_headshots
        sql: "TRY_CAST({CUBE}.headshottimes AS DOUBLE)"
        type: sum

      - name: avg_player_duration_sec
        sql: "TRY_CAST({CUBE}.playerduration AS DOUBLE)"
        type: avg

      - name: kd_ratio
        sql: "{total_kills} / NULLIF({total_deaths}, 0)"
        type: number
        description: Kills / deaths

    segments:
      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"
