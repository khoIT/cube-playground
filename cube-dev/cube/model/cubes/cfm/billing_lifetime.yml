cubes:
  # ===========================================================================
  # billing_lifetime — RECONCILIATION-ONLY lens on lifetime value.
  # Source: iceberg.billing.pmt_users_history (cross-catalog, fully-qualified).
  #
  # [freshness: live]  (daily-refreshed)
  #
  # SCOPE: this cube is NOT a new LTV dimension source — mf_users already carries
  # ltv_vnd / ltv_usd / lifetime_txn_count / first_recharge_date / last_recharge_date
  # (the authoritative INGAME-DELIVERED lifetime value). The ONLY thing this cube
  # adds is the GATEWAY-CHARGED lifetime total from the canonical billing pipeline,
  # so you can reconcile the two: gateway cash vs ingame delivery (measured gap
  # ≈ 1.78x, Apple-pricing driven). Use it to detect/quantify that gap, NOT as a
  # parallel set of cohort/profile fields. Cohort dates, first_amt, product_code
  # are deliberately dropped — they duplicate mf_users and add no reconciliation
  # signal.
  #
  # GAME ISOLATION is the product_code filter. cfm = 'A49' only; legacy 'cfmobile'
  # (267) last transacted in 2020 and almost never matches current cfm_vn mf_users.
  #
  # The `user_id IN (SELECT user_id FROM mf_users)` semi-join is the real-users
  # filter (direct GDS-snowflake join). Grain: one row per (user, product_code).
  # ===========================================================================
  - name: billing_lifetime
    sql: >
      SELECT
        p.user_id,
        p.total_trans,
        p.total_amt_vnd,
        p.total_amt_usd
      FROM iceberg.billing.pmt_users_history p
      WHERE p.product_code = 'A49'
        AND p.user_id IN (SELECT user_id FROM mf_users)
    title: CFM VN — Billing Lifetime (gateway-charged LTV, reconcile vs mf_users)
    description: >
      [freshness: live] RECONCILIATION-ONLY. Gateway-charged lifetime value per
      user from the payment pipeline (total VND/USD/txns). Compare against the
      authoritative ingame mf_users LTV — a gap is expected (gateway cash vs ingame
      delivery, ≈1.78x). NOT a new dimension source; mf_users owns LTV. GROSS only.

    meta:
      freshness: live
      source: iceberg.billing.pmt_users_history
      purpose: ltv_reconciliation_vs_mf_users
      authoritative_ltv: mf_users

    joins:
      - name: mf_users
        relationship: one_to_one
        sql: "{CUBE}.user_id = {mf_users}.user_id"

    refresh_key:
      every: 1 hour

    dimensions:
      - name: user_id
        sql: user_id
        type: string
        primary_key: true

      - name: lifetime_vnd
        sql: total_amt_vnd
        type: number
        description: Gateway-charged lifetime VND (gross) — reconcile vs mf_users.ltv_vnd

      - name: lifetime_usd
        sql: total_amt_usd
        type: number
        description: Gateway-charged lifetime USD (gross) — reconcile vs mf_users.ltv_usd

      - name: lifetime_txn_count
        sql: total_trans
        type: number
        description: Gateway txn count — reconcile vs mf_users.lifetime_txn_count

    measures:
      - name: payers
        type: count
        description: Distinct paying users (1 row per user for this product)

      - name: lifetime_vnd_total
        sql: total_amt_vnd
        type: sum
        description: Sum of gateway-charged lifetime VND (gross) — reconcile vs ingame

      - name: lifetime_usd_total
        sql: total_amt_usd
        type: sum

      - name: lifetime_txn_total
        sql: total_trans
        type: sum

      - name: lifetime_arppu_vnd
        sql: "CAST({lifetime_vnd_total} AS DOUBLE) / NULLIF({payers}, 0)"
        type: number
        description: Gateway-charged lifetime ARPPU (VND) = total gateway VND / paying users
