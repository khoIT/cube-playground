cubes:
  - name: etl_newbie_detail
    sql_table: etl_ingame_newbiedetail
    title: CFM VN — Newbie Detail (events, NewbieDetail / 新手指引详情)
    description: >
      Per-player onboarding-detail events (prologue / ship-training completion).
      Sourced from t-log `NewbieDetail` (struct in docs/cfm_tlog_desc_20251210
      (2).xml). Joins via playerid → cfm_user_roles.role_id → cfm_mf_users.user_id.
      912k rows. SelfEsteem: 1=newbie, 2=skilled, 3=veteran.
      FirstGameMode: 0=competitive, 1=story. FirstProficiency: 0=veteran, 1=newbie.

    joins:
      - name: user_roles
        relationship: many_to_one
        sql: "{CUBE}.playerid = {user_roles}.role_id"

    refresh_key:
      every: 1 hour

    dimensions:
      - name: composite_pk
        sql: "CONCAT({CUBE}.playerid, '__', CAST({CUBE}.dteventtime AS VARCHAR))"
        type: string
        primary_key: true
        public: false

      - name: playerid
        sql: playerid
        type: string

      - name: dteventtime
        sql: dteventtime
        type: time

      - name: log_date
        sql: log_date
        type: time

      - name: log_month
        sql: log_month
        type: string

      - name: level
        sql: level
        type: number

      - name: chapter_complete_time
        sql: chaptercompletetime
        type: number
        description: Prologue chapter completion time (sec)

      - name: self_esteem
        sql: selfesteem
        type: number
        description: Self-assessment — 1=newbie, 2=skilled, 3=veteran

      - name: self_esteem_label
        type: string
        case:
          when:
            - sql: "{CUBE}.selfesteem = 1"
              label: newbie
            - sql: "{CUBE}.selfesteem = 2"
              label: skilled
            - sql: "{CUBE}.selfesteem = 3"
              label: veteran
          else:
            label: unknown

      - name: ship_training_complete_time
        sql: shiptrainingcompletetime
        type: number
        description: Ship-training (combat tutorial) completion time (sec)

      - name: ship_training_kill_num
        sql: shiptrainingkillnum
        type: number

      - name: first_game_mode
        sql: firstgamemode
        type: string
        description: "'0' = competitive, '1' = story"

      - name: first_proficiency
        sql: firstproficiency
        type: number
        description: 0=veteran, 1=newbie

      - name: score
        sql: score
        type: number

    measures:
      - name: events
        type: count

      - name: distinct_players
        type: count_distinct_approx
        sql: playerid

      - name: avg_chapter_complete_time
        sql: chaptercompletetime
        type: avg

      - name: avg_ship_training_time
        sql: shiptrainingcompletetime
        type: avg

      - name: avg_ship_training_kills
        sql: shiptrainingkillnum
        type: avg

      - name: avg_score
        sql: score
        type: avg

      - name: newbie_self_count
        type: count
        filters:
          - sql: "{CUBE}.selfesteem = 1"

      - name: veteran_self_count
        type: count
        filters:
          - sql: "{CUBE}.selfesteem = 3"

    segments:
      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"

      - name: last_90d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '90' DAY"

      - name: self_newbie
        sql: "{CUBE}.selfesteem = 1"

      - name: self_veteran
        sql: "{CUBE}.selfesteem = 3"
