cubes:
  - name: etl_lottery_shoot
    sql_table: etl_ingame_lotteryshoot
    title: CFM VN — Lottery / Gacha (events, LotteryShoot / 靶场抽奖)
    description: >
      Per-player gacha-pull events. Sourced from t-log `LotteryShoot`
      (struct in docs/cfm_tlog_desc_20251210 (2).xml). Joins via playerid →
      cfm_user_roles.role_id → cfm_mf_users.user_id.
      213M rows — always filter by playerid or user_id + bounded log_date.
      LotteryId enum (per XML desc): 1=金币礼包, 2=金币礼包十连抽, 3=钻石礼包,
      4=钻石礼包十连抽, 5=王者礼包, 6=王者礼包十连抽 (gold / diamond / king box,
      single + 10-pull variants). Result column = pull outcome.

    joins:
      - name: user_roles
        relationship: many_to_one
        sql: "{CUBE}.playerid = {user_roles}.role_id"

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT({CUBE}.playerid, '__', CAST({CUBE}.dteventtime AS VARCHAR), '__', COALESCE({CUBE}.transactionid, ''), '__', COALESCE({CUBE}.lotteryid, ''))"
        type: string
        primary_key: true
        public: false

      - name: playerid
        sql: playerid
        type: string

      - name: dteventtime
        sql: dteventtime
        type: time

      - name: log_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.log_date AS VARCHAR) || 'T00:00:00Z')"
        type: time

      - name: log_month
        sql: log_month
        type: string

      - name: level
        sql: level
        type: number

      - name: lottery_id
        sql: lotteryid
        type: string
        description: Pool ID — 1/2 gold box, 3/4 diamond box, 5/6 king box (single/10-pull)

      - name: lottery_box
        type: string
        case:
          when:
            - sql: "{CUBE}.lotteryid IN ('1','2')"
              label: gold_box
            - sql: "{CUBE}.lotteryid IN ('3','4')"
              label: diamond_box
            - sql: "{CUBE}.lotteryid IN ('5','6')"
              label: king_box
          else:
            label: other

      - name: is_ten_pull
        sql: "CASE WHEN {CUBE}.lotteryid IN ('2','4','6') THEN TRUE ELSE FALSE END"
        type: boolean

      - name: luck_point
        sql: luckpoint
        type: string

      - name: cost_diamond
        sql: costdiamond
        type: number

      - name: cost_gold
        sql: costgold
        type: number

      - name: award_diamond
        sql: awarddiamond
        type: number

      - name: award_gold
        sql: awardgold
        type: number

      - name: award_weapon_point
        sql: awardweaponpoint
        type: number

      - name: result
        sql: result
        type: string

      - name: transaction_id
        sql: transactionid
        type: string

      - name: is_preview
        sql: ispreview
        type: string

      - name: is_use_ailab_rate
        sql: isuseailabrate
        type: string

      - name: history_draw_cnt
        sql: historydrawcnt
        type: number

      - name: this_round_draw_cnt
        sql: thisrounddrawcnt
        type: number

    measures:
      - name: pulls
        type: count
        description: Total gacha-pull events

      - name: distinct_players
        type: count_distinct_approx
        sql: playerid

      - name: total_cost_diamond
        sql: costdiamond
        type: sum

      - name: total_cost_gold
        sql: costgold
        type: sum

      - name: total_award_diamond
        sql: awarddiamond
        type: sum

      - name: total_award_gold
        sql: awardgold
        type: sum

      - name: ten_pull_count
        type: count
        filters:
          - sql: "{CUBE}.lotteryid IN ('2','4','6')"

      - name: diamond_pulls
        type: count
        filters:
          - sql: "{CUBE}.lotteryid IN ('3','4')"

    segments:
      - name: last_7d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"

      - name: diamond_box_only
        sql: "{CUBE}.lotteryid IN ('3','4')"

      - name: king_box_only
        sql: "{CUBE}.lotteryid IN ('5','6')"

      - name: ten_pulls_only
        sql: "{CUBE}.lotteryid IN ('2','4','6')"

    pre_aggregations:
      - name: lottery_pulls_batch
        type: rollup
        measures:
          - pulls
          - distinct_players
          - total_cost_diamond
          - total_cost_gold
          - ten_pull_count
        dimensions:
          - lottery_id
          - lottery_box
        time_dimension: log_date
        granularity: day
        partition_granularity: month
        refresh_key:
          every: 6 hours
          incremental: true
        # Rolling 120-day build window with monthly partitions: only recent
        # months materialize to CubeStore (matches recent-skewed demand and
        # survives source blips since each month seals independently); older
        # dates fall through to source via the union lambda.
        build_range_start:
          sql: "SELECT date_add('day', -120, current_timestamp)"
        build_range_end:
          sql: "SELECT COALESCE(from_iso8601_timestamp(CAST(MAX(log_date) AS VARCHAR) || 'T00:00:00Z'), from_iso8601_timestamp('2025-01-01T00:00:00Z')) FROM etl_ingame_lotteryshoot"

      # Lambda union: sealed batch partitions + a live tail straight from source,
      # so recent rows appear without waiting for a refresh cycle.
      - name: lottery_pulls
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.lottery_pulls_batch

      # dteventtime-keyed twin of lottery_pulls_batch — see etl_login for rationale
      # (dteventtime-bound queries can't match a log_date rollup).
      - name: lottery_pulls_ts_batch
        type: rollup
        measures:
          - pulls
          - distinct_players
          - total_cost_diamond
          - total_cost_gold
          - ten_pull_count
        dimensions:
          - lottery_id
          - lottery_box
        time_dimension: dteventtime
        granularity: day
        partition_granularity: month
        refresh_key:
          every: 6 hours
          incremental: true
        build_range_start:
          sql: "SELECT date_add('day', -120, current_timestamp)"
        build_range_end:
          sql: "SELECT LEAST(MAX(dteventtime), current_timestamp) FROM etl_ingame_lotteryshoot"

      - name: lottery_pulls_ts
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.lottery_pulls_ts_batch
