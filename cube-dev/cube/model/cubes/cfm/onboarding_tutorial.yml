cubes:
  # ===========================================================================
  # onboarding_tutorial — first-time-user experience (FTUE) step events.
  # Source: cfm_vn.etl_ingame_newbietutorial
  #
  # One row per tutorial-step event. Identity key is vopenid (= mf_users.user_id,
  # same mapping as cfm recharge). Use to measure how far new players progress
  # through the onboarding tutorial (reach per step, players per step).
  #
  # NOTE: tutorialstatus is constant '1' in the data, so it carries no signal
  # and is not exposed — each row already represents a completed/logged step.
  # ===========================================================================
  - name: onboarding_tutorial
    sql_table: etl_ingame_newbietutorial
    title: CFM VN — Onboarding Tutorial (FTUE steps)
    description: >
      First-time-user-experience funnel. One row per tutorial-step event keyed
      by player (vopenid). Measure step reach and distinct players per step to
      find onboarding drop-off.

    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.vopenid = {mf_users}.user_id"

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT(COALESCE({CUBE}.vopenid, ''), '__', COALESCE({CUBE}.tutorialid, ''), '__', CAST({CUBE}.dteventtime AS VARCHAR))"
        type: string
        primary_key: true
        public: false

      - name: user_id
        sql: vopenid
        type: string

      - name: tutorial_id
        sql: tutorialid
        type: string
        description: Tutorial step identifier

      - name: level
        sql: level
        type: number

      - name: event_time
        sql: event_time_with_timezone
        type: time

      - name: log_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.log_date AS VARCHAR) || 'T00:00:00Z')"
        type: time

      - name: log_month
        sql: log_month
        type: string

    measures:
      - name: step_events
        type: count
        description: Total tutorial-step events

      - name: players
        type: count_distinct_approx
        sql: vopenid
        description: Distinct players who logged any tutorial step

      - name: distinct_steps
        type: count_distinct_approx
        sql: tutorialid
        description: Distinct tutorial steps observed

    segments:
      - name: last_7d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '7' DAY"
      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"
