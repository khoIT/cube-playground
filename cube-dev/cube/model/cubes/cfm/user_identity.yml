cubes:
  # ===========================================================================
  # user_identity — the SMALL net-new slice of the cross-game VGA profile that
  # mf_users does NOT already carry. Source: iceberg.vga.std_all_game_user_profile.
  #
  # [freshness: lagging] — load STOPPED ~2026-05-17 (~1 month stale at authoring).
  # The intended LIVE source (gds_da.etl_user_profile) carries only `bum` /
  # `thiennu3`, NOT cfm/jus, so vga is the only (game_id,user_id) profile source.
  #
  # WHY SO FEW COLUMNS: mf_users is the live (hourly/daily) per-game feature
  # store and already derives geo (first/last_login_country), channels
  # (first/last_login_channel), media_source, install_date, days_since_last_active,
  # LTV, payer_tier, lifecycle_stage — all fresher than this lagging source.
  # Re-exposing them here would be duplicative and staler. So this cube keeps ONLY
  # the handful of fields that have NO mf_users equivalent:
  #   - register_date     (account creation — distinct from install_date)
  #   - last_os           (mf_users only has a single os_platform, not first/last)
  #   - install_app_store (App Store / Google Play — mf_users has no store field)
  #   - user_type         (vga account class — no mf_users equivalent)
  # PII (device_id / install_id / fb_emails) is intentionally NOT modeled — it was
  # never surfaced and only adds redaction/PII surface.
  #
  # GAME ISOLATION is the game_id filter ('cfm_vn'), NOT folder placement — the
  # table holds every game's rows. Grain is 1:1 per (game_id,user_id), joins
  # mf_users directly on the GDS-snowflake user_id.
  #
  # Named user_identity (NOT user_profile) — `user_profile` is the existing 360
  # VIEW name in views/<game>/user_360.yml; a cube sharing that name breaks the
  # whole model compile.
  # ===========================================================================
  - name: user_identity
    sql: >
      SELECT
        user_id,
        register_date,
        last_os,
        install_app_store,
        user_type
      FROM iceberg.vga.std_all_game_user_profile
      WHERE game_id = 'cfm_vn'
    title: CFM VN — User Identity (register / store / user-type net-new)
    description: >
      [freshness: lagging] The few identity fields the live mf_users feature store
      does NOT carry — account register_date, last OS, install app store, and vga
      user_type. Everything else (geo, channels, LTV, lifecycle) lives in mf_users
      and is fresher there. Load is ~1 month behind. One row per user.

    meta:
      freshness: lagging
      source: iceberg.vga.std_all_game_user_profile
      lag_note: load stopped ~2026-05-17
      scope_note: net-new-vs-mf_users only; mf_users is the live identity backbone

    joins:
      - name: mf_users
        relationship: one_to_one
        sql: "{CUBE}.user_id = {mf_users}.user_id"

    refresh_key:
      every: 6 hour

    dimensions:
      - name: user_id
        sql: user_id
        type: string
        primary_key: true

      - name: register_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.register_date AS VARCHAR) || 'T00:00:00Z')"
        type: time
        description: Account creation date (distinct from mf_users install_date)

      - name: last_os
        sql: last_os
        type: string
        description: Most-recent OS (mf_users carries only a single os_platform)

      - name: install_app_store
        sql: install_app_store
        type: string
        description: Install store (App Store / Google Play) — no mf_users equivalent

      - name: user_type
        sql: user_type
        type: string
        description: VGA account class — no mf_users equivalent

    measures:
      - name: users
        type: count
