cubes:
  - name: etl_money_flow
    sql_table: etl_ingame_moneyflow
    title: CFM VN — Money Flow (events, MoneyFlow / 货币流水)
    description: >
      Per-player in-game currency change events. Sourced from t-log `MoneyFlow`
      (struct in docs/cfm_tlog_desc_20251210 (2).xml). Joins via playerid →
      cfm_user_roles.role_id → cfm_mf_users.user_id.
      ⚠️ HUGE table — 1.35 BILLION rows. ALWAYS query with playerid OR user_id
      equality filter + bounded log_date range. Without filters, Trino will
      OOM. Pre-aggregations recommended before production use.
      Money type / reason enum labels in docs/CFL_Game detail 2.xlsx (Sheet1).

    joins:
      - name: user_roles
        relationship: many_to_one
        sql: "{CUBE}.playerid = {user_roles}.role_id"

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT({CUBE}.playerid, '__', CAST({CUBE}.dteventtime AS VARCHAR), '__', COALESCE({CUBE}.sequence, ''), '__', COALESCE({CUBE}.serial, ''))"
        type: string
        primary_key: true
        public: false

      - name: playerid
        sql: playerid
        type: string

      - name: dteventtime
        sql: dteventtime
        type: time

      - name: log_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.log_date AS VARCHAR) || 'T00:00:00Z')"
        type: time
        description: Partition column — REQUIRED filter for this table

      - name: log_month
        sql: log_month
        type: string

      - name: level
        sql: level
        type: number

      - name: vip_level
        sql: viplevel
        type: string

      - name: money_type_code
        sql: imoneytype
        type: string
        description: Raw money type code — see docs/CFL_Game detail 2.xlsx Sheet1

      - name: money_type
        type: string
        description: >
          VN label for in-game currency types. Authoritative source:
          docs/CFL_Game detail 2.xlsx Sheet1 (col A=label, col B=code).
          Verified against Trino distribution Apr-May 2026 — code 1
          (Kim Cương) is the highest-volume currency, consistent with
          xlsx. Prior version had a wrong CASE — Kim Cương was mislabeled
          at code 0.
        case:
          when:
            - sql: "{CUBE}.imoneytype = '0'"
              label: xu_game
            - sql: "{CUBE}.imoneytype = '1'"
              label: kim_cuong
            - sql: "{CUBE}.imoneytype = '2'"
              label: diem_thien_phu
            - sql: "{CUBE}.imoneytype = '3'"
              label: diem_tinh_thong
            - sql: "{CUBE}.imoneytype = '4'"
              label: diem_cong_nghe
            - sql: "{CUBE}.imoneytype = '5'"
              label: xu_clan
            - sql: "{CUBE}.imoneytype = '6'"
              label: xu_dau_rank
            - sql: "{CUBE}.imoneytype = '7'"
              label: van_nang_shop_dinh_cao
            - sql: "{CUBE}.imoneytype = '8'"
              label: diem_cf_may_man
            - sql: "{CUBE}.imoneytype = '9'"
              label: gp_thuong
            - sql: "{CUBE}.imoneytype = '10'"
              label: xu_doi
            - sql: "{CUBE}.imoneytype = '11'"
              label: vang_den
            - sql: "{CUBE}.imoneytype = '12'"
              label: xu_sanh_pve
            - sql: "{CUBE}.imoneytype = '13'"
              label: xu_cf
            - sql: "{CUBE}.imoneytype = '14'"
              label: xu_event
            - sql: "{CUBE}.imoneytype = '15'"
              label: xu_cf_han_gio
            - sql: "{CUBE}.imoneytype = '16'"
              label: chiet_khau_mua_event
            - sql: "{CUBE}.imoneytype = '17'"
              label: diem_ky_nang_thong_dung
            - sql: "{CUBE}.imoneytype = '18'"
              label: xu_giao_dich
            - sql: "{CUBE}.imoneytype = '19'"
              label: the_thanh_vien_bo_sung
          else:
            label: other

      - name: reason_code
        sql: reason
        type: string
        description: >
          Composite primary reason code (varchar). Encoded as
          reason_base + reason_action — divide by 1000 to get the
          currency-category base (Sheet1 col F/G), modulo 1000 to get
          the action (Sheet1 col J/L). Prefer the derived
          reason_base_label / reason_action_label dimensions below
          for human-readable analysis.

      - name: reason_base_code
        sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000"
        type: number
        description: Currency-category bucket (= reason DIV 1000 * 1000). See xlsx Sheet1 col F.

      - name: reason_base_label
        type: string
        description: VN label for the currency category implied by reason (Sheet1 col G).
        case:
          when:
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 0"
              label: kim_cuong
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 1000"
              label: vang
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 2000"
              label: diem_vu_khi
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 3000"
              label: diem_chuyen_gia
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 4000"
              label: diem_to_doi
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 5000"
              label: gp
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 6000"
              label: diem_cong_nghe
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 7000"
              label: diem_clan
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 8000"
              label: diem_xep_hang
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 9000"
              label: diem_nang_luong
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 10000"
              label: diem_nap_the
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 11000"
              label: diem_battle_pass
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 12000"
              label: diem_doi_thuong
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 13000"
              label: diem_chiet_khau
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 14000"
              label: diem_rogue_like
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 15000"
              label: diem_cfm
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 16000"
              label: diem_cfm_gioi_han
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 17000"
              label: diem_cfm_midas
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 18000"
              label: diem_ky_nang
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 19000"
              label: diem_giao_dich
            - sql: "(TRY_CAST({CUBE}.reason AS INTEGER) / 1000) * 1000 = 20000"
              label: kim_cuong_den
          else:
            label: other

      - name: reason_action_code
        sql: "MOD(TRY_CAST({CUBE}.reason AS INTEGER), 1000)"
        type: number
        description: Specific action code (= reason MOD 1000). See xlsx Sheet1 col I.

      - name: reason_action_label
        type: string
        description: VN label for the specific reason action (Sheet1 col L).
        case:
          when:
            - sql: "MOD(TRY_CAST({CUBE}.reason AS INTEGER), 1000) = 0"
              label: mac_dinh
            - sql: "MOD(TRY_CAST({CUBE}.reason AS INTEGER), 1000) = 1"
              label: hoat_dong_su_kien
            - sql: "MOD(TRY_CAST({CUBE}.reason AS INTEGER), 1000) = 2"
              label: quay_thuong_truong_ban
            - sql: "MOD(TRY_CAST({CUBE}.reason AS INTEGER), 1000) = 3"
              label: tieu_thu_trong_game
            - sql: "MOD(TRY_CAST({CUBE}.reason AS INTEGER), 1000) = 4"
