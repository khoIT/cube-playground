      - name: sub_reason_code
        sql: subreason
        type: string

      - name: add_or_reduce
        sql: addorreduce
        type: string
        description: "'0' = increase, '1' = decrease"

      - name: direction
        type: string
        case:
          when:
            - sql: "{CUBE}.addorreduce = '0'"
              label: in
            - sql: "{CUBE}.addorreduce = '1'"
              label: out
          else:
            label: unknown

      - name: i_money
        sql: imoney
        type: number
        description: Amount of money the action involves

      - name: after_money
        sql: aftermoney
        type: number

      - name: balance
        sql: balance
        type: number

      - name: delta
        sql: delta
        type: number
        description: Net change produced by this event

      - name: transaction_id
        sql: transactionid
        type: string

      - name: bill_no
        sql: billno
        type: string

      - name: source
        sql: source
        type: string

    measures:
      - name: events
        type: count

      - name: distinct_players
        type: count_distinct_approx
        sql: playerid

      - name: in_events
        type: count
        filters:
          - sql: "{CUBE}.addorreduce = '0'"

      - name: out_events
        type: count
        filters:
          - sql: "{CUBE}.addorreduce = '1'"

      - name: total_delta
        sql: delta
        type: sum

      - name: total_in
        sql: delta
        type: sum
        filters:
          - sql: "{CUBE}.addorreduce = '0'"

      - name: total_out
        sql: delta
        type: sum
        filters:
          - sql: "{CUBE}.addorreduce = '1'"

    segments:
      - name: last_7d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"

      - name: diamond_only
        sql: "{CUBE}.imoneytype = '1'"

      - name: game_coin_only
        sql: "{CUBE}.imoneytype = '0'"

      - name: clan_coin_only
        sql: "{CUBE}.imoneytype = '5'"

      - name: cf_coin_only
        sql: "{CUBE}.imoneytype = '13'"

      - name: spends_only
        sql: "{CUBE}.addorreduce = '1'"

      - name: gains_only
        sql: "{CUBE}.addorreduce = '0'"

    pre_aggregations:
      - name: money_flow_summary_batch
        type: rollup
        measures:
          - events
          - in_events
          - out_events
          - total_in
          - total_out
          - total_delta
          - distinct_players
        dimensions:
          - reason_action_label
          - money_type
          - reason_base_label
        time_dimension: log_date
        granularity: day
        partition_granularity: month
        refresh_key:
          every: 6 hours
          incremental: true
        # Rolling 120-day build window with monthly partitions: only recent
        # months materialize to CubeStore (matches recent-skewed demand and
        # survives source blips since each month seals independently); older
        # dates fall through to source via the union lambda.
        build_range_start:
          sql: "SELECT date_add('day', -120, current_timestamp)"
        build_range_end:
          sql: "SELECT COALESCE(from_iso8601_timestamp(CAST(MAX(log_date) AS VARCHAR) || 'T00:00:00Z'), from_iso8601_timestamp('2025-01-01T00:00:00Z')) FROM etl_ingame_moneyflow"

      # Lambda union: sealed batch partitions + a live tail straight from source,
      # so recent rows appear without waiting for a refresh cycle.
      - name: money_flow_summary
        type: rollup_lambda
        union_with_source_data: true
        rollups:
          - CUBE.money_flow_summary_batch
