cubes:
  - name: etl_login
    sql_table: etl_ingame_login
    title: CFM VN — Login (events, Login / 登录)
    description: >
      Per-role login events. Sourced from t-log `Login`
      (struct in docs/cfm_tlog_desc_20251210 (2).xml). This table carries
      `clientsdkuserid` (= mf_users.user_id, 19-digit), so it joins directly
      to cfm_mf_users without going through the role bridge. `roleid` is
      still exposed for in-game-character-level analysis.
      Profile signals here: hour/weekday distribution, device + network
      fingerprint per session, ladder score evolution, backflow markers.
      ALWAYS query with clientsdkuserid/user_id OR roleid filter + bounded
      log_date range, otherwise Trino will full-scan an event table.

    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.clientsdkuserid = {mf_users}.user_id"

      - name: user_roles
        relationship: many_to_one
        sql: "{CUBE}.roleid = {user_roles}.role_id"

    refresh_key:
      every: 30 minute

    dimensions:
      - name: composite_pk
        sql: "CONCAT({CUBE}.roleid, '__', CAST({CUBE}.dteventtime AS VARCHAR), '__', COALESCE({CUBE}.gamesvrid, ''), '__', COALESCE({CUBE}.deviceid, ''))"
        type: string
        primary_key: true
        public: false

      - name: roleid
        sql: roleid
        type: string

      - name: clientsdkuserid
        sql: clientsdkuserid
        type: string
        description: SDK account user_id (19-digit) — direct join key to mf_users

      - name: dteventtime
        sql: dteventtime
        type: time

      - name: log_date
        sql: log_date
        type: time
        description: Partition column — REQUIRED filter for this table

      - name: log_month
        sql: log_month
        type: string

      - name: hour_of_day_vn
        sql: "HOUR({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh')"
        type: number
        description: 0–23 in Asia/Ho_Chi_Minh — for hour-of-day distribution panel

      - name: day_of_week_vn
        sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE))"
        type: number
        description: 1=Mon … 7=Sun in VN timezone

      - name: weekday_label
        type: string
        case:
          when:
            - sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE)) = 1"
              label: T2
            - sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE)) = 2"
              label: T3
            - sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE)) = 3"
              label: T4
            - sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE)) = 4"
              label: T5
            - sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE)) = 5"
              label: T6
            - sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE)) = 6"
              label: T7
            - sql: "DAY_OF_WEEK(CAST({CUBE}.dteventtime AT TIME ZONE 'Asia/Ho_Chi_Minh' AS DATE)) = 7"
              label: CN
          else:
            label: unknown

      - name: server_id
        sql: gamesvrid
        type: string

      - name: zone_id
        sql: izoneareaid
        type: string

      - name: level
        sql: level
        type: number

      - name: vip_level
        sql: viplevel
        type: number

      - name: client_version
        sql: clientversion
        type: string

      - name: app_channel
        sql: appchannel
        type: string

      - name: login_channel
        sql: loginchannel
        type: string

      - name: system_software
        sql: systemsoftware
        type: string
        description: OS string (e.g. "iOS 18.7.2", "Android 12")

      - name: system_hardware
        sql: systemhardware
        type: string
        description: Hardware model string (e.g. "iPhone15,2")

      - name: network
        sql: network
        type: string
        description: Connection type (Wifi / 4G / 5G)

      - name: telecom_operator
        sql: telecomoper
        type: string

      - name: device_id
        sql: deviceid
        type: string
        public: false
        description: PII — obs sidecar hashes filter values

      - name: client_ip
        sql: clientip
        type: string
        public: false
        description: PII — obs sidecar hashes filter values

      - name: country
        sql: country
        type: string

      - name: ping
        sql: "TRY_CAST({CUBE}.ping AS INTEGER)"
        type: number

      - name: ladder_score
        sql: "TRY_CAST({CUBE}.ladderscore AS INTEGER)"
        type: number
        description: Ladder/rank score at login time

      - name: ladder_score_top
        sql: "TRY_CAST({CUBE}.ladderscoretop AS INTEGER)"
        type: number

      - name: ladder_score_peak
        sql: "TRY_CAST({CUBE}.ladderscorepeak AS INTEGER)"
        type: number

      - name: is_backflow_user
        sql: isbackflowuser
        type: string

      - name: novice_flag
        sql: noviceflag
        type: string

      - name: online_total_time_sec
        sql: "TRY_CAST({CUBE}.onlinetotaltime AS BIGINT)"
        type: number
        description: Cumulative lifetime online time for the role at login time

    measures:
      - name: logins
        type: count

      - name: distinct_days
        type: count_distinct_approx
        sql: log_date

      - name: distinct_devices
        type: count_distinct_approx
        sql: deviceid

      - name: distinct_ips
        type: count_distinct_approx
        sql: clientip

      - name: distinct_servers
        type: count_distinct_approx
        sql: gamesvrid

      - name: distinct_versions
        type: count_distinct_approx
        sql: clientversion

      - name: max_ladder_score
        sql: "TRY_CAST({CUBE}.ladderscore AS INTEGER)"
        type: max

      - name: max_ladder_score_peak
        sql: "TRY_CAST({CUBE}.ladderscorepeak AS INTEGER)"
        type: max

      - name: backflow_logins
        type: count
        filters:
          - sql: "{CUBE}.isbackflowuser = '1'"

    segments:
      - name: last_7d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '30' DAY"

      - name: last_90d
        sql: "{CUBE}.log_date >= CURRENT_DATE - INTERVAL '90' DAY"

      - name: mobile_only
        sql: "{CUBE}.systemhardware LIKE 'iPhone%' OR {CUBE}.systemhardware LIKE 'iPad%' OR {CUBE}.network IN ('4G','5G','3G')"

      - name: backflow_only
        sql: "{CUBE}.isbackflowuser = '1'"
