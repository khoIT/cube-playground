# nginx for the `web` image: serve the built SPA and reverse-proxy the API to
# the server container on the same origin (the SPA calls relative /api & /cube-api).
#
# This is the in-compose origin unifier. The org edge proxy (GIO) still sits in
# front and points the public domain at the published PUBLIC_PORT.

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Container-local health probe (used by the image HEALTHCHECK).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # API + Cube proxy → Fastify server. `server` resolves via the compose network.
    location /api/ {
        proxy_pass http://server:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Chat replies stream over SSE — disable buffering so tokens flush live.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location /cube-api/ {
        proxy_pass http://server:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Public API reference (Scalar at /docs, Swagger UI at /docs/swagger) + raw
    # OpenAPI spec — all served by Fastify. Without these the SPA fallback below
    # swallows them and the client router redirects to /chat.
    location /docs {
        proxy_pass http://server:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI (classic "Authorize + Try it" flow) and its bundled static
    # assets, all under /docs/swagger. Explicit block for clarity; the /docs
    # prefix above already covers it.
    location /docs/swagger {
        proxy_pass http://server:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://server:3004;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
